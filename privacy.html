<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Privacy</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .header { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .back-btn { text-decoration: none; color: #fff; font-size: 24px; margin-right: 20px; }
        
        .section-title { padding: 20px 15px 10px; font-size: 16px; font-weight: bold; }
        
        .privacy-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: #111; margin-bottom: 1px;
        }
        .info-text { padding: 10px 15px; font-size: 13px; color: #aaa; line-height: 1.5; }

        /* Switch Style */
        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #FFD700; }
        input:checked + .slider:before { transform: translateX(21px); }
    </style>
</head>
<body>

    <div class="header">
        <a href="settings.html" class="back-btn">←</a>
        <span style="font-size: 18px; font-weight: bold;">Account Privacy</span>
    </div>

    <div class="section-title">Account Privacy</div>

    <div class="privacy-row">
        <span>Private Account</span>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>

    <div class="info-text">
        When your account is public, your profile and posts can be seen by anyone. <br><br>
        When your account is private, only people you approve can see your photos and videos.
    </div>

</body>
</html>
