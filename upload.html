<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upload | Max Ful</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        .header { 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 0.1px solid #262626; background: #000;
        }
        .header h2 { font-size: 18px; margin: 0; font-weight: bold; }
        .next-link { color: #0095f6; font-weight: bold; text-decoration: none; font-size: 16px; cursor: pointer; }

        .preview-container { 
            width: 100%; flex: 1; background: #000; display: flex; 
            align-items: center; justify-content: center; position: relative; 
        }
        #videoPreview, #imagePreview { width: 100%; height: 100%; object-fit: contain; display: none; }
        
        /* असली Instagram जैसा मोड सेलेक्टर */
        .mode-selector {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 30px;
            display: flex; gap: 30px; border: 1px solid #333;
        }
        .mode-btn { font-size: 14px; font-weight: bold; color: #a8a8a8; cursor: pointer; }
        .mode-btn.active { color: #fff; }

        .center-placeholder { text-align: center; color: #a8a8a8; }
        .center-placeholder i { font-size: 50px; margin-bottom: 10px; display: block; }

        #fileInput { display: none; }

        /* Loader */
        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid #0095f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="header">
        <a href="profile.html" style="text-decoration:none; color: #fff; font-size: 24px;">✕</a>
        <h2>New post</h2>
        <div class="next-link" onclick="handleNext()">Next</div>
    </div>

    <div class="preview-container">
        <video id="videoPreview" autoplay muted loop playsinline></video>
        <img id="imagePreview">
        
        <div class="center-placeholder" id="placeholder" onclick="triggerInput()">
            <i class="fa-regular fa-image"></i>
            <p>Tap to select media</p>
        </div>

        <div class="mode-selector">
            <span class="mode-btn active" id="postMode" onclick="setMode('POST')">POST</span>
            <span class="mode-btn" id="reelMode" onclick="setMode('REEL')">REEL</span>
        </div>
    </div>

    <input type="file" id="fileInput" onchange="handleFile(event)">

    <script>
        let currentMode = 'POST';
        let selectedFile = null;

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('postMode').classList.toggle('active', mode === 'POST');
            document.getElementById('reelMode').classList.toggle('active', mode === 'REEL');
            document.getElementById('pageTitle').innerText = mode === 'POST' ? 'New post' : 'New reel';
        }

        function triggerInput() {
            const input = document.getElementById('fileInput');
            input.accept = currentMode === 'REEL' ? "video/*" : "image/*,video/*";
            input.click();
        }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            selectedFile = file;

            document.getElementById('placeholder').style.display = 'none';
            const vPrev = document.getElementById('videoPreview');
            const iPrev = document.getElementById('imagePreview');

            if (file.type.startsWith('video/')) {
                vPrev.src = URL.createObjectURL(file);
                vPrev.style.display = 'block';
                iPrev.style.display = 'none';
            } else {
                iPrev.src = URL.createObjectURL(file);
                iPrev.style.display = 'block';
                vPrev.style.display = 'none';
            }
        }

        function handleNext() {
            if (!selectedFile) {
                alert("Please select a photo or video first!");
                return;
            }
            document.getElementById('loader').style.display = 'flex';
            setTimeout(() => {
                window.location.href = currentMode === 'REEL' ? "share-reel.html" : "share-post.html";
            }, 1500);
        }
    </script>
</body>
</html>
