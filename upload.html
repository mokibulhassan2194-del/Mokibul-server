<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upload | Max Ful</title>
    <style>
        body { 
            margin: 0; background: #000; color: white; font-family: sans-serif; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        .header { 
            padding: 15px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 0.1px solid #333; background: #000;
        }
        .header h2 { font-size: 18px; margin: 0; color: #FFD700; }
        .next-link { color: #FFD700; font-weight: bold; text-decoration: none; font-size: 16px; cursor: pointer; }

        /* Preview Area */
        .preview-container { 
            width: 100%; flex: 1; background: #111; display: flex; 
            align-items: center; justify-content: center; position: relative; 
        }
        #videoPreview, #imagePreview { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .placeholder-text { text-align: center; cursor: pointer; }
        .plus-icon { 
            width: 80px; height: 80px; border: 2px dashed #FFD700; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; margin: 0 auto 15px; font-size: 40px; color: #FFD700;
        }

        /* Bottom Mode Switcher */
        .mode-selector {
            height: 60px; background: #000; display: flex; 
            justify-content: center; align-items: center; gap: 40px;
            border-top: 1px solid #222;
        }
        .mode-btn { 
            color: #888; font-weight: bold; font-size: 14px; 
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
        }
        .mode-btn.active { color: #fff; border-bottom: 2px solid #FFD700; padding-bottom: 5px; }

        #fileInput { display: none; }

        /* Fake Loader */
        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
            flex-direction: column;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #FFD700; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #FFD700; font-weight: bold;">Uploading to Max Ful...</p>
    </div>

    <div class="header">
        <a href="home.html" style="text-decoration:none; color: #fff; font-size: 24px;">✕</a>
        <h2 id="pageTitle">New Reel</h2>
        <div class="next-link" onclick="handleNext()">Next</div>
    </div>

    <div class="preview-container" onclick="document.getElementById('fileInput').click()">
        <video id="videoPreview" autoplay muted loop playsinline></video>
        <img id="imagePreview">
        
        <div class="placeholder-text" id="placeholder">
            <div class="plus-icon">+</div>
            <p id="mainText" style="font-weight: bold; color: #eee;">Select Reel from Gallery</p>
        </div>
    </div>

    <div class="mode-selector">
        <div class="mode-btn active" id="btnReel" onclick="setMode('REEL')">Reel</div>
        <div class="mode-btn" id="btnStory" onclick="setMode('STORY')">Story</div>
    </div>

    <input type="file" id="fileInput" onchange="handleFile(event)">

    <script>
        let currentMode = 'REEL';
        let selectedFile = null;

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btnReel').classList.toggle('active', mode === 'REEL');
            document.getElementById('btnStory').classList.toggle('active', mode === 'STORY');
            
            document.getElementById('pageTitle').innerText = "New " + (mode === 'REEL' ? 'Reel' : 'Story');
            document.getElementById('mainText').innerText = "Select " + (mode === 'REEL' ? 'Reel' : 'Photo/Video') + " from Gallery";
            
            const input = document.getElementById('fileInput');
            input.accept = mode === 'REEL' ? "video/*" : "image/*,video/*";
        }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            selectedFile = file;

            const videoPreview = document.getElementById('videoPreview');
            const imagePreview = document.getElementById('imagePreview');
            const placeholder = document.getElementById('placeholder');
            
            placeholder.style.display = 'none';

            if (file.type.startsWith('video/')) {
                videoPreview.src = URL.createObjectURL(file);
                videoPreview.style.display = 'block';
                imagePreview.style.display = 'none';
            } else {
                imagePreview.src = URL.createObjectURL(file);
                imagePreview.style.display = 'block';
                videoPreview.style.display = 'none';
            }
        }

        function handleNext() {
            if (!selectedFile) {
                alert("Pahle Gallery se kuch chuno bhai! 😂");
                return;
            }

            // Show Loader
            document.getElementById('loader').style.display = 'flex';

            setTimeout(() => {
                if (currentMode === 'STORY') {
                    // 25 Hours Logic
                    const expiryTime = Date.now() + (25 * 60 * 60 * 1000);
                    localStorage.setItem('max_story_expiry', expiryTime);
                    alert("Max Ful Story updated for 25 hours!");
                    window.location.href = "home.html";
                } else {
                    // Reel logic (Redirection to Share Page)
                    window.location.href = "share-reel.html";
                }
            }, 2000); // 2 second ka fake upload time
        }
    </script>
</body>
</html>
