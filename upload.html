<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upload Reel | Max Ful</title>
    <style>
        body { 
            margin: 0; background: #000; color: white; font-family: sans-serif; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
            touch-action: manipulation;
        }
        
        .header { 
            padding: 15px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 0.1px solid #333; z-index: 100; background: #000;
        }
        .header h2 { font-size: 18px; margin: 0; }
        .next-link { color: #FFD700; font-weight: bold; text-decoration: none; font-size: 16px; cursor: pointer; }

        /* Video Preview Area - Professional Look */
        .preview-container { 
            width: 100%; flex: 1; background: #111; display: flex; 
            align-items: center; justify-content: center; position: relative; 
            overflow: hidden; border-radius: 15px 15px 0 0; margin-top: 5px;
        }
        #videoPreview { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .placeholder-text { text-align: center; cursor: pointer; transition: transform 0.2s; }
        .placeholder-text:active { transform: scale(0.95); }
        
        .plus-icon { 
            width: 80px; height: 80px; border: 2px dashed #FFD700; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; margin: 0 auto 15px; font-size: 40px; color: #FFD700;
        }

        /* Hidden File Input */
        #fileInput { display: none; }

        /* Instructions */
        .tap-info { 
            position: absolute; bottom: 30px; width: 100%; 
            text-align: center; color: #fff; font-size: 13px; 
            pointer-events: none; background: rgba(0,0,0,0.5); 
            padding: 10px 0; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html" style="text-decoration:none; color: #fff; font-size: 24px;">✕</a>
        <h2>New Reel</h2>
        <a href="share-reel.html" class="next-link">Next</a>
    </div>

    <div class="preview-container" onclick="document.getElementById('fileInput').click()">
        <video id="videoPreview" autoplay muted loop playsinline></video>
        
        <div class="placeholder-text" id="placeholder">
            <div class="plus-icon">+</div>
            <p style="font-weight: bold; color: #eee;">Select Reel from Gallery</p>
            <p style="font-size: 12px; color: #888;">Videos look best in 9:16 ratio</p>
        </div>

        <div class="tap-info" id="tapInfo" style="display:none;">✨ Video Selected! Tap to change</div>
    </div>

    <input type="file" id="fileInput" accept="video/*" onchange="previewVideo(event)">

    <script>
        function previewVideo(event) {
            const file = event.target.files[0];
            if (file) {
                const videoPreview = document.getElementById('videoPreview');
                const placeholder = document.getElementById('placeholder');
                const tapInfo = document.getElementById('tapInfo');
                
                // Video preview generate karna
                const videoURL = URL.createObjectURL(file);
                videoPreview.src = videoURL;
                videoPreview.style.display = 'block';
                placeholder.style.display = 'none';
                tapInfo.style.display = 'block';
            }
        }
    </script>
</body>
</html>
