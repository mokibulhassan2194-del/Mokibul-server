<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upload | Max Ful</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        body { 
            margin: 0; background: #000; color: white; font-family: sans-serif; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }
        .header { 
            padding: 15px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 0.1px solid #333; background: #000;
        }
        .header h2 { font-size: 18px; margin: 0; color: #FFD700; }
        .next-link { color: #FFD700; font-weight: bold; text-decoration: none; font-size: 16px; cursor: pointer; }
        .preview-container { 
            width: 100%; flex: 1; background: #111; display: flex; 
            align-items: center; justify-content: center; position: relative; 
        }
        #videoPreview, #imagePreview { width: 100%; height: 100%; object-fit: contain; display: none; }
        .upload-options { text-align: center; display: flex; gap: 40px; }
        .icon-circle { 
            width: 70px; height: 70px; border: 2px solid #FFD700; 
            border-radius: 20px; display: flex; align-items: center; 
            justify-content: center; margin-bottom: 10px; font-size: 30px; color: #FFD700;
        }
        .opt-box p { font-size: 14px; font-weight: bold; margin: 0; color: #eee; }
        #fileInput { display: none; }
        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
            flex-direction: column;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #FFD700; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p id="loaderText" style="margin-top: 15px; color: #FFD700; font-weight: bold;">Max Ful Pe Upload Ho Raha Hai...</p>
    </div>

    <div class="header">
        <a href="home.html" style="text-decoration:none; color: #fff; font-size: 24px;">✕</a>
        <h2 id="pageTitle">Create</h2>
        <div class="next-link" onclick="handleNext()">Next</div>
    </div>

    <div class="preview-container">
        <video id="videoPreview" autoplay muted loop playsinline></video>
        <img id="imagePreview">
        
        <div class="upload-options" id="placeholder">
            <div class="opt-box" onclick="openGallery('REEL')">
                <div class="icon-circle"><i class="fa-solid fa-clapperboard"></i></div>
                <p>Reel</p>
            </div>
            <div class="opt-box" onclick="openGallery('POST')">
                <div class="icon-circle"><i class="fa-regular fa-square-plus"></i></div>
                <p>Post</p>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" onchange="handleFile(event)">

    <script>
        // --- 1. FIREBASE CONFIG (Bhai yahan apni details sahi se dalo) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentMode = 'POST';
        let selectedFile = null;
        let userUID = "Guest_User"; // Default ID ताकि आप बाहर न फेंके जाओ

        // लॉगिन चेक (सिर्फ ID अपडेट करेगा, बाहर नहीं निकालेगा)
        auth.onAuthStateChanged((user) => {
            if (user) {
                userUID = user.uid;
                console.log("Logged in as:", userUID);
            } else {
                console.log("Using Guest Mode");
            }
        });

        // गैलरी खोलना
        window.openGallery = (mode) => {
            currentMode = mode;
            const input = document.getElementById('fileInput');
            input.accept = mode === 'REEL' ? "video/*" : "image/*"; 
            input.click();
        };

        // फाइल सिलेक्ट होने पर प्रिव्यू दिखाना
        window.handleFile = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            selectedFile = file;

            document.getElementById('placeholder').style.display = 'none';
            const iPrev = document.getElementById('imagePreview');
            const vPrev = document.getElementById('videoPreview');

            if (file.type.startsWith('image/')) {
                iPrev.src = URL.createObjectURL(file);
                iPrev.style.display = 'block';
                vPrev.style.display = 'none';
            } else {
                vPrev.src = URL.createObjectURL(file);
                vPrev.style.display = 'block';
                iPrev.style.display = 'none';
            }
        };

        // 'Next' बटन दबाने पर अपलोड शुरू करना
        window.handleNext = async () => {
            if (!selectedFile) {
                alert("Bhai, pehle photo/video toh select kar lo! 😂");
                return;
            }

            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            loader.style.display = 'flex';

            try {
                // Step 1: ImgBB पर फाइल भेजना
                loaderText.innerText = "Hosting Pe File Ja Rahi Hai...";
                const formData = new FormData();
                formData.append("image", selectedFile);
                const imgbbApiKey = "65799ddf574b2b2b142acf338241c1bc";

                const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbApiKey}`, {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    const downloadURL = result.data.url;

                    // Step 2: Firebase Firestore में डेटा सेव करना
                    loaderText.innerText = "Max Ful DB Mein Save Ho Raha Hai...";
                    
                    await db.collection("users").doc(userUID).collection("myPosts").add({
                        imageUrl: downloadURL,
                        type: currentMode,
                        caption: "Uploaded via Max Ful App",
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    alert("Bhai, " + currentMode + " Upload Ho Gayi! 🔥");
                    window.location.href = "profile.html"; 
                } else {
                    throw new Error("ImgBB Upload Fail Ho Gaya");
                }

            } catch (error) {
                console.error("Error details:", error);
                alert("Bhai abhi bhi error hai: " + error.message);
            } finally {
                loader.style.display = 'none';
            }
        };
    </script>
</body>
</html>
