<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Reel | Max Ful</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.1px solid #333; }
        .header h2 { font-size: 18px; margin: 0; }
        .next-link { color: #FFD700; font-weight: bold; text-decoration: none; font-size: 16px; cursor: pointer; }

        /* Video Preview Area - Full Screen Feel */
        .preview-container { width: 100%; flex: 1; background: #111; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #videoPreview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .placeholder-text { color: #888; text-align: center; cursor: pointer; }

        /* Hidden File Input */
        #fileInput { display: none; }

        /* Instructions */
        .tap-info { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(255,255,255,0.5); font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <span onclick="history.back()" style="cursor:pointer; font-size: 20px;">✕</span>
        <h2>New Reel</h2>
        <a href="share-reel.html" class="next-link">Next</a>
    </div>

    <div class="preview-container" onclick="document.getElementById('fileInput').click()">
        <video id="videoPreview" autoplay muted loop></video>
        
        <div class="placeholder-text" id="placeholder">
            <div style="font-size: 60px; color: #FFD700;">+</div>
            <p>Tap to select from Gallery</p>
        </div>

        <div class="tap-info" id="tapInfo" style="display:none;">Tap video to change</div>
    </div>

    <input type="file" id="fileInput" accept="video/*" onchange="previewVideo(event)">

    <script>
        function previewVideo(event) {
            const file = event.target.files[0];
            if (file) {
                const videoPreview = document.getElementById('videoPreview');
                const placeholder = document.getElementById('placeholder');
                const tapInfo = document.getElementById('tapInfo');
                
                videoPreview.src = URL.createObjectURL(file);
                videoPreview.style.display = 'block';
                placeholder.style.display = 'none';
                tapInfo.style.display = 'block';
            }
        }
    </script>
</body>
</html>
