<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upload | Max Ful</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            margin: 0; background: #000; color: white; font-family: sans-serif; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        .header { 
            padding: 15px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 0.1px solid #333; background: #000;
        }
        .header h2 { font-size: 18px; margin: 0; color: #FFD700; }
        .next-link { color: #FFD700; font-weight: bold; text-decoration: none; font-size: 16px; cursor: pointer; }

        .preview-container { 
            width: 100%; flex: 1; background: #111; display: flex; 
            align-items: center; justify-content: center; position: relative; 
        }
        #videoPreview, #imagePreview { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .upload-options { text-align: center; display: flex; gap: 40px; }
        .icon-circle { 
            width: 70px; height: 70px; border: 2px solid #FFD700; 
            border-radius: 20px; display: flex; align-items: center; 
            justify-content: center; margin-bottom: 10px; font-size: 30px; color: #FFD700;
        }
        .opt-box p { font-size: 14px; font-weight: bold; margin: 0; color: #eee; }

        #fileInput { display: none; }

        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
            flex-direction: column;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #FFD700; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p id="loaderText" style="margin-top: 15px; color: #FFD700; font-weight: bold;">Uploading to Max Ful...</p>
    </div>

    <div class="header">
        <a href="home.html" style="text-decoration:none; color: #fff; font-size: 24px;">✕</a>
        <h2 id="pageTitle">Create</h2>
        <div class="next-link" onclick="handleNext()">Next</div>
    </div>

    <div class="preview-container">
        <video id="videoPreview" autoplay muted loop playsinline></video>
        <img id="imagePreview">
        
        <div class="upload-options" id="placeholder">
            <div class="opt-box" onclick="openGallery('REEL')">
                <div class="icon-circle"><i class="fa-solid fa-clapperboard"></i></div>
                <p>Reel</p>
            </div>
            <div class="opt-box" onclick="openGallery('POST')">
                <div class="icon-circle"><i class="fa-regular fa-square-plus"></i></div>
                <p>Post</p>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" onchange="handleFile(event)">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyA4Z92DUiG6bJi8JEn4CoE6j03B8cF1dWE",
          authDomain: "max-ful-apps-cce76.firebaseapp.com",
          projectId: "max-ful-apps-cce76",
          storageBucket: "max-ful-apps-cce76.firebasestorage.app",
          messagingSenderId: "1097891042184",
          appId: "1:1097891042184:web:23c2d391f35a008774603d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentMode = 'POST';
        let selectedFile = null;

        window.openGallery = (mode) => {
            currentMode = mode;
            const input = document.getElementById('fileInput');
            // Note: ImgBB mostly support images. For reels (videos), you might need another solution later.
            input.accept = mode === 'REEL' ? "video/*" : "image/*";
            input.click();
        };

        window.handleFile = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            selectedFile = file;

            document.getElementById('placeholder').style.display = 'none';
            const vPrev = document.getElementById('videoPreview');
            const iPrev = document.getElementById('imagePreview');

            if (file.type.startsWith('video/')) {
                vPrev.src = URL.createObjectURL(file);
                vPrev.style.display = 'block';
                iPrev.style.display = 'none';
            } else {
                iPrev.src = URL.createObjectURL(file);
                iPrev.style.display = 'block';
                vPrev.style.display = 'none';
            }
        };

        window.handleNext = async () => {
            if (!selectedFile) {
                alert("Bhai, pehle kuch select toh karo! 😂");
                return;
            }

            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            loader.style.display = 'flex';

            try {
                // 1. ImgBB API का उपयोग करके फोटो अपलोड करें
                loaderText.innerText = "Uploading to ImgBB...";
                
                const formData = new FormData();
                formData.append("image", selectedFile);

                // आपकी ImgBB API Key यहाँ डाल दी है
                const imgbbApiKey = "65799ddf574b2b2b142acf338241c1bc";

                const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbApiKey}`, {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    const downloadURL = result.data.url;

                    // 2. लिंक को Firestore में सेव करें
                    loaderText.innerText = "Saving post to Max Ful...";
                    await addDoc(collection(db, "posts"), {
                        postUrl: downloadURL,
                        caption: "Uploaded via Max Ful",
                        type: currentMode,
                        likes: 0,
                        createdAt: serverTimestamp()
                    });

                    alert("Bhai, Post Upload Ho Gayi! 🔥");
                    window.location.href = "home.html";
                } else {
                    throw new Error("ImgBB Upload Failed");
                }

            } catch (error) {
                console.error(error);
                alert("Galti ho gayi bhai! Network या Firestore Rules चेक करें।");
            } finally {
                loader.style.display = 'none';
            }
        };
    </script>
</body>
</html>
