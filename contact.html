<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Contact Info</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 85%; text-align: center; max-width: 350px; }
        
        /* LOGO STYLE */
        .logo { font-size: 42px; font-weight: 900; color: #FFD700; margin-bottom: 10px; letter-spacing: 1px; }
        
        .instruction { color: #aaa; font-size: 14px; margin-bottom: 25px; line-height: 1.4; padding: 0 10px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 12px; color: #FFD700; margin-left: 5px; font-weight: bold; text-transform: uppercase; }
        
        input { 
            width: 100%; padding: 14px; margin-top: 5px; 
            background: #121212; border: 1px solid #333; 
            color: #fff; border-radius: 10px; box-sizing: border-box; 
            outline: none; font-size: 15px; transition: 0.3s;
        }
        
        input:focus { border-color: #FFD700; background: #1a1a1a; }

        .or-divider { margin: 20px 0; color: #555; font-size: 12px; font-weight: bold; position: relative; }

        .btn { 
            width: 100%; padding: 14px; background: #FFD700; 
            color: #000; border: none; font-weight: bold; 
            border-radius: 10px; cursor: pointer; 
            text-decoration: none; display: inline-block;
            font-size: 16px; margin-top: 10px; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }
        
        /* FIX: Back link updated to birthday.html */
        .back-link { margin-top: 20px; display: block; color: #aaa; text-decoration: none; font-size: 13px; font-weight: 500; }
        .back-link:hover { color: #FFD700; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">Max  ful</div>
        <p class="instruction">Enter your phone number or email to receive a verification code.</p>
        
        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" placeholder="+91 00000-00000">
        </div>

        <div class="or-divider">OR</div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" placeholder="example@mail.com">
        </div>
        
        <a href="otp.html" class="btn">Send OTP</a>
        
        <a href="birthday.html" class="back-link">Go Back</a>
    </div>
</body>
</html>
