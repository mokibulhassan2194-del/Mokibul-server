<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful | Contact Info</title>
    <style>
        body { 
            background: #000; color: #fff; font-family: sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; touch-action: manipulation;
        }
        .box { width: 85%; text-align: center; max-width: 350px; }
        
        .logo { font-size: 42px; font-weight: 900; color: #FFD700; margin-bottom: 5px; letter-spacing: 1px; }
        .sub-title { color: #fff; font-weight: bold; font-size: 18px; margin-bottom: 10px; }
        .info { color: #aaa; font-size: 14px; margin-bottom: 25px; line-height: 1.4; padding: 0 10px; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        .label { color: #FFD700; font-size: 12px; font-weight: bold; margin-bottom: 5px; display: block; text-transform: uppercase; }

        /* ZOOM FIX: Font-size 16px rakha gaya hai */
        input { 
            width: 100%; padding: 14px; background: #121212; 
            border: 1px solid #333; color: #fff; border-radius: 10px; 
            box-sizing: border-box; outline: none; font-size: 16px; 
            transition: border 0.3s;
        }
        input:focus { border-color: #FFD700; }

        .divider { margin: 20px 0; display: flex; align-items: center; color: #555; font-size: 13px; font-weight: bold; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #222; margin: 0 10px; }

        .btn { 
            width: 100%; padding: 14px; background: #FFD700; 
            color: #000; border: none; font-weight: bold; 
            border-radius: 10px; cursor: pointer; 
            text-decoration: none; display: inline-block; font-size: 16px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }
        
        .back-link { margin-top: 25px; display: block; color: #aaa; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">Max ful</div>
        <div class="sub-title">Contact Information</div>
        <p class="info">Enter your phone number or email to receive a verification code.</p>
        
        <div class="input-group">
            <span class="label">Phone Number</span>
            <input type="tel" placeholder="+91 00000-00000">
        </div>

        <div class="divider">OR</div>

        <div class="input-group">
            <span class="label">Email Address</span>
            <input type="email" placeholder="example@mail.com">
        </div>
        
        <a href="otp.html" class="btn">Send OTP</a>
        
        <a href="birthday.html" class="back-link">Go Back</a>
    </div>
</body>
</html>
