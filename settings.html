<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Settings</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        
        /* Header */
        .header {
            padding: 15px; display: flex; align-items: center;
            border-bottom: 1px solid #222; position: sticky; top: 0; background: #000;
        }
        .back-btn { font-size: 24px; text-decoration: none; color: #fff; margin-right: 20px; }
        .title { font-size: 18px; font-weight: bold; }

        /* Settings List */
        .settings-list { margin-top: 10px; }
        .item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #111; cursor: pointer;
            text-decoration: none; color: #fff;
        }
        .item:active { background: #111; }
        .item-info { display: flex; align-items: center; gap: 15px; }
        .icon { font-size: 20px; width: 25px; text-align: center; }
        .label { font-size: 15px; }
        .arrow { color: #555; font-size: 18px; }

        .section-title { padding: 15px 15px 5px 15px; font-size: 12px; color: #FFD700; text-transform: uppercase; letter-spacing: 1px; }
        
        .logout { color: #ff3b30; font-weight: bold; border-top: 1px solid #222; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="profile.html" class="back-btn">←</a>
        <div class="title">Settings and Activity</div>
    </div>

    <div class="settings-list">
        <div class="section-title">Account Settings</div>
        <a href="#" class="item">
            <div class="item-info"><span class="icon">👤</span><span class="label">Edit Profile</span></div>
            <span class="arrow">›</span>
        </a>

        <div class="section-title">Privacy & Safety</div>
        <a href="#" class="item">
            <div class="item-info"><span class="icon">🔒</span><span class="label">Account Privacy</span></div>
            <span class="arrow">›</span>
        </a>
        <a href="#" class="item">
            <div class="item-info"><span class="icon">🚫</span><span class="label">Blocked Accounts</span></div>
            <span class="arrow">›</span>
        </a>
        <a href="#" class="item">
            <div class="item-info"><span class="icon">👁️</span><span class="label">Hide Story and Live</span></div>
            <span class="arrow">›</span>
        </a>

        <div class="section-title">Preferences</div>
        <a href="#" class="item">
            <div class="item-info"><span class="icon">🔔</span><span class="label">Notifications</span></div>
            <span class="arrow">›</span>
        </a>
        <a href="#" class="item">
            <div class="item-info"><span class="icon">🌙</span><span class="label">Dark Mode</span></div>
            <span class="arrow">›</span>
        </a>

        <div class="section-title">Support</div>
        <a href="#" class="item">
            <div class="item-info"><span class="icon">🎧</span><span class="label">Help Center</span></div>
            <span class="arrow">›</span>
        </a>

        <a href="index.html" class="item logout">
            <div class="item-info"><span class="icon">🚪</span><span class="label">Log Out</span></div>
        </a>
    </div>

</body>
</html>
