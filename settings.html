<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Settings</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        
        /* Header */
        .header {
            display: flex; align-items: center; padding: 15px;
            border-bottom: 1px solid #222; position: sticky; top: 0; background: #000;
        }
        .back-btn { text-decoration: none; color: #fff; font-size: 24px; margin-right: 20px; }
        
        .section-title { padding: 20px 15px 10px; font-size: 14px; color: #aaa; font-weight: bold; }

        /* Menu Items */
        .menu-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #111;
            text-decoration: none; color: #fff; transition: background 0.3s;
        }
        .menu-item:active { background: #222; }
        .item-content { display: flex; align-items: center; gap: 15px; }
        .icon { font-size: 20px; }
        .arrow { color: #555; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <a href="profile.html" class="back-btn">←</a>
        <span style="font-size: 18px; font-weight: bold;">Settings and activity</span>
    </div>

    <div class="section-title">How you use Max Ful</div>

    <a href="edit-profile.html" class="menu-item">
        <div class="item-content">
            <span class="icon">👤</span>
            <span>Edit Profile</span>
        </div>
        <span class="arrow">&gt;</span>
    </a>

    <div class="section-title">Who can see your content</div>

    <a href="privacy.html" class="menu-item">
        <div class="item-content">
            <span class="icon">🔒</span>
            <span>Account Privacy</span>
        </div>
        <span class="arrow">&gt;</span>
    </a>

    <a href="blocked.html" class="menu-item">
        <div class="item-content">
            <span class="icon">🚫</span>
            <span>Blocked Accounts</span>
        </div>
        <span class="arrow">&gt;</span>
    </a>

    <div class="section-title">Login</div>

    <a href="login.html" class="menu-item">
        <div class="item-content">
            <span class="icon" style="color: #ff4d4d;">🚪</span>
            <span style="color: #ff4d4d;">Log Out</span>
        </div>
    </a>

</body>
</html>
