<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful | Profile</title>
    <style>
        body { 
            background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding-bottom: 70px; touch-action: manipulation; 
        }
        
        .profile-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; border-bottom: 1px solid #262626; position: sticky; top: 0; background: #000; z-index: 100;
        }
        .username { font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .blue-tick { color: #0095f6; font-size: 16px; }

        .profile-info { padding: 15px 15px 5px; display: flex; align-items: center; gap: 25px; }
        .profile-pic-container {
            width: 80px; height: 80px; border-radius: 50%; border: 1.5px solid #262626; padding: 3px;
        }
        .has-story { border: 2.5px solid #FFD700; }
        .profile-pic-container img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .stats { display: flex; flex-grow: 1; justify-content: space-around; text-align: center; }
        .stat-num { font-weight: bold; font-size: 18px; display: block; }
        .stat-label { font-size: 13px; color: #efefef; }

        .profile-details { padding: 5px 15px 10px; }
        .full-name { font-weight: 600; font-size: 15px; }
        .bio { font-size: 14px; line-height: 1.4; white-space: pre-wrap; }

        .btn-container { display: flex; gap: 8px; padding: 10px 15px; }
        .edit-btn {
            flex: 1; background: #262626; color: #fff; text-align: center; 
            padding: 8px; border-radius: 8px; font-size: 14px; font-weight: 600; 
            border: none; cursor: pointer; text-decoration: none;
        }

        .highlights { display: flex; gap: 15px; padding: 10px 15px; overflow-x: auto; scrollbar-width: none; }
        .highlight-item { text-align: center; min-width: 64px; }
        .highlight-circle { 
            width: 58px; height: 58px; border-radius: 50%; border: 1px solid #262626; 
            padding: 2px; background: #000; margin-bottom: 4px; display: flex; align-items: center; justify-content: center;
        }
        .highlight-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .highlight-text { font-size: 12px; }

        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: #000;
        }
        .modal-content {
            width: 100%; height: 100%; display: flex; flex-direction: column;
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #262626;
        }
        .modal-tabs { display: flex; border-bottom: 1px solid #262626; }
        .modal-tab { 
            flex: 1; text-align: center; padding: 12px; font-size: 14px; color: #8e8e8e; 
            border-bottom: 2px solid transparent; 
        }
        .modal-tab.active { color: #fff; border-bottom: 2px solid #fff; font-weight: bold; }

        .user-list { overflow-y: auto; flex-grow: 1; padding: 10px 15px; }
        .user-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
        .user-item img { width: 54px; height: 54px; border-radius: 50%; border: 1.5px solid #262626; padding: 2px; }
        .user-info { flex-grow: 1; margin-left: 12px; }
        .user-name { font-weight: 600; font-size: 14px; }
        .user-realname { color: #8e8e8e; font-size: 13px; }
        .msg-btn { background: #262626; color: #fff; border: none; padding: 7px 15px; border-radius: 8px; font-weight: 600; font-size: 13px; }

        .tabs { display: flex; justify-content: space-around; border-top: 1px solid #262626; margin-top: 10px; }
        .tab-item { padding: 12px; font-size: 22px; color: #8e8e8e; flex: 1; text-align: center; }
        .active-tab { color: #fff; border-bottom: 1.5px solid #fff; }
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #111; position: relative; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 55px; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { color: #fff; text-decoration: none; font-size: 26px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="username">makibul_vlogs <span class="blue-tick">✔️</span></div>
        <div style="display: flex; gap: 20px;">
            <span>➕</span>
            <span>☰</span>
        </div>
    </div>

    <div class="profile-info">
        <div class="profile-pic-container has-story">
            <img src="https://picsum.photos/id/64/200/200">
        </div>
        <div class="stats">
            <div><span class="stat-num">12</span><span class="stat-label">Posts</span></div>
            <div onclick="openUserList('Followers')" style="cursor:pointer;"><span class="stat-num">5.2k</span><span class="stat-label">Followers</span></div>
            <div onclick="openUserList('Following')" style="cursor:pointer;"><span class="stat-num">150</span><span class="stat-label">Following</span></div>
        </div>
    </div>

    <div class="profile-details">
        <div class="full-name">Makibul Islam</div>
        <div class="bio">🎬 4K Video Creator | Tech Enthusiast
🚀 Working on Max Ful App
📍 India</div>
    </div>

    <div class="btn-container">
        <a href="#" class="edit-btn">Edit Profile</a>
        <button class="edit-btn">Share Profile</button>
    </div>

    <div class="highlights">
        <div class="highlight-item"><div class="highlight-circle"><img src="https://picsum.photos/id/101/100"></div><span class="highlight-text">Gym</span></div>
        <div class="highlight-item"><div class="highlight-circle"><img src="https://picsum.photos/id/102/100"></div><span class="highlight-text">Travel</span></div>
        <div class="highlight-item"><div class="highlight-circle"><img src="https://picsum.photos/id/103/100"></div><span class="highlight-text">Vlogs</span></div>
        <div class="highlight-item"><div class="highlight-circle" style="font-size:24px;">+</div><span class="highlight-text">New</span></div>
    </div>

    <div class="tabs">
        <div class="tab-item active-tab">🔳</div>
        <div class="tab-item">🎬</div>
        <div class="tab-item">👥</div>
    </div>

    <div class="post-grid">
        <div class="grid-item"><img src="https://picsum.photos/id/10/300/300"></div>
        <div class="grid-item"><img src="https://picsum.photos/id/11/300/300"></div>
        <div class="grid-item"><img src="https://picsum.photos/id/12/300/300"></div>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div style="display: flex; align-items: center; gap: 25px;">
                    <span style="font-size: 24px; cursor: pointer;" onclick="closeModal()">←</span>
                    <h3 id="modalTitle" style="margin: 0; font-size: 20px;">Following</h3>
                </div>
                <span style="font-size: 22px;">👤+</span>
            </div>
            
            <div class="modal-tabs">
                <div class="modal-tab" id="followerTab">Followers</div>
                <div class="modal-tab active" id="followingTab">Following</div>
                <div class="modal-tab">Subscriptions</div>
            </div>

            <div class="user-list" id="listBody"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-link">🏠</a>
        <a href="search.html" class="nav-link">🔍</a>
        <a href="upload.html" style="font-size: 32px; color: #FFD700;">➕</a>
        <a href="reels.html" class="nav-link">🎬</a>
        <a href="profile.html" class="nav-link">👤</a>
    </div>

    <script>
        function openUserList(type) {
            document.getElementById('userModal').style.display = "block";
            const listBody = document.getElementById('listBody');
            listBody.innerHTML = "";

            const users = [
                {n: "itz_xx_killer_", r: "itz xx killer ki...", img: "https://i.pravatar.cc/150?u=1"},
                {n: "anowarrrrrrrr", r: "1 new post • 🔵", img: "https://i.pravatar.cc/150?u=2"},
                {n: "zuharashid", r: "Zuha Rashid", img: "https://i.pravatar.cc/150?u=3", v: true},
                {n: "akshaykumar", r: "Akshay Kumar", img: "https://i.pravatar.cc/150?u=4", v: true}
            ];

            users.forEach(u => {
                let tick = u.v ? '<span style="color:#0095f6;"> ✔️</span>' : '';
                listBody.innerHTML += `
                    <div class="user-item">
                        <div style="display: flex; align-items: center;">
                            <img src="${u.img}">
                            <div class="user-info">
                                <div class="user-name">${u.n}${tick}</div>
                                <div class="user-realname">${u.r}</div>
                            </div>
                        </div>
                        <button class="msg-btn">Message</button>
                    </div>
                `;
            });
        }

        function closeModal() {
            document.getElementById('userModal').style.display = "none";
        }
    </script>
</body>
</html>
