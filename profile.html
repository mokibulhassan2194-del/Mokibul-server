<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Max Ful | Official Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
        body { padding-bottom: 60px; } 
        * { box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; position: sticky; top: 0; background: #000; z-index: 1000; border-bottom: 0.1px solid #262626; }
        .username-area { font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .header-icons { display: flex; gap: 20px; font-size: 20px; }
        .header-icons a { color: #fff; text-decoration: none; }
        .profile-container { padding: 10px 15px; }
        .top-row { display: flex; align-items: center; gap: 25px; margin-bottom: 12px; }
        .profile-pic { width: 86px; height: 86px; border-radius: 50%; border: 1.5px solid #262626; padding: 3px; background: #121212; }
        .profile-pic img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .stats-row { display: flex; flex: 1; justify-content: space-around; text-align: center; }
        .stat-link { text-decoration: none; color: white; cursor: pointer; }
        .stat-val { font-weight: bold; font-size: 18px; display: block; }
        .stat-name { font-size: 13px; color: #a8a8a8; }
        .bio-data { padding: 0 5px; margin-bottom: 15px; }
        .full-name { font-weight: 600; font-size: 14px; display: block; }
        .bio-text { font-size: 14px; margin-top: 2px; line-height: 1.4; color: #efefef; white-space: pre-wrap; }
        .btns { display: flex; gap: 8px; margin-bottom: 20px; }
        .btn { flex: 1; background: #1a1a1a; border: 1px solid #363636; border-radius: 8px; padding: 7px; font-size: 14px; font-weight: 600; text-align: center; color: white; text-decoration: none; }
        .post-tabs { display: flex; border-top: 1px solid #262626; }
        .tab { flex: 1; text-align: center; padding: 12px; font-size: 20px; color: #a8a8a8; }
        .tab.active { color: #fff; border-bottom: 2px solid #fff; }
        .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1 / 1; background: #1a1a1a; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 50px; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { color: #fff; font-size: 24px; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="username-area">
            <span id="headerUsername">loading...</span> 
            <svg id="verifiedBadge" style="display:none;" fill="#0095f6" height="18" viewBox="0 0 40 40" width="18"><path d="M19.998 3.094 14.638 0l-2.972 5.15H5.432v6.354L0 14.64l3.094 5.36L0 25.359l5.432 3.137v6.354h6.234l2.972 5.15 5.36-3.137 5.36 3.137 2.972-5.15h6.234v-6.354l5.432-3.137-3.094-5.36 3.094-5.36-5.432-3.137v-6.354h-6.234L25.359 0l-5.361 3.094Z"></path><path d="M16.816 27.253l-8.155-8.154 2.812-2.811 5.343 5.344 11.697-11.697 2.812 2.811-14.509 14.507z" fill="#fff"></path></svg>
        </div>
        <div class="header-icons">
            <a href="upload.html"><i class="far fa-plus-square"></i></a> 
            <a href="settings.html"><i class="fa-solid fa-bars"></i></a>
        </div>
    </div>

    <div class="profile-container">
        <div class="top-row">
            <div class="profile-pic">
                <img id="profileImage" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            </div>
            <div class="stats-row">
                <div class="stat-link">
                    <span class="stat-val" id="countPosts">0</span>
                    <span class="stat-name">Posts</span>
                </div>
                <div class="stat-link">
                    <span class="stat-val" id="countFollowers">0</span>
                    <span class="stat-name">Followers</span>
                </div>
                <div class="stat-link">
                    <span class="stat-val" id="countFollowing">0</span>
                    <span class="stat-name">Following</span>
                </div>
            </div>
        </div>

        <div class="bio-data">
            <span class="full-name" id="displayFullName">Mokibul Hassan</span>
            <div class="bio-text" id="displayBio">Android Developer</div>
        </div>

        <div class="btns">
            <a href="edit-profile.html" class="btn">Edit Profile</a> 
            <a href="share-profile.html" class="btn">Share profile</a>
        </div>

        <div class="post-tabs">
            <div class="tab active"><i class="fa-solid fa-table-cells"></i></div>
            <div class="tab"><i class="fa-solid fa-clapperboard"></i></div>
            <div class="tab"><i class="fa-regular fa-user"></i></div>
        </div>

        <div class="posts-grid" id="postsGrid"></div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-link"><i class="fa-solid fa-house"></i></a> 
        <a href="search.html" class="nav-link"><i class="fa-solid fa-magnifying-glass"></i></a> 
        <a href="upload.html" class="nav-link"><i class="fa-regular fa-square-plus"></i></a> 
        <a href="reels.html" class="nav-link"><i class="fa-solid fa-clapperboard"></i></a> 
        <a href="profile.html" class="nav-link"><i class="fa-solid fa-circle-user"></i></a> 
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4Z92DUiG6bJi8JEn4CoE6j03B8cF1dWE",
            authDomain: "max-ful-apps-cce76.firebaseapp.com",
            projectId: "max-ful-apps-cce76",
            storageBucket: "max-ful-apps-cce76.firebasestorage.app",
            messagingSenderId: "1097891042184",
            appId: "1:1097891042184:web:23c2d391f35a008774603d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    document.getElementById('headerUsername').innerText = user.email.split('@')[0];
                    const docRef = doc(db, "users", user.uid); 
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        document.getElementById('displayFullName').innerText = data.fullName || "Mokibul Hassan";
                        document.getElementById('displayBio').innerText = data.bio || "Android Developer";
                        document.getElementById('headerUsername').innerText = data.username || user.email.split('@')[0];
                        if(data.profilePicUrl) { document.getElementById('profileImage').src = data.profilePicUrl; }
                    }
                    loadUserPosts(user.uid);
                } catch (error) { console.error("Error:", error); }
            } else { 
                loadUserPosts("Guest_User"); 
            }
        });

        async function loadUserPosts(uid) {
            const postsGrid = document.getElementById('postsGrid');
            // 'orderBy' हटा दिया गया है ताकि बिना इंडेक्स के भी डेटा लोड हो सके
            const q = query(collection(db, "allPosts"), where("userId", "==", uid));
            
            try {
                const querySnapshot = await getDocs(q);
                let postCount = 0;
                postsGrid.innerHTML = "";
                
                querySnapshot.forEach((doc) => {
                    postCount++;
                    postsGrid.innerHTML += `<div class="grid-item"><img src="${doc.data().imageUrl}"></div>`;
                });
                
                document.getElementById('countPosts').innerText = postCount;
                if(postCount === 0) { 
                    postsGrid.innerHTML = "<p style='grid-column: span 3; text-align: center; padding: 20px; color: #a8a8a8;'>No posts yet</p>"; 
                }
            } catch (err) {
                console.error("Posts Load Error:", err);
                postsGrid.innerHTML = "<p style='grid-column: span 3; text-align: center; padding: 20px; color: red;'>Database Error</p>";
            }
        }
    </script>
</body>
</html>
