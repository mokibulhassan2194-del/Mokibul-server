<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful | Official</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding-bottom: 60px; }
        
        /* Top Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; position: sticky; top: 0; background: #000; z-index: 1000; border-bottom: 0.1px solid #262626; }
        .username-area { font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .header-icons { display: flex; gap: 20px; font-size: 20px; }

        /* Profile Info */
        .profile-container { padding: 15px; }
        .top-row { display: flex; align-items: center; gap: 25px; margin-bottom: 15px; }
        .profile-pic { width: 85px; height: 85px; border-radius: 50%; border: 2px solid #262626; padding: 3px; position: relative; }
        .profile-pic img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .add-icon { position: absolute; bottom: 0; right: 0; background: #0095f6; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border: 2px solid #000; font-size: 12px; }

        .stats-row { display: flex; flex: 1; justify-content: space-around; text-align: center; }
        .stat-val { font-weight: bold; font-size: 17px; display: block; }
        .stat-name { font-size: 13px; color: #a8a8a8; }

        .bio-data { margin-bottom: 15px; }
        .full-name { font-weight: 600; font-size: 14px; display: block; }
        .bio-text { font-size: 14px; white-space: pre-wrap; margin-top: 2px; }

        /* Action Buttons */
        .btns { display: flex; gap: 8px; margin-bottom: 20px; }
        .btn { flex: 1; background: #1a1a1a; border: 1px solid #363636; border-radius: 8px; padding: 7px; font-size: 14px; font-weight: 600; text-align: center; color: white; cursor: pointer; }

        /* Tab Icons (Grid, Reels, Tags) */
        .tabs { display: flex; border-top: 0.1px solid #262626; }
        .tab { flex: 1; text-align: center; padding: 12px; font-size: 20px; color: #a8a8a8; cursor: pointer; }
        .tab.active { color: #fff; border-bottom: 2px solid #fff; }

        /* Grid */
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Bottom Nav Bar */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 50px; background: #000; border-top: 0.1px solid #262626; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: #fff; font-size: 22px; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="username-area">
            <span id="display-username">loading...</span>
            <i class="fas fa-certificate" style="color: #0095f6; font-size: 14px;"></i>
        </div>
        <div class="header-icons">
            <i class="far fa-square-plus"></i>
            <i class="fas fa-bars"></i>
        </div>
    </div>

    <div class="profile-container">
        <div class="top-row">
            <div class="profile-pic">
                <img src="https://picsum.photos/id/64/200/200" id="user-img">
                <div class="add-icon"><i class="fas fa-plus"></i></div>
            </div>
            <div class="stats-row">
                <div><span class="stat-val" id="posts">0</span><span class="stat-name">Posts</span></div>
                <div><span class="stat-val" id="followers">0</span><span class="stat-name">Followers</span></div>
                <div><span class="stat-val" id="following">0</span><span class="stat-name">Following</span></div>
            </div>
        </div>

        <div class="bio-data">
            <span class="full-name" id="display-name">Loading Name...</span>
            <div class="bio-text" id="display-bio">Loading bio information...</div>
        </div>

        <div class="btns">
            <div class="btn" onclick="editProfile()">Edit Profile</div>
            <div class="btn">Share profile</div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active"><i class="fas fa-table-cells"></i></div>
        <div class="tab"><i class="fas fa-film"></i></div> <div class="tab"><i class="far fa-id-badge"></i></div>
    </div>

    <div class="post-grid">
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=1"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=2"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=3"></div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item"><i class="fas fa-house"></i></a> <a href="#" class="nav-item"><i class="fas fa-magnifying-glass"></i></a> <a href="#" class="nav-item"><i class="far fa-square-plus"></i></a> <a href="#" class="nav-item"><i class="fas fa-clapperboard"></i></a> <a href="#" class="nav-item"><i class="fas fa-circle-user"></i></a> </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA4Z92DUiG6bJi8JEn4CoE6j03B8cF1dWE",
            authDomain: "max-ful-apps-cce76.firebaseapp.com",
            projectId: "max-ful-apps-cce76",
            storageBucket: "max-ful-apps-cce76.firebasestorage.app",
            messagingSenderId: "1097891042184",
            appId: "1:1097891042184:web:23c2d391f35a008774603d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const userId = "main_profile_01"; // इसे अपने हिसाब से रखें

        function loadData() {
            db.collection("users").doc(userId).onSnapshot((doc) => {
                if (doc.exists) {
                    const d = doc.data();
                    document.getElementById('display-username').innerText = d.username || "user";
                    document.getElementById('display-name').innerText = d.name || "Set Name";
                    document.getElementById('display-bio').innerText = d.bio || "No bio";
                    document.getElementById('followers').innerText = d.followers || "0";
                    document.getElementById('following').innerText = d.following || "0";
                    document.getElementById('posts').innerText = d.posts || "0";
                }
            });
        }

        async function editProfile() {
            const nName = prompt("Name:");
            const nBio = prompt("Bio:");
            const nUser = prompt("Username:");
            if(nName || nBio || nUser) {
                await db.collection("users").doc(userId).set({
                    name: nName, bio: nBio, username: nUser,
                    followers: "150", following: "200", posts: "3"
                }, {merge: true});
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
