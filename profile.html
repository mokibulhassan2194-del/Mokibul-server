<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Max Ful | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        html, body { 
            background-color: #000; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0; width: 100%; overflow-x: hidden; touch-action: manipulation;
        }
        body { padding-bottom: 70px; } 
        * { box-sizing: border-box; }

        /* Header */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 15px; position: sticky; top: 0; background: #000; 
            z-index: 1000; border-bottom: 0.1px solid #262626;
        }
        .username-area { font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .header-icons { display: flex; gap: 20px; font-size: 20px; align-items: center; }
        .menu-btn { cursor: pointer; color: #fff; text-decoration: none; }

        /* Profile Details */
        .profile-container { padding: 15px; width: 100%; }
        .top-row { display: flex; align-items: center; gap: 25px; margin-bottom: 15px; }
        .profile-pic { width: 85px; height: 85px; border-radius: 50%; border: 2px solid #262626; padding: 3px; position: relative; flex-shrink: 0; }
        .profile-pic img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .stats-row { display: flex; flex: 1; justify-content: space-around; text-align: center; }
        .stat-link { text-decoration: none; color: inherit; cursor: pointer; }
        .stat-val { font-weight: bold; font-size: 17px; display: block; }
        .stat-name { font-size: 13px; color: #a8a8a8; }

        .bio-data { margin-bottom: 15px; padding: 0 5px; }
        .full-name { font-weight: 600; font-size: 14px; display: block; }
        .bio-text { font-size: 14px; white-space: pre-wrap; margin-top: 2px; }

        .btns { display: flex; gap: 8px; margin-bottom: 20px; padding: 0 5px; }
        .btn { flex: 1; background: #1a1a1a; border: 1px solid #363636; border-radius: 8px; padding: 7px; font-size: 14px; font-weight: 600; text-align: center; color: white; cursor: pointer; text-decoration: none; display: block; }

        .tabs { display: flex; border-top: 0.1px solid #262626; width: 100%; }
        .tab { flex: 1; text-align: center; padding: 12px; font-size: 20px; color: #a8a8a8; cursor: pointer; }
        .tab.active { color: #fff; border-bottom: 2px solid #fff; }

        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; width: 100%; }
        .grid-item { aspect-ratio: 1/1; background: #121212; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 55px; 
            background: #000; border-top: 0.1px solid #262626; 
            display: flex; justify-content: space-around; 
            align-items: center; z-index: 1000; 
        }
        .nav-item { color: #fff; font-size: 25px; text-decoration: none; opacity: 0.7; transition: 0.2s; }
        .nav-item.active { opacity: 1; }
    </style>
</head>
<body>

    <div class="header">
        <div class="username-area">
            <span id="display-username">mokibul_hassan</span>
            <i class="fas fa-certificate" style="color: #0095f6; font-size: 14px;"></i>
        </div>
        <div class="header-icons">
            <i class="far fa-square-plus"></i>
            <a href="settings.html" class="menu-btn">
                <i class="fas fa-bars"></i>
            </a>
        </div>
    </div>

    <div class="profile-container">
        <div class="top-row">
            <div class="profile-pic">
                <img src="https://picsum.photos/id/64/200/200" id="user-img">
            </div>
            <div class="stats-row">
                <div class="stat-link">
                    <span class="stat-val">3</span><span class="stat-name">Posts</span>
                </div>
                <a href="followers.html" class="stat-link">
                    <span class="stat-val">120</span><span class="stat-name">Followers</span>
                </a>
                <a href="following.html" class="stat-link">
                    <span class="stat-val">150</span><span class="stat-name">Following</span>
                </a>
            </div>
        </div>

        <div class="bio-data">
            <span class="full-name" id="display-name">Mokibul Hassan</span>
            <div id="display-bio" class="bio-text">Android Developer | Max Ful Official App 🚀</div>
        </div>

        <div class="btns">
            <a href="edit-profile.html" class="btn">Edit Profile</a>
            <a href="share-profile.html" class="btn">Share profile</a>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active"><i class="fas fa-table-cells"></i></div>
        <div class="tab"><i class="fas fa-film"></i></div> 
        <div class="tab"><i class="far fa-id-badge"></i></div>
    </div>

    <div class="post-grid">
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=1"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=2"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=3"></div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fas fa-house"></i></a> 
        <a href="search.html" class="nav-item"><i class="fas fa-magnifying-glass"></i></a> 
        <a href="upload.html" class="nav-item" style="color: #FFD700; font-size: 28px;"><i class="far fa-square-plus"></i></a> 
        <a href="reels.html" class="nav-item"><i class="fas fa-clapperboard"></i></a> 
        <a href="profile.html" class="nav-item active"><i class="fas fa-circle-user"></i></a> 
    </div>

</body>
</html>
