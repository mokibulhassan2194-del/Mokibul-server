<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Profile</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* Top Header */
        .profile-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #222; position: sticky; top: 0; background: #000; z-index: 100;
        }
        .username { font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .blue-tick { background: #0095f6; color: #fff; border-radius: 50%; width: 15px; height: 15px; font-size: 10px; display: flex; align-items: center; justify-content: center; }

        /* Profile Info */
        .profile-info { padding: 15px; display: flex; align-items: center; gap: 20px; }
        .profile-pic-container {
            width: 80px; height: 80px; 
            border-radius: 50%; border: 2px solid #FFD700; 
            padding: 3px; overflow: hidden;
        }
        .profile-pic-container img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #333; }

        .stats { display: flex; flex-grow: 1; justify-content: space-around; text-align: center; }
        .stat-num { font-weight: bold; font-size: 18px; display: block; }
        .stat-label { font-size: 12px; color: #aaa; }

        /* Bio */
        .profile-details { padding: 0 15px 10px; }
        .full-name { font-weight: bold; font-size: 15px; }
        .bio { font-size: 13px; color: #ddd; line-height: 1.5; }

        /* Highlights */
        .highlights { display: flex; gap: 15px; padding: 10px 15px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .highlight-item { text-align: center; display: inline-block; }
        .highlight-circle { width: 56px; height: 56px; border-radius: 50%; border: 1px solid #333; padding: 2px; background: #111; margin-bottom: 5px; }
        .highlight-text { font-size: 11px; color: #eee; }

        /* Buttons */
        .btn-container { display: flex; gap: 10px; padding: 10px 15px; }
        .edit-btn {
            flex: 1; background: #262626; color: #fff; 
            text-align: center; padding: 8px; border-radius: 8px;
            text-decoration: none; font-size: 14px; font-weight: bold; border: 1px solid #333;
        }

        /* Tabs */
        .tabs { display: flex; justify-content: space-around; border-top: 1px solid #222; margin-top: 10px; }
        .tab-item { padding: 12px; font-size: 20px; color: #aaa; cursor: pointer; flex: 1; text-align: center; }
        .active-tab { color: #fff; border-bottom: 2px solid #fff; }

        /* Grid */
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #111; position: relative; border: 0.1px solid #222; overflow: hidden; }
        .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        .play-count { position: absolute; bottom: 5px; left: 5px; font-size: 10px; color: #fff; display: flex; align-items: center; gap: 3px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { color: #fff; text-decoration: none; font-size: 24px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="username">makibul_vlogs <div class="blue-tick">✓</div></div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <a href="upload.html" style="text-decoration:none; color: #fff; font-size: 24px;">➕</a>
            <a href="settings.html" style="text-decoration:none; color: #fff; font-size: 24px; padding: 5px;">☰</a>
        </div>
    </div>

    <div class="profile-info">
        <div class="profile-pic-container">
            <img src="my-photo.jpg.jpg" alt="Profile">
        </div>
        <div class="stats">
            <div><span class="stat-num">12</span><span class="stat-label">Posts</span></div>
            <div><span class="stat-num">5.2k</span><span class="stat-label">Followers</span></div>
            <div><span class="stat-num">150</span><span class="stat-label">Following</span></div>
        </div>
    </div>

    <div class="profile-details">
        <div class="full-name">Makibul Islam</div>
        <div class="bio">🎬 4K Video Creator | Tech Enthusiast<br>🚀 Working on Max Ful App<br>📍 India</div>
    </div>

    <div class="highlights">
        <div class="highlight-item">
            <div class="highlight-circle"><div style="width:100%; height:100%; background:#222; border-radius:50%;"></div></div>
            <span class="highlight-text">Gym</span>
        </div>
        <div class="highlight-item">
            <div class="highlight-circle"><div style="width:100%; height:100%; background:#222; border-radius:50%;"></div></div>
            <span class="highlight-text">Travel</span>
        </div>
        <div class="highlight-item">
            <div class="highlight-circle"><div style="width:100%; height:100%; background:#222; border-radius:50%;"></div></div>
            <span class="highlight-text">Vlogs</span>
        </div>
        <div class="highlight-item">
            <div class="highlight-circle"><div style="width:100%; height:100%; background:#222; border-radius:50%; display:flex; align-items:center; justify-content:center;">+</div></div>
            <span class="highlight-text">New</span>
        </div>
    </div>

    <div class="btn-container">
        <a href="edit-profile.html" class="edit-btn">Edit Profile</a>
        <a href="#" class="edit-btn">Share Profile</a>
    </div>

    <div class="tabs">
        <div class="tab-item active-tab">🔳</div>
        <div class="tab-item">🎬</div>
        <div class="tab-item">👥</div>
    </div>

    <div class="post-grid">
        <div class="grid-item">
            <video muted autoplay loop>
                <source src="your-video.mp4" type="video/mp4">
            </video>
            <div class="play-count">▶ 105k</div>
        </div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-link">🏠</a>
        <a href="search.html" class="nav-link">🔍</a>
        <a href="upload.html" style="font-size: 32px; color: #FFD700; text-decoration: none;">➕</a>
        <a href="reels.html" class="nav-link">🎬</a>
        <a href="profile.html" class="nav-link" style="color: #FFD700;">👤</a>
    </div>

</body>
</html>
