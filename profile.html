<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful | Profile</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { 
            background-color: #000; color: #fff; font-family: -apple-system, sans-serif; 
            margin: 0; padding-bottom: 65px; overflow-x: hidden;
        }
        .profile-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; border-bottom: 1px solid #262626; position: sticky; top: 0; background: #000; z-index: 100;
        }
        .header-right { display: flex; gap: 18px; align-items: center; }
        .header-btn { text-decoration: none; color: #fff; font-size: 22px; cursor: pointer; }
        .profile-info { padding: 12px 15px; display: flex; align-items: center; gap: 20px; }
        .profile-pic-container { width: 77px; height: 77px; border-radius: 50%; border: 1.5px solid #262626; padding: 2px; }
        .has-story { border: 2px solid #FFD700; }
        .profile-pic-container img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .stats { display: flex; flex-grow: 1; justify-content: space-around; text-align: center; }
        .stat-num { font-weight: bold; font-size: 16px; display: block; }
        .stat-label { font-size: 12px; color: #efefef; }
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 50px; 
            background: #000; border-top: 1px solid #262626; 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; 
        }
        .nav-link { color: #fff; text-decoration: none; font-size: 22px; }
        .plus-btn { font-size: 30px; color: #FFD700; text-decoration: none; font-weight: bold; }
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; margin-top: 10px; }
        .grid-item { aspect-ratio: 1/1; background: #111; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div id="display-username" style="font-size: 18px; font-weight: bold;">Loading... <span style="color:#0095f6;">✔️</span></div>
        <div class="header-right">
            <a href="upload.html" class="header-btn">➕</a>
            <a href="settings.html" class="header-btn">☰</a>
        </div>
    </div>

    <div class="profile-info">
        <div class="profile-pic-container has-story">
            <img src="https://picsum.photos/id/64/200/200">
        </div>
        <div class="stats">
            <div><span class="stat-num" id="display-posts">0</span><span class="stat-label">Posts</span></div>
            <div><span class="stat-num" id="display-followers">0</span><span class="stat-label">Followers</span></div>
            <div><span class="stat-num" id="display-following">0</span><span class="stat-label">Following</span></div>
        </div>
    </div>

    <div style="padding: 5px 15px;">
        <div id="display-name" style="font-weight: 600; font-size: 14px;">Loading...</div>
        <div id="display-bio" style="font-size: 13px; line-height: 1.3; white-space: pre-wrap;">Loading bio...</div>
    </div>

    <div style="display: flex; gap: 6px; padding: 10px 15px;">
        <a href="edit-profile.html" style="flex:1; background:#262626; color:#fff; text-align:center; padding:7px; border-radius:6px; text-decoration:none; font-weight:600; font-size:13px;">Edit Profile</a>
        <button style="flex:1; background:#262626; color:#fff; border:none; padding:7px; border-radius:6px; font-weight:600; font-size:13px;">Share Profile</button>
    </div>

    <div class="post-grid" id="postGrid">
        <div class="grid-item"><img src="https://picsum.photos/id/10/300/300"></div>
        <div class="grid-item"><img src="https://picsum.photos/id/11/300/300"></div>
        <div class="grid-item"><img src="https://picsum.photos/id/12/300/300"></div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-link">🏠</a>
        <a href="search.html" class="nav-link">🔍</a>
        <a href="upload.html" class="plus-btn">+</a>
        <a href="reels.html" class="nav-link">🎬</a>
        <a href="profile.html" class="nav-link">👤</a>
    </div>

    <script>
        // तुम्हारी असली Firebase Config यहाँ डाल दी है
        const firebaseConfig = {
            apiKey: "AIzaSyA4Z92DUiG6bJi8JEn4CoE6j03B8cF1dWE",
            authDomain: "max-ful-apps-cce76.firebaseapp.com",
            projectId: "max-ful-apps-cce76",
            storageBucket: "max-ful-apps-cce76.firebasestorage.app",
            messagingSenderId: "1097891042184",
            appId: "1:1097891042184:web:23c2d391f35a008774603d"
        };

        // Firebase Initialize
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function loadProfile() {
            // तुम्हारी असली Document ID यहाँ डाल दी है
            db.collection("users").doc("ScOZEm uVToVfI4qoHO fZ").get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('display-username').innerText = data.username || "User";
                    document.getElementById('display-name').innerText = data.name || "Makibul Islam";
                    document.getElementById('display-bio').innerText = data.bio || "Bio not set";
                    document.getElementById('display-followers').innerText = data.followers || "0";
                    document.getElementById('display-following').innerText = data.following || "0";
                    document.getElementById('display-posts').innerText = data.posts || "0";
                } else {
                    console.log("No such document! ID check karein.");
                }
            }).catch((error) => {
                console.log("Error getting document:", error);
            });
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
