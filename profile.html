<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful | Profile</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 65px; overflow-x: hidden; }
        .profile-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid #262626; position: sticky; top: 0; background: #000; z-index: 100; }
        .profile-info { padding: 12px 15px; display: flex; align-items: center; gap: 20px; }
        .profile-pic-container { width: 77px; height: 77px; border-radius: 50%; border: 2px solid #FFD700; padding: 2px; }
        .profile-pic-container img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .stats { display: flex; flex-grow: 1; justify-content: space-around; text-align: center; }
        .stat-num { font-weight: bold; font-size: 16px; display: block; }
        .stat-label { font-size: 12px; color: #efefef; }
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; margin-top: 10px; }
        .grid-item { aspect-ratio: 1/1; background: #111; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 50px; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; align-items: center; }
        .nav-link { color: #fff; text-decoration: none; font-size: 22px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div id="display-username" style="font-size: 18px; font-weight: bold;">Loading... ✔️</div>
    </div>

    <div class="profile-info">
        <div class="profile-pic-container">
            <img src="https://picsum.photos/id/64/200/200">
        </div>
        <div class="stats">
            <div><span class="stat-num" id="display-posts">0</span><span class="stat-label">Posts</span></div>
            <div><span class="stat-num" id="display-followers">0</span><span class="stat-label">Followers</span></div>
            <div><span class="stat-num" id="display-following">0</span><span class="stat-label">Following</span></div>
        </div>
    </div>

    <div style="padding: 5px 15px;">
        <div id="display-name" style="font-weight: 600; font-size: 14px;">Loading...</div>
        <div id="display-bio" style="font-size: 13px; line-height: 1.3; white-space: pre-wrap;">Loading bio...</div>
    </div>

    <div class="post-grid">
        <div class="grid-item"><img src="https://picsum.photos/id/10/300/300"></div>
        <div class="grid-item"><img src="https://picsum.photos/id/11/300/300"></div>
        <div class="grid-item"><img src="https://picsum.photos/id/12/300/300"></div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-link">🏠</a>
        <a href="#" class="nav-link">👤</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA4Z92DUiG6bJi8JEn4CoE6j03B8cF1dWE",
            authDomain: "max-ful-apps-cce76.firebaseapp.com",
            projectId: "max-ful-apps-cce76",
            storageBucket: "max-ful-apps-cce76.firebasestorage.app",
            messagingSenderId: "1097891042184",
            appId: "1:1097891042184:web:23c2d391f35a008774603d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function updateUI(data) {
            document.getElementById('display-username').innerText = data.username || "makibul_vlogs";
            document.getElementById('display-name').innerText = data.name || "Makibul Islam";
            document.getElementById('display-bio').innerText = data.bio || "";
            document.getElementById('display-followers').innerText = data.followers || "0";
            document.getElementById('display-following').innerText = data.following || "0";
            document.getElementById('display-posts').innerText = data.posts || "0";
        }

        // हम दोनों कलेक्शन चेक करेंगे क्योंकि आपके डेटा में कन्फ्यूजन है
        async function loadProfile() {
            try {
                // तरीका 1: सीधी ID से (ScOZEm...)
                let docRef = db.collection("users").doc("ScOZEm uVToVfI4qoHO fZ");
                let doc = await docRef.get();
                
                if (doc.exists) {
                    updateUI(doc.data());
                } else {
                    // तरीका 2: अगर वो नहीं मिला, तो पूरे "users" कलेक्शन को देखो
                    const querySnapshot = await db.collection("users").get();
                    if (!querySnapshot.empty) {
                        updateUI(querySnapshot.docs[0].data());
                    } else {
                        document.getElementById('display-name').innerText = "Data Not Found";
                    }
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('display-name').innerText = "Error Loading";
            }
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
