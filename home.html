<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful | Home</title>
    <style>
        body { 
            background-color: #000; color: #fff; font-family: sans-serif; 
            margin: 0; padding-bottom: 70px; 
            /* Extra zoom preventer */
            touch-action: manipulation; 
        }
        .header { padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: #000; z-index: 100; }
        .header .logo { font-size: 26px; font-weight: 900; color: #FFD700; letter-spacing: -1px; }
        .header-icons { font-size: 22px; cursor: pointer; text-decoration: none; color: #fff; }

        /* STORIES SECTION */
        .stories-container { display: flex; padding: 15px 10px; gap: 12px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #111; -webkit-overflow-scrolling: touch; }
        .stories-container::-webkit-scrollbar { display: none; }
        .story-wrapper { min-width: 75px; text-align: center; cursor: pointer; flex-shrink: 0; }
        .story-circle { width: 65px; height: 65px; border-radius: 50%; padding: 3px; border: 2px solid #FFD700; position: relative; margin: 0 auto; overflow: visible; }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; background: #222; }
        .plus-icon { position: absolute; bottom: 2px; right: 2px; background: #0095f6; border-radius: 50%; width: 18px; height: 18px; display: flex; justify-content: center; align-items: center; border: 2px solid #000; font-size: 12px; color: white; font-weight: bold; }
        .story-label { font-size: 11px; margin-top: 6px; color: #ccc; display: block; overflow: hidden; text-overflow: ellipsis; }

        /* BLUR & MENU */
        #max-blur-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px); display: none; z-index: 998; transition: 0.3s; }
        .max-menu-options { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); display: none; flex-direction: column; gap: 15px; z-index: 999; }
        .max-btn-opt { background: #fff; color: #000; padding: 12px 30px; border-radius: 30px; font-weight: bold; font-size: 16px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: bounceUp 0.4s ease; cursor: pointer; text-decoration: none; }
        .story-max-btn { background: #39FF14; position: relative; } 
        .badge-25h { background: black; color: white; font-size: 9px; padding: 2px 6px; border-radius: 10px; margin-left: 5px; }

        @keyframes bounceUp { 0% { transform: translateY(30px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .plus-active { transform: rotate(45deg); color: #ff3040 !important; transition: 0.3s; }

        /* POSTS */
        .post-card { border-bottom: 1px solid #111; margin-bottom: 10px; position: relative; }
        .post-header { display: flex; align-items: center; padding: 10px; }
        .post-user-pic { width: 32px; height: 32px; border-radius: 50%; background: #FFD700; margin-right: 10px; overflow: hidden; }
        .post-user-pic img { width: 100%; height: 100%; object-fit: cover; }
        .post-img-container { width: 100%; aspect-ratio: 1/1; background: #1a1a1a; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .big-heart { position: absolute; font-size: 100px; color: #ff3040; opacity: 0; transform: scale(0); pointer-events: none; z-index: 10; }
        .animate-heart { animation: heartPop 0.8s ease-out; }
        @keyframes heartPop { 0% { transform: scale(0); opacity: 0; } 40% { transform: scale(1.2); opacity: 0.9; } 100% { transform: scale(1); opacity: 0; } }
        .post-actions { padding: 12px; display: flex; gap: 15px; font-size: 20px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: #fff; text-decoration: none; font-size: 22px; }
    </style>
</head>
<body>

    <div id="max-blur-overlay" onclick="toggleMaxPlus()"></div>

    <div class="header">
        <div class="logo">Max Ful</div>
        <a href="messages.html" class="header-icons">💬</a> 
    </div>

    <div class="max-menu-options" id="maxMenu">
        <a href="upload.html" class="max-btn-opt">🎬 Reels</a>
        <a href="upload.html" class="max-btn-opt">🖼️ Post</a>
        <a href="view-story.html" class="max-btn-opt story-max-btn">📱 Story <span class="badge-25h">25h Mode</span></a>
    </div>

    <div class="stories-container">
        <div class="story-wrapper" onclick="location.href='upload.html'"><div class="story-circle"><img src="https://picsum.photos/id/64/100/100"><div class="plus-icon">+</div></div><div class="story-label">Your Story</div></div>
        <div class="story-wrapper" onclick="location.href='view-story.html'"><div class="story-circle"><img src="https://picsum.photos/id/1/100/100"></div><div class="story-label">mr_beast</div></div>
        <div class="story-wrapper" onclick="location.href='view-story.html'"><div class="story-circle"><img src="https://picsum.photos/id/10/100/100"></div><div class="story-label">rahul_vlogs</div></div>
        <div class="story-wrapper" onclick="location.href='view-story.html'"><div class="story-circle"><img src="https://picsum.photos/id/20/100/100"></div><div class="story-label">ankit_99</div></div>
        <div class="story-wrapper" onclick="location.href='view-story.html'"><div class="story-circle"><img src="https://picsum.photos/id/30/100/100"></div><div class="story-label">priya.art</div></div>
        <div class="story-wrapper" onclick="location.href='view-story.html'"><div class="story-circle"><img src="https://picsum.photos/id/40/100/100"></div><div class="story-label">max_fan</div></div>
    </div>

    <div class="post-card">
        <div class="post-header">
            <div class="post-user-pic"><img src="https://picsum.photos/id/64/100/100"></div>
            <span style="font-weight: bold; font-size: 14px;">makibul_islam</span>
        </div>
        <div class="post-img-container" id="post1" ondblclick="doLike('post1')">
            <span class="big-heart">❤️</span>
            <img src="https://picsum.photos/id/26/500/500" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <div class="post-actions">
            <span class="action-btn" id="like-icon" onclick="toggleLike()">🤍</span>
            <span class="action-btn">💬</span>
            <span class="action-btn">✈️</span>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item">🏠</a>
        <a href="search.html" class="nav-item">🔍</a>
        <a href="javascript:void(0)" onclick="toggleMaxPlus()" id="mainPlus" style="font-size: 40px; color: #FFD700; text-decoration: none;">+</a>
        <a href="reels.html" class="nav-item">🎬</a>
        <a href="profile.html" class="nav-item">👤</a>
    </div>

    <script>
        function toggleMaxPlus() {
            const overlay = document.getElementById('max-blur-overlay');
            const menu = document.getElementById('maxMenu');
            const plusBtn = document.getElementById('mainPlus');
            if (overlay.style.display === "block") {
                overlay.style.display = "none";
                menu.style.display = "none";
                plusBtn.classList.remove('plus-active');
            } else {
                overlay.style.display = "block";
                menu.style.display = "flex";
                plusBtn.classList.add('plus-active');
            }
        }
        function doLike(postId) {
            const container = document.getElementById(postId);
            const heart = container.querySelector('.big-heart');
            const likeIcon = document.getElementById('like-icon');
            heart.classList.add('animate-heart');
            likeIcon.innerHTML = '❤️';
            likeIcon.style.color = '#ff3040';
            setTimeout(() => { heart.classList.remove('animate-heart'); }, 800);
        }
        function toggleLike() {
            const likeIcon = document.getElementById('like-icon');
            if (likeIcon.innerHTML === '🤍') {
                likeIcon.innerHTML = '❤️';
                likeIcon.style.color = '#ff3040';
            } else {
                likeIcon.innerHTML = '🤍';
                likeIcon.style.color = '#fff';
            }
        }
    </script>
</body>
</html>
