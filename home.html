<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Home</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; /* ताकि पेज फालतू न हिले */
            font-family: sans-serif;
        }

        /* रील जैसा वीडियो कंटेनर */
        .reel-container {
            width: 100%;
            height: calc(100vh - 60px); /* नीचे की पट्टी के लिए जगह छोड़ी है */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* वीडियो पूरे स्क्रीन पर फैलेगा */
        }

        /* नीचे की नेविगेशन पट्टी */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: #000;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-item {
            color: #fff;
            text-decoration: none;
            font-size: 20px;
            text-align: center;
        }

        .nav-item span {
            display: block;
            font-size: 10px;
            color: #FFD700;
        }

        /* वीडियो के ऊपर के बटन (Like, Comment) */
        .side-buttons {
            position: absolute;
            right: 15px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="reel-container">
        <video src="3021.mp4" autoplay loop muted playsinline></video>

        <div class="side-buttons">
            <div>❤️<br><small>1.2k</small></div>
            <div>💬<br><small>300</small></div>
            <div>✈️<br><small>Share</small></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item">🏠<span>Home</span></a>
        <a href="#" class="nav-item">🔍<span>Search</span></a>
        <a href="#" style="font-size: 30px; color: #FFD700;">+</a>
        <a href="#" class="nav-item">🎬<span>Reels</span></a>
        <a href="#" class="nav-item">👤<span>Profile</span></a>
    </div>

</body>
</html>
