<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Home</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 60px; }
        .header { padding: 15px; font-size: 24px; font-weight: bold; color: #FFD700; border-bottom: 1px solid #222; position: sticky; top: 0; background: #000; z-index: 100; }
        
        /* Stories Section */
        .stories-container { display: flex; padding: 15px; gap: 15px; overflow-x: auto; border-bottom: 1px solid #111; }
        .stories-container::-webkit-scrollbar { display: none; }
        .story-circle { 
            min-width: 65px; height: 65px; border-radius: 50%; 
            padding: 3px; border: 2px solid #FFD700; position: relative; cursor: pointer;
        }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; }
        .plus-icon { 
            position: absolute; bottom: 0; right: 0; background: #0095f6; 
            border-radius: 50%; width: 20px; height: 20px; display: flex; 
            justify-content: center; align-items: center; border: 2px solid #000; font-size: 14px;
        }
        .story-label { font-size: 11px; text-align: center; margin-top: 5px; color: #ccc; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: #fff; text-decoration: none; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">Max Ful</div>

    <div class="stories-container">
        <div onclick="location.href='view-story.html'">
            <div class="story-circle">
                <img src="profile-placeholder.jpg" alt="">
                <div class="plus-icon">+</div>
            </div>
            <div class="story-label">Your Story</div>
        </div>

        <div onclick="location.href='view-story.html'">
            <div class="story-circle">
                <img src="https://via.placeholder.com/100" alt="">
            </div>
            <div class="story-label">rahul_vlogs</div>
        </div>
    </div>

    <div style="text-align: center; padding-top: 50px; color: #555;">
        Posts loading...
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item">🏠<br>Home</a>
        <a href="search.html" class="nav-item">🔍<br>Search</a>
        <a href="#" style="font-size: 25px; color: #FFD700;">+</a>
        <a href="reels.html" class="nav-item">🎬<br>Reels</a>
        <a href="profile.html" class="nav-item">👤<br>Profile</a>
    </div>

</body>
</html>
