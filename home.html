<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Max Ful | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 70px; touch-action: manipulation; }
        .header { padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.1px solid #262626; position: sticky; top: 0; background: #000; z-index: 100; }
        .header .logo { font-size: 24px; font-weight: 800; color: #FFD700; }
        .header-icons { font-size: 22px; display: flex; gap: 20px; }
        .stories-container { display: flex; padding: 15px 10px; gap: 15px; overflow-x: auto; border-bottom: 0.1px solid #262626; }
        .stories-container::-webkit-scrollbar { display: none; }
        .story-circle { width: 68px; height: 68px; border-radius: 50%; padding: 3px; border: 2px solid #FFD700; position: relative; }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; }
        .plus-icon { position: absolute; bottom: 2px; right: 2px; background: #0095f6; border-radius: 50%; width: 20px; height: 20px; display: flex; justify-content: center; align-items: center; border: 2px solid #000; font-size: 12px; }
        .post-card { margin-bottom: 15px; border-bottom: 0.1px solid #1a1a1a; }
        .post-header { display: flex; align-items: center; padding: 12px; justify-content: space-between; }
        .post-img-container { width: 100%; background: #000; position: relative; }
        .post-img-container img { width: 100%; height: auto; display: block; }
        .big-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 90px; color: #fff; opacity: 0; pointer-events: none; }
        .animate-heart { animation: heartPop 0.8s; }
        @keyframes heartPop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 40% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }
        .post-actions { padding: 12px; display: flex; gap: 18px; font-size: 24px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 55px; background: #000; border-top: 0.1px solid #262626; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: #fff; text-decoration: none; font-size: 24px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Max Ful</div>
        <div class="header-icons">
            <i class="far fa-heart"></i>
            <a href="messages.html" style="color:white;"><i class="fab fa-facebook-messenger"></i></a>
        </div>
    </div>

    <div class="stories-container">
        <div class="story-wrapper">
            <label for="direct-story-upload" style="cursor: pointer;">
                <div class="story-circle"><img src="https://picsum.photos/id/64/100/100"><div class="plus-icon"><i class="fas fa-plus"></i></div></div>
            </label>
            <input type="file" id="direct-story-upload" style="display: none;">
        </div>
        <div class="story-wrapper" onclick="location.href='view-story.html'"><div class="story-circle"><img src="https://picsum.photos/id/1/100/100"></div></div>
    </div>

    <div id="posts-feed"></div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fas fa-house"></i></a>
        <a href="search.html" class="nav-item"><i class="fas fa-magnifying-glass"></i></a>
        <a href="upload.html" class="nav-item" style="color: #FFD700;"><i class="far fa-square-plus"></i></a>
        <a href="reels.html" class="nav-item"><i class="fas fa-clapperboard"></i></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-circle-user"></i></a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA4Z92DUiG6bJi8JEn4CoE6j03B8cF1dWE",
            authDomain: "max-ful-apps-cce76.firebaseapp.com",
            projectId: "max-ful-apps-cce76",
            storageBucket: "max-ful-apps-cce76.firebasestorage.app",
            messagingSenderId: "1097891042184",
            appId: "1:1097891042184:web:23c2d391f35a008774603d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function loadFeed() {
            const feed = document.getElementById('posts-feed');
            db.collection("allPosts").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                feed.innerHTML = ""; 
                snapshot.forEach((doc) => {
                    const post = doc.data();
                    const postId = doc.id;
                    feed.innerHTML += `
                        <div class="post-card">
                            <div class="post-header"><span style="font-weight: 600;">User_${postId.substring(0,4)}</span></div>
                            <div class="post-img-container" id="${postId}" ondblclick="doLike('${postId}')">
                                <span class="big-heart"><i class="fas fa-heart"></i></span>
                                <img src="${post.imageUrl}">
                            </div>
                            <div class="post-actions">
                                <i class="far fa-heart" onclick="toggleLike(this)"></i>
                                <i class="far fa-comment" onclick="location.href='comments.html'"></i>
                                <i class="far fa-paper-plane"></i>
                            </div>
                            <div style="padding: 0 12px 12px; font-size: 14px;"><b>User_${postId.substring(0,4)}</b> ${post.caption || ''}</div>
                        </div>`;
                });
            });
        }

        function doLike(postId) {
            const heart = document.getElementById(postId).querySelector('.big-heart');
            heart.classList.add('animate-heart');
            setTimeout(() => heart.classList.remove('animate-heart'), 800);
        }

        function toggleLike(btn) {
            btn.classList.toggle('fas');
            btn.classList.toggle('far');
            btn.style.color = btn.classList.contains('fas') ? '#ff3040' : '#fff';
        }
        window.onload = loadFeed;
    </script>
</body>
</html>
