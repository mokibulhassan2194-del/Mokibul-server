<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Home</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* Fixed Header with Message Icon */
        .header { 
            padding: 12px 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #222; 
            position: sticky; 
            top: 0; 
            background: #000; 
            z-index: 100; 
        }
        .header .logo { font-size: 26px; font-weight: 900; color: #FFD700; letter-spacing: -1px; }
        .header-icons { font-size: 22px; cursor: pointer; text-decoration: none; }

        /* Stories Section - Fixed for 4+ Circles */
        .stories-container { 
            display: flex; 
            padding: 15px 10px; 
            gap: 12px; 
            overflow-x: auto; 
            border-bottom: 1px solid #111; 
        }
        .stories-container::-webkit-scrollbar { display: none; }
        
        .story-wrapper { min-width: 75px; text-align: center; cursor: pointer; }
        
        .story-circle { 
            width: 65px; height: 65px; border-radius: 50%; 
            padding: 3px; border: 2px solid #FFD700; 
            position: relative; margin: 0 auto;
        }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; }
        
        .plus-icon { 
            position: absolute; bottom: 2px; right: 2px; background: #0095f6; 
            border-radius: 50%; width: 18px; height: 18px; display: flex; 
            justify-content: center; align-items: center; border: 2px solid #000; 
            font-size: 12px; color: white; font-weight: bold;
        }
        .story-label { font-size: 11px; margin-top: 6px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Fake Post for Look */
        .post-card { border-bottom: 1px solid #111; margin-bottom: 10px; }
        .post-header { display: flex; align-items: center; padding: 10px; }
        .post-user-pic { width: 32px; height: 32px; border-radius: 50%; background: #333; margin-right: 10px; }
        .post-img { width: 100%; aspect-ratio: 1/1; background: #1a1a1a; display: flex; align-items: center; justify-content: center; color: #444; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: #fff; text-decoration: none; font-size: 22px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Max Ful</div>
        <a href="messages.html" class="header-icons">💬</a> </div>

    <div class="stories-container">
        <div class="story-wrapper" onclick="location.href='view-story.html'">
            <div class="story-circle">
                <img src="https://via.placeholder.com/100" alt="">
                <div class="plus-icon">+</div>
            </div>
            <div class="story-label">Your Story</div>
        </div>

        <div class="story-wrapper" onclick="location.href='view-story.html'">
            <div class="story-circle"><img src="https://via.placeholder.com/101" alt=""></div>
            <div class="story-label">rahul_vlogs</div>
        </div>

        <div class="story-wrapper" onclick="location.href='view-story.html'">
            <div class="story-circle"><img src="https://via.placeholder.com/102" alt=""></div>
            <div class="story-label">ankit_99</div>
        </div>

        <div class="story-wrapper" onclick="location.href='view-story.html'">
            <div class="story-circle"><img src="https://via.placeholder.com/103" alt=""></div>
            <div class="story-label">priya.art</div>
        </div>

        <div class="story-wrapper" onclick="location.href='view-story.html'">
            <div class="story-circle"><img src="https://via.placeholder.com/104" alt=""></div>
            <div class="story-label">mr_beast_fan</div>
        </div>
    </div>

    <div class="post-card">
        <div class="post-header">
            <div class="post-user-pic"></div>
            <span style="font-weight: bold; font-size: 14px;">suggested_for_you</span>
        </div>
        <div class="post-img">
            Posts are loading...
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item">🏠</a>
        <a href="search.html" class="nav-item">🔍</a>
        <a href="#" style="font-size: 30px; color: #FFD700;">+</a>
        <a href="reels.html" class="nav-item">🎬</a>
        <a href="profile.html" class="nav-item">👤</a>
    </div>

</body>
</html>
