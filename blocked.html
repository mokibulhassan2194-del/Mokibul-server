<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocked Accounts</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .header { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .back-btn { text-decoration: none; color: #fff; font-size: 24px; margin-right: 20px; }
        
        .empty-state { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 70vh; text-align: center; color: #aaa;
            padding: 20px;
        }
        .block-icon { 
            width: 80px; height: 80px; border-radius: 50%; 
            border: 2px solid #555; display: flex; align-items: center; 
            justify-content: center; font-size: 40px; margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="settings.html" class="back-btn">←</a>
        <span style="font-size: 18px; font-weight: bold;">Blocked Accounts</span>
    </div>

    <div class="empty-state">
        <div class="block-icon">🚫</div>
        <h3 style="color:#fff;">No Blocked Accounts</h3>
        <p>You haven't blocked anyone yet. When you block someone, they won't be able to find your profile or posts on Max Ful.</p>
    </div>

</body>
</html>
