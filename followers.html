<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Following | Max Ful</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }

        /* Top Navigation */
        .nav { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; position: sticky; top: 0; background: #000; z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .nav-left i { font-size: 20px; color: #fff; cursor: pointer; }
        .nav-left span { font-size: 20px; font-weight: 700; }
        .nav-right i { font-size: 22px; }

        /* Tabs (Followers, Following, Subscriptions) */
        .tabs { 
            display: flex; border-bottom: 1px solid #262626; 
            justify-content: space-around; background: #000;
        }
        .tab-item { 
            padding: 12px 0; font-size: 14px; font-weight: 400; color: #a8a8a8; 
            flex: 1; text-align: center; cursor: pointer; 
        }
        .tab-item.active { 
            color: #fff; font-weight: 600; border-bottom: 2px solid #fff; 
        }

        /* Search Bar */
        .search-container { padding: 16px; }
        .search-box { 
            background: #262626; border-radius: 10px; display: flex; 
            align-items: center; padding: 8px 12px; gap: 10px;
        }
        .search-box i { color: #8e8e8e; font-size: 14px; }
        .search-box input { 
            background: transparent; border: none; color: #fff; 
            width: 100%; outline: none; font-size: 15px; 
        }

        /* Sorting Section */
        .sort-row { 
            display: flex; justify-content: space-between; 
            padding: 0 16px 12px 16px; font-size: 15px; font-weight: 600;
        }
        .sort-row span i { font-size: 12px; margin-left: 5px; }

        /* User List */
        .user-list { padding-bottom: 20px; }
        .user-row { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 8px 16px; margin-bottom: 8px;
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        
        /* Profile Image with Story Ring (Optional) */
        .img-wrapper { position: relative; padding: 2px; border-radius: 50%; }
        .has-story { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        
        .user-pic { 
            width: 54px; height: 54px; border-radius: 50%; 
            object-fit: cover; border: 2px solid #000;
        }

        .names { display: flex; flex-direction: column; }
        .u-name { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 4px; }
        .verified-badge { color: #0095f6; font-size: 12px; }
        .f-name { color: #a8a8a8; font-size: 14px; }
        .status-text { color: #a8a8a8; font-size: 12px; margin-top: 1px; }
        .dot { color: #0095f6; font-size: 10px; margin-left: 4px; }

        /* Buttons & Actions */
        .action-group { display: flex; align-items: center; gap: 15px; }
        .btn-msg { 
            background: #363636; color: #fff; border: none; 
            padding: 6px 16px; border-radius: 8px; font-weight: 600; font-size: 14px;
        }
        .more-icon { color: #fff; font-size: 18px; cursor: pointer; }

    </style>
</head>
<body>

    <div class="nav">
        <div class="nav-left">
            <i class="fas fa-arrow-left"></i>
            <span>_mokibull_200</span>
        </div>
        <div class="nav-right"><i class="fas fa-user-plus"></i></div>
    </div>

    <div class="tabs">
        <div class="tab-item">271 Followers</div>
        <div class="tab-item active">66 Following</div>
        <div class="tab-item">0 Subscriptions</div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search">
        </div>
    </div>

    <div class="sort-row">
        <span>Sorted by Default</span>
        <i class="fas fa-arrows-alt-v"></i>
    </div>

    <div class="user-list">
        
        <div class="user-row">
            <div class="user-info">
                <img src="https://i.pravatar.cc/150?u=4" class="user-pic">
                <div class="names">
                    <span class="u-name">anowarhuss...</span>
                    <span class="f-name">Anowar Huss...</span>
                    <span class="status-text">1 new post <span class="dot">●</span></span>
                </div>
            </div>
            <div class="action-group">
                <button class="btn-msg">Message</button>
                <i class="fas fa-ellipsis-v more-icon"></i>
            </div>
        </div>

        <div class="user-row">
            <div class="user-info">
                <div class="img-wrapper has-story">
                    <img src="https://i.pravatar.cc/150?u=5" class="user-pic">
                </div>
                <div class="names">
                    <span class="u-name">akshayku... <i class="fas fa-check-circle verified-badge"></i></span>
                    <span class="f-name">Akshay Kumar</span>
                    <span class="status-text">1 new post <span class="dot">●</span></span>
                </div>
            </div>
            <div class="action-group">
                <button class="btn-msg">Message</button>
                <i class="fas fa-ellipsis-v more-icon"></i>
            </div>
        </div>

        <div class="user-row">
            <div class="user-info">
                <img src="https://i.pravatar.cc/150?u=19" class="user-pic">
                <div class="names">
                    <span class="u-name">mokibul1945</span>
                    <span class="f-name">Khan Mokibul</span>
                </div>
            </div>
            <div class="action-group">
                <button class="btn-msg">Message</button>
                <i class="fas fa-ellipsis-v more-icon"></i>
            </div>
        </div>

    </div>

</body>
</html>
