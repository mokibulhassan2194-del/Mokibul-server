<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Style UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* बेसिक रिसेट */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }

        /* 1. क्लीन हेडर (बिना नाम के) */
        .nav { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; position: sticky; top: 0; background: #000; z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 32px; }
        .nav-left i { font-size: 22px; color: #fff; cursor: pointer; }
        .nav-left span { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        .nav-right i { font-size: 22px; cursor: pointer; }

        /* 2. इंस्टाग्राम टैब डिज़ाइन */
        .tabs { 
            display: flex; border-bottom: 0.5px solid #262626; 
            justify-content: space-around; background: #000;
        }
        .tab-item { 
            padding: 14px 0; font-size: 14px; font-weight: 400; color: #a8a8a8; 
            flex: 1; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .tab-item.active { 
            color: #fff; font-weight: 600; border-bottom: 1.5px solid #fff; 
        }

        /* 3. सर्च बार (बिल्कुल वैसा ही) */
        .search-container { padding: 12px 16px; }
        .search-box { 
            background: #262626; border-radius: 10px; display: flex; 
            align-items: center; padding: 8px 14px; gap: 12px;
        }
        .search-box i { color: #8e8e8e; font-size: 14px; }
        .search-box input { 
            background: transparent; border: none; color: #fff; 
            width: 100%; outline: none; font-size: 16px; 
        }

        /* 4. सॉर्टिंग रो */
        .sort-row { 
            display: flex; justify-content: space-between; 
            padding: 4px 16px 12px 16px; font-size: 14px; font-weight: 600;
        }
        .sort-row .sort-icon { display: flex; align-items: center; gap: 6px; }

        /* 5. यूजर लिस्टिंग */
        .user-list { padding-bottom: 20px; }
        .user-row { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 16px;
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        
        /* प्रोफाइल पिक्चर के रिंग */
        .img-wrapper { position: relative; padding: 2px; border-radius: 50%; display: flex; }
        .has-story { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        
        .user-pic { 
            width: 54px; height: 54px; border-radius: 50%; 
            object-fit: cover; border: 2.5px solid #000;
        }

        .names { display: flex; flex-direction: column; line-height: 1.3; }
        .u-name { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 4px; }
        .verified-badge { color: #0095f6; font-size: 11px; }
        .f-name { color: #a8a8a8; font-size: 14px; font-weight: 400; }
        
        /* न्यू पोस्ट का डॉट */
        .status-update { display: flex; align-items: center; gap: 4px; color: #a8a8a8; font-size: 12px; margin-top: 2px; }
        .blue-dot { width: 8px; height: 8px; background: #0095f6; border-radius: 50%; display: inline-block; }

        /* बटन डिज़ाइन */
        .action-group { display: flex; align-items: center; gap: 18px; }
        .btn-msg { 
            background: #363636; color: #efefef; border: none; 
            padding: 7px 16px; border-radius: 8px; font-weight: 600; font-size: 14px;
            cursor: pointer;
        }
        .more-icon { color: #fff; font-size: 16px; opacity: 0.8; }

    </style>
</head>
<body>

    <div class="nav">
        <div class="nav-left">
            <i class="fas fa-arrow-left"></i>
            <span>List</span>
        </div>
        <div class="nav-right"><i class="fas fa-user-plus"></i></div>
    </div>

    <div class="tabs">
        <div class="tab-item">Followers</div>
        <div class="tab-item active">Following</div>
        <div class="tab-item">Suggestions</div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search">
        </div>
    </div>

    <div class="sort-row">
        <span>Sorted by Default</span>
        <div class="sort-icon"><i class="fas fa-arrows-alt-v"></i></div>
    </div>

    <div class="user-list">
        
        <div class="user-row">
            <div class="user-info">
                <div class="img-wrapper has-story">
                    <img src="https://i.pravatar.cc/150?u=15" class="user-pic">
                </div>
                <div class="names">
                    <span class="u-name">akshaykumar <i class="fas fa-check-circle verified-badge"></i></span>
                    <span class="f-name">Akshay Kumar</span>
                    <div class="status-update">1 new post <span class="blue-dot"></span></div>
                </div>
            </div>
            <div class="action-group">
                <button class="btn-msg">Message</button>
                <i class="fas fa-ellipsis-v more-icon"></i>
            </div>
        </div>

        <div class="user-row">
            <div class="user-info">
                <div class="img-wrapper">
                    <img src="https://i.pravatar.cc/150?u=22" class="user-pic">
                </div>
                <div class="names">
                    <span class="u-name">cristiano</span>
                    <span class="f-name">Cristiano Ronaldo</span>
                </div>
            </div>
            <div class="action-group">
                <button class="btn-msg">Message</button>
                <i class="fas fa-ellipsis-v more-icon"></i>
            </div>
        </div>

    </div>

</body>
</html>
