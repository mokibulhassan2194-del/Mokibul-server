<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | New Reel</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; align-items: center; }
        .header h3 { margin: 0; font-size: 18px; }
        .back-btn { font-size: 24px; text-decoration: none; color: #fff; }

        /* Share Section */
        .share-container { padding: 15px; display: flex; gap: 15px; border-bottom: 1px solid #222; }
        
        /* Chhota Video Thumbnail */
        .video-preview { 
            width: 90px; height: 140px; 
            background: #111; border-radius: 8px; 
            overflow: hidden; border: 1px solid #333;
        }
        .video-preview video { width: 100%; height: 100%; object-fit: cover; }

        /* Caption Area */
        .caption-area { flex: 1; }
        textarea { 
            width: 100%; background: transparent; border: none; 
            color: #fff; resize: none; font-size: 14px; 
            outline: none; height: 100px;
        }

        /* List Options */
        .options-list { list-style: none; padding: 0; margin: 0; }
        .option-item { 
            display: flex; justify-content: space-between; 
            padding: 15px; border-bottom: 1px solid #111; 
            font-size: 15px; cursor: pointer;
        }
        .option-item span { color: #aaa; }

        /* Final Share Button */
        .footer { position: fixed; bottom: 0; width: 100%; padding: 15px; box-sizing: border-box; }
        .btn-share { 
            width: 100%; padding: 14px; background: #FFD700; 
            color: #000; border: none; font-weight: bold; 
            border-radius: 10px; font-size: 16px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html" class="back-btn">✕</a>
        <h3>New Reel</h3>
        <div style="width: 24px;"></div>
    </div>

    <div class="share-container">
        <div class="video-preview">
            <video muted autoplay loop>
                <source src="your-video.mp4" type="video/mp4">
            </video>
        </div>
        
        <div class="caption-area">
            <textarea placeholder="Write a caption... #reels #viral"></textarea>
        </div>
    </div>

    <div class="options-list">
        <div class="option-item">Tag People <span>></span></div>
        <div class="option-item">Add Location <span>></span></div>
        <div class="option-item">Add Music <span>></span></div>
        <div class="option-item" style="color: #FFD700;">Advanced Settings</div>
    </div>

    <div class="footer">
        <button class="btn-share">Share Reel</button>
    </div>

</body>
</html>
