<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOKIBUL DHAMAKA - Updated</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        canvas {
            border: 4px solid #00FF00;
            box-shadow: 0 0 20px #00FF00;
            background-color: #111;
        }
        h1 {
            color: #00FF00;
            text-shadow: 2px 2px #FF0000;
            margin-bottom: 10px;
        }
        .instructions {
            color: white;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>MOKIBUL DHAMAKA 🚀</h1>
    <canvas id="gameCanvas"></canvas>
    <div class="instructions">Space या Screen Tap करो कूदने के लिए!</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = 400;
        canvas.height = 300;

        // 1. Player (Insan) Ka System
        let player = {
            x: 50,
            y: 200,
            width: 30,
            height: 40,
            dy: 0,
            jumpForce: 10, // Easy Jump
            gravity: 0.5,
            grounded: false
        };

        let obstacles = [];
        let score = 0;
        let gameSpeed = 3; // Easy Speed
        let frame = 0;

        // Jump Control
        function jump() {
            if (player.grounded) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
        canvas.addEventListener("touchstart", jump);

        function drawPlayer() {
            // Insan Ka Sir (Head)
            ctx.fillStyle = "#FFD700"; 
            ctx.fillRect(player.x + 5, player.y - 15, 20, 20);
            // Insan Ka Sharir (Body)
            ctx.fillStyle = "#007BFF";
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // Aankhen (Eyes)
            ctx.fillStyle = "black";
            ctx.fillRect(player.x + 15, player.y - 10, 3, 3);
        }

        function createObstacle() {
            if (frame % 90 === 0) { // Obstacle thoda gap mein aayenge (Easy)
                obstacles.push({
                    x: canvas.width,
                    y: 260,
                    width: 20,
                    height: 40,
                    color: "#FF0000"
                });
            }
        }

        function drawObstacles() {
            obstacles.forEach((obs, index) => {
                obs.x -= gameSpeed;
                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

                // Collision Detection (Takkar)
                if (
                    player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y
                ) {
                    alert("Dhamaka Ho Gaya! Score: " + score);
                    resetGame();
                }

                if (obs.x + obs.width < 0) {
                    obstacles.splice(index, 1);
                    score++;
                    if (score % 5 === 0) gameSpeed += 0.2; // Speed thodi dheere badhegi
                }
            });
        }

        function resetGame() {
            player.y = 200;
            player.dy = 0;
            obstacles = [];
            score = 0;
            gameSpeed = 3;
            frame = 0;
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Physics
            player.dy += player.gravity;
            player.y += player.dy;

            if (player.y + player.height > 300) {
                player.y = 300 - player.height;
                player.dy = 0;
                player.grounded = true;
            }

            drawPlayer();
            createObstacle();
            drawObstacles();

            // Score Board
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText("Score: " + score, 10, 25);

            frame++;
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
