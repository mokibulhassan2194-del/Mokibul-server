<!DOCTYPE html>
<html>
<head>
    <title>MOKIBUL PRO RUNNER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: #fff; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span> | CHASER: <span id="c-dist">100</span>%</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let score = 0, lane = 0, gameActive = true, speed = 0.06;
        let chaserDist = 100, objects = [], lineOffset = 0;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        let touchStartX = 0;
        window.ontouchstart = e => touchStartX = e.touches[0].clientX;
        window.ontouchend = e => {
            let diff = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(diff) > 30) {
                if (diff > 0 && lane < 1) lane++;
                else if (diff < 0 && lane > -1) lane--;
            }
        };

        function spawn() {
            if (!gameActive) return;
            objects.push({ z: 10, lane: Math.floor(Math.random() * 3) - 1, type: Math.random() > 0.2 ? 'obs' : 'coin' });
            setTimeout(spawn, 800);
        }
        spawn();

        function draw() {
            ctx.fillStyle = "#050510"; // Dark Sky
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2, cy = canvas.height / 2;

            // --- DRAWING THE ROAD ---
            ctx.fillStyle = "#222"; // Gray Road
            ctx.beginPath();
            ctx.moveTo(cx - 40, cy); ctx.lineTo(cx + 40, cy);
            ctx.lineTo(cx + 500, canvas.height); ctx.lineTo(cx - 500, canvas.height);
            ctx.fill();

            // Road Borders (Green Neon)
            ctx.strokeStyle = "#0f0"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(cx - 40, cy); ctx.lineTo(cx - 500, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + 40, cy); ctx.lineTo(cx + 500, canvas.height); ctx.stroke();

            // Moving Road Lines (This makes it look like it's moving!)
            lineOffset += speed * 50;
            if (lineOffset > 100) lineOffset = 0;
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            for (let i = 0; i < 10; i++) {
                let z = 10 - ((i * 1 + lineOffset/20) % 10);
                let scale = 1 / z;
                let y = cy + (100 * scale);
                ctx.beginPath(); ctx.moveTo(cx - 5 * scale, y); ctx.lineTo(cx + 5 * scale, y); ctx.stroke();
            }

            // Update & Draw Objects
            objects.forEach((obj, i) => {
                obj.z -= speed;
                let scale = 1 / obj.z;
                let x = cx + (obj.lane * 180 * scale);
                let y = cy + (100 * scale);
                let size = 60 * scale;

                if (obj.z > 0.1) {
                    ctx.fillStyle = obj.type === 'obs' ? "red" : "gold";
                    ctx.fillRect(x - size/2, y - size, size, size);
                }

                if (obj.z < 0.2 && obj.z > 0 && obj.lane === lane) {
                    if (obj.type === 'obs') { chaserDist -= 20; objects.splice(i,1); }
                    else { score += 100; objects.splice(i,1); }
                }
                if (obj.z < 0) objects.splice(i, 1);
            });

            // Player
            ctx.fillStyle = "#0cf";
            ctx.fillRect(cx + (lane * 120) - 20, canvas.height - 80, 40, 40);

            if (chaserDist <= 0) { alert("पकड़े गए!"); location.reload(); gameActive = false; }
            document.getElementById("score").innerText = score;
            document.getElementById("c-dist").innerText = Math.floor(chaserDist);

            if (gameActive) requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
