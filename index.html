<!DOCTYPE html>
<html>
<head>
    <title>MOKIBUL DRONE ESCAPE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
        .bar-container { width: 150px; height: 10px; background: #333; border: 1px solid #fff; margin-top: 5px; }
        #ghost-bar { width: 0%; height: 100%; background: #0cf; transition: width 0.1s; }
        #chaser-alert { position: absolute; bottom: 20%; width: 100%; text-align: center; color: red; font-weight: bold; display: none; font-size: 24px; text-shadow: 0 0 10px red; }
    </style>
</head>
<body>
    <div id="ui">
        SCORE: <span id="score">0</span><br>
        CHASER DISTANCE: <span id="c-dist">100</span>%
        <div class="bar-container"><div id="ghost-bar"></div></div>
        <small id="status">POWER: NONE</small>
    </div>
    <div id="chaser-alert">⚠️ वह पीछे है! भाग! ⚠️</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // Settings
        let score = 0;
        let lane = 0; // -1, 0, 1
        let gameActive = true;
        let speed = 0.05;
        let chaserDist = 100; // 0 is game over
        let isGhost = false;
        let ghostTime = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        // Assets
        let objects = []; // Obstacles and Coins
        
        // Touch Controls
        let touchStartX = 0;
        window.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
        window.addEventListener('touchend', e => {
            let diff = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(diff) > 30) {
                if (diff > 0 && lane < 1) lane++;
                else if (diff < 0 && lane > -1) lane--;
            }
        });

        // Object Spawner
        function spawn() {
            if (!gameActive) return;
            let type = Math.random() > 0.1 ? 'obs' : 'power';
            if (Math.random() > 0.3) type = 'coin';
            objects.push({
                z: 10, // Distance
                lane: Math.floor(Math.random() * 3) - 1,
                type: type
            });
            setTimeout(spawn, 1000 - Math.min(score, 500));
        }
        spawn();

        function update() {
            if (!gameActive) return;

            speed += 0.00001;
            score++;
            
            if (isGhost) {
                ghostTime -= 16;
                document.getElementById("ghost-bar").style.width = (ghostTime/7000)*100 + "%";
                if (ghostTime <= 0) {
                    isGhost = false;
                    document.getElementById("status").innerText = "POWER: NONE";
                }
            }

            objects.forEach((obj, i) => {
                obj.z -= speed; // Move towards player
                
                // Collision check (when z is close to 0)
                if (obj.z < 0.2 && obj.z > 0) {
                    if (obj.lane === lane) {
                        if (obj.type === 'obs' && !isGhost) {
                            chaserDist -= 30; // Hit! Chaser gets closer
                            objects.splice(i, 1);
                            document.getElementById("chaser-alert").style.display = "block";
                            setTimeout(() => document.getElementById("chaser-alert").style.display = "none", 1000);
                        } else if (obj.type === 'power') {
                            isGhost = true;
                            ghostTime = 7000;
                            document.getElementById("status").innerText = "POWER: GHOST MODE!";
                            objects.splice(i, 1);
                        } else if (obj.type === 'coin') {
                            score += 500;
                            objects.splice(i, 1);
                        }
                    }
                }
                if (obj.z < -1) objects.splice(i, 1);
            });

            // Recover chaser distance slowly
            if (chaserDist < 100) chaserDist += 0.05;
            if (chaserDist <= 0) {
                gameActive = false;
                alert("पकड़े गए! SCORE: " + score);
                location.reload();
            }

            document.getElementById("score").innerText = score;
            document.getElementById("c-dist").innerText = Math.floor(chaserDist);
        }

        function draw() {
            // Background
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // Draw Road (3D Perspective)
            ctx.strokeStyle = isGhost ? "#0cf" : "#0f0";
            ctx.lineWidth = 2;
            for (let i = -1.5; i <= 1.5; i++) {
                ctx.beginPath();
                ctx.moveTo(cx + i * 50, cy);
                ctx.lineTo(cx + i * 500, canvas.height);
                ctx.stroke();
            }

            // Draw Objects
            objects.forEach(obj => {
                let scale = 1 / obj.z;
                let x = cx + (obj.lane * 150 * scale);
                let y = cy + (100 * scale);
                let size = 50 * scale;

                if (obj.type === 'obs') ctx.fillStyle = "red";
                else if (obj.type === 'power') ctx.fillStyle = "#0cf";
                else ctx.fillStyle = "gold";

                ctx.fillRect(x - size / 2, y - size, size, size);
            });

            // Draw Player
            ctx.fillStyle = isGhost ? "#fff" : "#0f0";
            ctx.shadowBlur = isGhost ? 20 : 0;
            ctx.shadowColor = "#0cf";
            let pX = cx + (lane * 150);
            ctx.fillRect(pX - 25, canvas.height - 100, 50, 50);
            ctx.shadowBlur = 0;

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
