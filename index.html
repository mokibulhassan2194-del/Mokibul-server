<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful - Login</title>
    <style>
        body { font-family: sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column; }
        .login-box { background: white; border: 1px solid #dbdbdb; padding: 30px; width: 300px; text-align: center; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 2.5rem; margin-bottom: 20px; color: #262626; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; background-color: #0095f6; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #1877f2; }
        a { text-decoration: none; color: #00376b; font-size: 0.8rem; margin-top: 15px; display: block; }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>Max Ful</h1>
        <form id="loginForm">
            <input type="text" placeholder="Username" id="user" required>
            <input type="password" placeholder="Password" id="pass" required>
            <button type="button" onclick="goToHome()">Log In</button>
        </form>
        <a href="#">Forgot password?</a>
    </div>

    <script>
        function goToHome() {
            // Jab user login button dabayega, wo home.html par chala jayega
            window.location.href = "home.html";
        }
    </script>

</body>
</html>
