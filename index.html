<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_DASHBOARD</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            background: black;
            color: #00FF41;
            font-family: 'Courier New', monospace;
            height: 100%; width: 100%;
            overflow: hidden;
        }

        /* 3 Layer Grid */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
        }

        .layer {
            position: relative;
            border-right: 1px solid #004400;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .title {
            font-size: 10px;
            background: #004400;
            color: white;
            padding: 5px;
            text-align: center;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* Content Areas */
        #brute-force, #logs {
            padding: 5px;
            font-size: 11px;
            line-height: 1.2;
            word-break: break-all;
        }

        .cracking-text { color: #FF3131; font-weight: bold; margin: 2px 0; }
        .log-entry { color: #00CCFF; margin: 2px 0; }

        /* Matrix Canvas Fix */
        #matrix {
            position: absolute;
            top: 25px; /* Title ke niche */
            left: 0;
            width: 100%;
            height: calc(100% - 25px);
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="layer">
        <div class="title">BRUTE_FORCE</div>
        <div id="brute-force"></div>
    </div>

    <div class="layer">
        <div class="title">MATRIX_CORE</div>
        <canvas id="matrix"></canvas>
    </div>

    <div class="layer">
        <div class="title">SYSTEM_LOGS</div>
        <div id="logs"></div>
    </div>
</div>

<script>
    // 1. Brute Force
    const bruteDiv = document.getElementById('brute-force');
    const chars = "ABCDEFGHIJKLM0123456789#$@*";
    setInterval(() => {
        let pass = "";
        for(let i=0; i<8; i++) pass += chars.charAt(Math.floor(Math.random() * chars.length));
        const p = document.createElement('div');
        p.className = 'cracking-text';
        p.innerText = `TRY: ${pass}`;
        bruteDiv.prepend(p);
        if(bruteDiv.children.length > 30) bruteDiv.removeChild(bruteDiv.lastChild);
    }, 150);

    // 2. Matrix Fix (Responsive)
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = canvas.parentElement.offsetWidth;
        canvas.height = canvas.parentElement.offsetHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const matrixChars = "0101010101XYZ#@$";
    const fontSize = 14;
    let columns = canvas.width / fontSize;
    let drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0";
        ctx.font = fontSize + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            const text = matrixChars.charAt(Math.floor(Math.random() * matrixChars.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);

    // 3. System Logs
    const logDiv = document.getElementById('logs');
    const msgs = ["[OK] Bypass", "[!!] Warning", "[>>] Fetching", "[OK] Root Access", "[INFO] Connected"];
    setInterval(() => {
        const m = msgs[Math.floor(Math.random() * msgs.length)];
        const p = document.createElement('div');
        p.className = 'log-entry';
        p.innerText = `> ${m}`;
        logDiv.prepend(p);
        if(logDiv.children.length > 35) logDiv.removeChild(logDiv.lastChild);
    }, 500);
</script>

</body>
</html>
