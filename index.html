<!DOCTYPE html>
<html>
<head>
    <title>Mokibul Pro Racer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #001; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { display: block; touch-action: none; }
        .ui { position: absolute; top: 15px; left: 15px; color: #fff; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; border: 1px solid #fdbb2d; font-size: 16px; }
    </style>
</head>
<body>
    <div class="ui">Distance: <span id="dist">0</span>m<br>Coins: <span id="coins">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        let scrollX = 0;
        let speed = 0;
        let isGas = false;
        let coinsCollected = 0;
        let points = [];
        let coins = [];

        // Smooth Terrain & Coins Generation
        for (let i = 0; i < 20000; i++) {
            let h = (canvas.height / 1.6) + Math.sin(i * 0.02) * 50 + Math.cos(i * 0.01) * 30;
            points.push(h);
            // हर 100 मीटर पर एक सिक्का
            if (i % 100 === 0 && i > 500) {
                coins.push({ x: i, y: h - 60, collected: false });
            }
        }

        window.onmousedown = window.ontouchstart = () => isGas = true;
        window.onmouseup = window.ontouchend = () => isGas = false;

        function draw() {
            // 1. Dark Premium Sky
            let sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
            sky.addColorStop(0, "#0f2027");
            sky.addColorStop(1, "#203a43");
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Draw Ground
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for (let i = 0; i < canvas.width; i++) {
                let pIdx = Math.floor(i + scrollX);
                ctx.lineTo(i, points[pIdx] || canvas.height/1.5);
            }
            ctx.lineTo(canvas.width, canvas.height);
            let ground = ctx.createLinearGradient(0, canvas.height/2, 0, canvas.height);
            ground.addColorStop(0, "#795548"); // मिट्टी
            ground.addColorStop(0.1, "#4e342e");
            ctx.fillStyle = ground;
            ctx.fill();

            // 3. Draw & Collect Coins
            coins.forEach(c => {
                if (!c.collected) {
                    let screenX = c.x - scrollX;
                    if (screenX > -20 && screenX < canvas.width + 20) {
                        ctx.fillStyle = "#fdbb2d";
                        ctx.beginPath();
                        ctx.arc(screenX, c.y, 10, 0, Math.PI*2);
                        ctx.fill();
                        ctx.strokeStyle = "#fff";
                        ctx.stroke();
                        
                        // Collision with car
                        if (Math.abs(screenX - 150) < 30 && Math.abs(c.y - (points[Math.floor(150 + scrollX)]-20)) < 30) {
                            c.collected = true;
                            coinsCollected++;
                            document.getElementById("coins").innerText = coinsCollected;
                        }
                    }
                }
            });

            // 4. Car Physics
            if (isGas) speed += 0.2;
            else speed *= 0.98;
            if (speed > 15) speed = 15;
            scrollX += speed;

            let carX = 150;
            let currentIdx = Math.floor(carX + scrollX);
            let carY = (points[currentIdx] || canvas.height/1.5) - 15;
            let angle = Math.atan2(points[currentIdx + 5] - points[currentIdx - 5], 10);

            ctx.save();
            ctx.translate(carX, carY);
            ctx.rotate(angle);
            ctx.fillStyle = "#e74c3c"; // Red Car
            ctx.fillRect(-25, -15, 50, 20);
            ctx.fillStyle = "#222";
            ctx.beginPath();
            ctx.arc(-15, 10, 10, 0, Math.PI*2);
            ctx.arc(15, 10, 10, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();

            document.getElementById("dist").innerText = Math.floor(scrollX / 10);
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
