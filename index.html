<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MOKIBUL PRIVATE VAULT</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; flex-direction: column; }
        #lock-screen { text-align: center; border: 2px solid #0f0; padding: 30px; box-shadow: 0 0 20px #0f0; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; text-align: center; font-size: 18px; outline: none; margin-top: 10px; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #gallery { display: none; width: 90%; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .grid img { width: 100%; border: 2px solid #0f0; }
        #ban-message { color: red; font-size: 20px; font-weight: bold; display: none; text-align: center; }
    </style>
</head>
<body>

    <div id="ban-message">
        <h1>[!] ACCESS DENIED [!]</h1>
        <p>YOUR IP ADDRESS HAS BEEN BLACKLISTED BY MOKIBUL KHAN.</p>
        <p>REASON: MULTIPLE FAILED ATTEMPTS</p>
        <p>SECURITY LOCK: 10 HOURS REMAINING</p>
    </div>

    <div id="lock-screen">
        <h2>MOKIBUL SECURITY SYSTEM</h2>
        <p>ENTER ENCRYPTION KEY:</p>
        <input type="password" id="pass" placeholder="****">
        <br>
        <button onclick="checkPass()">DECRYPT</button>
        <p id="tries" style="font-size: 12px; color: yellow;"></p>
    </div>

    <div id="gallery">
        <h1>WELCOME, MOKIBUL KHAN</h1>
        <div class="grid">
            <img src="https://via.placeholder.com/150" alt="Secret 1">
            <img src="https://via.placeholder.com/150" alt="Secret 2">
            <img src="https://via.placeholder.com/150" alt="Secret 3">
        </div>
        <button onclick="location.reload()">LOCK SYSTEM</button>
    </div>

<script>
    const correctPass = "1234"; // मकीबुल भाई, यहाँ अपना असली पासवर्ड लिख दे
    let attempts = localStorage.getItem('attempts') || 0;
    let banTime = localStorage.getItem('banTime');

    // चेक करें कि क्या बंदा पहले से बैन है
    if (banTime && Date.now() < banTime) {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('ban-message').style.display = 'block';
    }

    function checkPass() {
        let input = document.getElementById('pass').value;

        if (input === correctPass) {
            localStorage.setItem('attempts', 0); // रिसेट
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('gallery').style.display = 'block';
        } else {
            attempts++;
            localStorage.setItem('attempts', attempts);
            document.getElementById('tries').innerText = `Attempts Left: ${3 - attempts}`;

            if (attempts >= 3) {
                // 10 घंटे का बैन (10 * 60 * 60 * 1000 मिलीसेकंड्स)
                let tenHours = Date.now() + (10 * 60 * 60 * 1000);
                localStorage.setItem('banTime', tenHours);
                location.reload(); // पेज रिफ्रेश करो बैन दिखाने के लिए
            } else {
                alert("WRONG PASSWORD! SYSTEM ALERT SENT TO MOKIBUL.");
            }
        }
    }
</script>
</body>
</html>
