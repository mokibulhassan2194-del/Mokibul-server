<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful - Complete UI</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; font-family: -apple-system, sans-serif; background: #fff; overflow: hidden; }

        /* --- LOGIN PAGE --- */
        #login-section { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: fixed; width: 100%; z-index: 100; background: #fff; padding: 20px; }
        .login-box { width: 100%; max-width: 350px; text-align: center; }
        .logo { font-size: 3rem; font-weight: bold; margin-bottom: 30px; font-style: italic; }
        .login-box input { width: 100%; padding: 14px; margin: 5px 0; border: 1px solid #dbdbdb; border-radius: 5px; background: #fafafa; font-size: 14px; outline: none; }
        .btn { width: 100%; padding: 12px; background: #0095f6; color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .forgot-link { display: block; margin-top: 15px; color: #00376b; font-size: 12px; text-decoration: none; }
        .signup-box { margin-top: 50px; padding: 20px; border-top: 1px solid #dbdbdb; width: 100%; max-width: 350px; text-align: center; font-size: 14px; }
        .signup-box a { color: #0095f6; text-decoration: none; font-weight: bold; }

        /* --- MAIN APP --- */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        .header { height: 50px; border-bottom: 1px solid #dbdbdb; display: flex; align-items: center; padding: 0 15px; font-weight: bold; background: #fff; font-size: 1.3rem; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 60px; }

        /* Stories */
        .stories { display: flex; width: 100%; padding: 10px 5px; border-bottom: 0.5px solid #dbdbdb; justify-content: space-around; }
        .story-wrapper { flex: 1; display: flex; justify-content: center; }
        .story-circle { width: 72px; height: 72px; border-radius: 50%; border: 2.5px solid #d62976; background: #f0f0f0; padding: 3px; background-clip: content-box; }

        /* Post */
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; }
        .p-img-box { width: 100%; aspect-ratio: 1/1; background: #fafafa; display: flex; align-items: center; justify-content: center; color: #999; border-top: 0.5px solid #f0f0f0; border-bottom: 0.5px solid #f0f0f0; }
        .actions { padding: 12px; font-size: 26px; display: flex; gap: 18px; }
        .liked { color: #ed4956; }

        /* Reels UI */
        #reels-page { background: #000; height: 100%; position: relative; color: white; }
        .reels-overlay { position: absolute; right: 10px; bottom: 80px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .reels-info { position: absolute; left: 15px; bottom: 80px; }

        /* Profile UI */
        .profile-container { padding: 20px 15px; text-align: center; }
        .p-pic-main { width: 85px; height: 85px; border-radius: 50%; background: #eee; margin: 0 auto 15px; border: 1px solid #dbdbdb; }

        /* Nav */
        .nav-bar { height: 50px; border-top: 1px solid #dbdbdb; display: flex; justify-content: space-around; align-items: center; background: #fff; position: fixed; bottom: 0; width: 100%; z-index: 10; }
        .nav-icon { font-size: 26px; cursor: pointer; color: black; }
        .page { display: none; width: 100%; }
        .active-page { display: block !important; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-box">
            <div class="logo">Max Ful</div>
            <input type="text" placeholder="Phone number, username, or email">
            <input type="password" placeholder="Password">
            <button class="btn" onclick="showApp()">Log In</button>
            <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <div class="signup-box">
            Don't have an account? <a href="#">Sign up</a>
        </div>
    </div>

    <div id="main-app">
        <div class="header" id="top-title">Max Ful</div>
        <div class="content-area">
            
            <div id="home-page" class="page active-page">
                <div class="stories">
                    <div class="story-wrapper"><div class="story-circle"></div></div>
                    <div class="story-wrapper"><div class="story-circle"></div></div>
                    <div class="story-wrapper"><div class="story-circle"></div></div>
                    <div class="story-wrapper"><div class="story-circle"></div></div>
                </div>
                <div class="post">
                    <div class="post-header">makibul_official</div>
                    <div class="p-img-box">Home Feed Content</div>
                    <div class="actions">
                        <span onclick="this.classList.toggle('liked')">❤️</span> <span>💬</span> <span>✈️</span>
                    </div>
                </div>
            </div>

            <div id="reels-page" class="page">
                <div style="height:100%; display:flex; align-items:center; justify-content:center;">🎬 Reels Playing...</div>
                <div class="reels-overlay">
                    <span>❤️</span><span>💬</span><span>✈️</span>
                </div>
                <div class="reels-info"><strong>makibul_official</strong><br>First Reel! #viral</div>
            </div>

            <div id="search-page" class="page">
                <div style="padding:15px;"><input type="text" placeholder="Search..." style="width:100%; padding:10px; border-radius:8px; border:1px solid #dbdbdb;"></div>
            </div>

            <div id="profile-page" class="page">
                <div class="profile-container">
                    <div class="p-pic-main"></div>
                    <strong style="font-size: 1.2rem;">makibul_official</strong><br>
                    <p style="margin-top:10px;">15 Posts | 500 Followers</p>
                </div>
            </div>

        </div>

        <div class="nav-bar">
            <div class="nav-icon" onclick="changePage('home')">🏠</div>
            <div class="nav-icon" onclick="changePage('search')">🔍</div>
            <div class="nav-icon" onclick="changePage('reels')">🎬</div>
            <div class="nav-icon" onclick="changePage('profile')">👤</div>
        </div>
    </div>

    <script>
        function showApp() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        }
        function changePage(pageName) {
            var pages = document.getElementsByClassName('page');
            for (var i = 0; i < pages.length; i++) { pages[i].classList.remove('active-page'); }
            if(pageName === 'home') {
                document.getElementById('home-page').classList.add('active-page');
                document.getElementById('top-title').innerText = 'Max Ful';
            } else if(pageName === 'reels') {
                document.getElementById('reels-page').classList.add('active-page');
                document.getElementById('top-title').innerText = 'Reels';
            } else if(pageName === 'search') {
                document.getElementById('search-page').classList.add('active-page');
                document.getElementById('top-title').innerText = 'Explore';
            } else if(pageName === 'profile') {
                document.getElementById('profile-page').classList.add('active-page');
                document.getElementById('top-title').innerText = 'makibul_official';
            }
        }
    </script>
</body>
</html>
