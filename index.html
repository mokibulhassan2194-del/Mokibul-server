<!DOCTYPE html>
<html>
<head>
    <title>Mokibul Hacker Game</title>
    <style>
        body { margin: 0; background: #111; color: #0f0; font-family: monospace; text-align: center; overflow: hidden; }
        #gameCanvas { border: 2px solid #0f0; background: #000; margin-top: 50px; }
        h1 { text-shadow: 0 0 10px #0f0; }
    </style>
</head>
<body>
    <h1>MOKIBUL GAME SERVER</h1>
    <p>Press "SPACE" or Tap to Jump!</p>
    <canvas id="gameCanvas" width="600" height="200"></canvas>
    <h2 id="score">Score: 0</h2>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let score = 0;
        let player = { x: 50, y: 150, w: 30, h: 30, dy: 0, jump: -10, ground: 150 };
        let enemies = [];
        let gameActive = true;

        // Player Jump
        function doJump() {
            if (player.y === player.ground) player.dy = player.jump;
        }
        document.addEventListener("keydown", (e) => { if(e.code === "Space") doJump(); });
        canvas.addEventListener("touchstart", doJump);

        function update() {
            if (!gameActive) return;

            // Physics
            player.dy += 0.5; // Gravity
            player.y += player.dy;
            if (player.y > player.ground) { player.y = player.ground; player.dy = 0; }

            // Enemies logic
            if (Math.random() < 0.02) enemies.push({ x: 600, y: 160, w: 20, h: 20 });
            
            enemies.forEach((en, index) => {
                en.x -= 5;
                // Collision Detection
                if (player.x < en.x + en.w && player.x + player.w > en.x &&
                    player.y < en.y + en.h && player.y + player.h > en.y) {
                    gameActive = false;
                    alert("VIRUS DETECTED! Game Over. Score: " + score);
                    location.reload();
                }
                if (en.x < -20) { enemies.splice(index, 1); score++; }
            });
            document.getElementById("score").innerText = "Score: " + score;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw Player (Green Box)
            ctx.fillStyle = "#0f0";
            ctx.fillRect(player.x, player.y, player.w, player.h);
            // Draw Enemies (Red Virus)
            ctx.fillStyle = "#f00";
            enemies.forEach(en => ctx.fillRect(en.x, en.y, en.w, en.h));
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
