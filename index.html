<!DOCTYPE html>

<head>

        #console { padding: 20px; font-size: 14px; line-height: 1.5; }
        .red { color: red; font-weight: bold; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="console"></div>

    <script>
        const logs = [
            "> [START] Initiating Instagram Security Bypass...",
            "> Connecting to Meta Servers (IP: 157.240.22.35)...",

        const consoleDiv = document.getElementById('console');

        function printLog() {

                consoleDiv.appendChild(p);

                const final = document.createElement('h2');
                final.innerHTML = "<span class='red blink'>ALL FILES ENCRYPTED!<br>PAY 1000 TK TO MOKIBUL TO UNLOCK YOUR PHONE!</span>";
