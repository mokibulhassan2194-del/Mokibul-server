<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; font-family: sans-serif; background: #fff; overflow: hidden; }

        /* Login Screen */
        #login-section { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: fixed; width: 100%; z-index: 100; background: #fff; }
        .login-box { width: 85%; max-width: 320px; text-align: center; }
        .logo { font-size: 2.5rem; font-weight: bold; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #dbdbdb; border-radius: 5px; background: #fafafa; }
        .btn { width: 100%; padding: 12px; background: #0095f6; color: #fff; border: none; border-radius: 5px; font-weight: bold; margin-top: 15px; }

        /* Main App Structure */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        .header { height: 50px; border-bottom: 1px solid #dbdbdb; display: flex; align-items: center; padding: 0 15px; font-weight: bold; background: #fff; justify-content: space-between; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 60px; }

        /* Pages Control - Yeh sabse zaroori hai */
        .page { display: none; width: 100%; }
        .active-page { display: block !important; }

        /* Home Page Style */
        .stories { display: flex; overflow-x: auto; padding: 10px; gap: 10px; border-bottom: 0.5px solid #dbdbdb; }
        .story-circle { min-width: 65px; height: 65px; border-radius: 50%; border: 3px solid #d62976; background: #eee; }
        .post { border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .post-header { padding: 10px; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .p-img { width: 100%; aspect-ratio: 1/1; background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: #999; }
        .actions { padding: 12px; font-size: 24px; display: flex; gap: 15px; }
        .liked { color: red; }

        /* Profile Style */
        .profile-head { padding: 20px; display: flex; align-items: center; gap: 20px; }
        .p-pic { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(45deg, orange, red); }
        .p-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-box { aspect-ratio: 1/1; background: #eee; }

        /* Bottom Nav */
        .nav { height: 55px; border-top: 1px solid #dbdbdb; display: flex; justify-content: space-around; align-items: center; background: #fff; position: fixed; bottom: 0; width: 100%; }
        .nav-item { font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-box">
            <div class="logo">Max Ful</div>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button class="btn" onclick="showApp()">Log In</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header" id="h-title">Max Ful</div>
        
        <div class="content-area">
            
            <div id="home-page" class="page active-page">
                <div class="stories">
                    <div class="story-circle"></div><div class="story-circle"></div><div class="story-circle"></div>
                </div>
                <div class="post">
                    <div class="post-header">makibul_official</div>
                    <div class="p-img">Home Feed Post</div>
                    <div class="actions">
                        <span onclick="this.classList.toggle('liked')">❤️</span> <span>💬</span>
                    </div>
                </div>
            </div>

            <div id="search-page" class="page">
                <div style="padding:10px;"><input type="text" placeholder="Search" style="width:100%; padding:8px; border-radius:8px; border:none; background:#eee;"></div>
                <div class="p-grid">
                    <div class="grid-box"></div><div class="grid-box"></div><div class="grid-box"></div>
                </div>
            </div>

            <div id="profile-page" class="page">
                <div class="profile-head">
                    <div class="p-pic"></div>
                    <div><strong>makibul_official</strong><br>500 Followers</div>
                </div>
                <div class="p-grid">
                    <div class="grid-box"></div><div class="grid-box"></div><div class="grid-box"></div>
                </div>
            </div>

        </div>

        <div class="nav">
            <div class="nav-item" onclick="changePage('home')">🏠</div>
            <div class="nav-item" onclick="changePage('search')">🔍</div>
            <div class="nav-item" onclick="changePage('profile')">👤</div>
        </div>
    </div>

    <script>
        function showApp() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        }

        function changePage(pageName) {
            // Pehle saare pages ko chhupa do
            var pages = document.getElementsByClassName('page');
            for (var i = 0; i < pages.length; i++) {
                pages[i].classList.remove('active-page');
            }

            // Ab sirf wahi dikhao jo chahiye
            if(pageName === 'home') {
                document.getElementById('home-page').classList.add('active-page');
                document.getElementById('h-title').innerText = 'Max Ful';
            } else if(pageName === 'search') {
                document.getElementById('search-page').classList.add('active-page');
                document.getElementById('h-title').innerText = 'Explore';
            } else if(pageName === 'profile') {
                document.getElementById('profile-page').classList.add('active-page');
                document.getElementById('h-title').innerText = 'makibul_official';
            }
        }
    </script>
</body>
</html>
