<!DOCTYPE html>
<html>
<head>
    <title>MOKIBUL NIGHT SERVER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #0f0; text-align: center; }
        canvas { display: block; border: 3px solid #0f0; box-shadow: 0 0 20px #0f0; margin: 20px auto; max-width: 90%; }
        h1 { margin-top: 20px; text-shadow: 2px 2px #555; }
        .info { font-size: 18px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>MOKIBUL NIGHT SERVER 🌙</h1>
    <div class="info">Score: <span id="score">0</span> | Speed: <span id="speed">1.0</span>x</div>
    <canvas id="gameCanvas"></canvas>
    <p>Press 'SPACE' or Tap to Jump!</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 800;
        canvas.height = 300;

        let score = 0;
        let gameSpeed = 5;
        let isGameOver = false;

        const player = { x: 50, y: 200, w: 40, h: 40, dy: 0, jumpForce: 12, gravity: 0.6, grounded: false };
        const obstacles = [];
        const stars = Array.from({ length: 50 }, () => ({ x: Math.random() * 800, y: Math.random() * 200, size: Math.random() * 2 }));

        function spawnObstacle() {
            if (isGameOver) return;
            obstacles.push({ x: canvas.width, y: 210, w: 30, h: 40 });
            setTimeout(spawnObstacle, 1500 + Math.random() * 2000);
        }

        function update() {
            if (isGameOver) return;

            // Gravity
            player.dy += player.gravity;
            player.y += player.dy;

            if (player.y > 200) {
                player.y = 200;
                player.dy = 0;
                player.grounded = true;
            }

            // Move Obstacles
            obstacles.forEach((obs, i) => {
                obs.x -= gameSpeed;
                if (obs.x + obs.w < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    if (score % 5 === 0) gameSpeed += 0.5;
                }

                // Collision
                if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
                    player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                    isGameOver = true;
                    alert("GAME OVER! Final Score: " + score);
                    location.reload();
                }
            });

            document.getElementById("score").innerText = score;
            document.getElementById("speed").innerText = (gameSpeed / 5).toFixed(1);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Sky & Moon
            ctx.fillStyle = "#05051a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            stars.forEach(s => ctx.fillRect(s.x, s.y, s.size, s.size));
            
            ctx.beginPath();
            ctx.arc(700, 60, 30, 0, Math.PI * 2);
            ctx.fill();

            // Ground
            ctx.fillStyle = "#333";
            ctx.fillRect(0, 240, canvas.width, 60);

            // Player (Green Square)
            ctx.fillStyle = "#0f0";
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.strokeStyle = "#fff";
            ctx.strokeRect(player.x, player.y, player.w, player.h);

            // Obstacles (Red Square)
            ctx.fillStyle = "#f00";
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            });

            update();
            requestAnimationFrame(draw);
        }

        function jump() {
            if (player.grounded) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); });

        spawnObstacle();
        draw();
    </script>
</body>
</html>
