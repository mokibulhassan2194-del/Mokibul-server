<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL - MOKIBUL KHAN</title>
    <style>
        body { background: black; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #0f0; padding: 10px; font-size: 20px; font-weight: bold; text-shadow: 0 0 10px #0f0; background: rgba(0,255,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: 85vh; gap: 5px; padding: 5px; }
        .box { border: 1px solid #0f0; padding: 8px; overflow: hidden; position: relative; font-size: 11px; background: rgba(0,0,0,0.8); }
        .box-title { position: absolute; top: 0; right: 0; background: #0f0; color: black; padding: 1px 8px; font-weight: bold; font-size: 10px; }
        .scanner-text { line-height: 1.4; white-space: nowrap; }
        span.target-name { color: #fff; text-shadow: 0 0 5px #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="header" id="main-header">SYSTEM OVERRIDE BY: MOKIBUL KHAN v3.0</div>

<div class="grid">
    <div class="box">
        <div class="box-title">TARGET_IDENTIFICATION</div>
        <div id="brute" class="scanner-text"></div>
    </div>
    <div class="box">
        <div class="box-title">SYSTEM_EXPLOIT</div>
        <div id="logs" class="scanner-text"></div>
    </div>
    <div class="box">
        <div class="box-title">DATA_EXTRACTION</div>
        <div id="db" class="scanner-text" style="color: #ff4500;"></div>
    </div>
    <div class="box">
        <div class="box-title">MOKIBUL_SAT_LINK</div>
        <div id="sat" class="scanner-text" style="color: #00ffff;"></div>
    </div>
</div>

<script>
    // मकीबुल भाई, यहाँ से नाम पूछने वाला जादू शुरू होता है
    let target = prompt("ENTER ACCESS KEY OR USERNAME TO PROCEED:", "Guest");
    if (target == null || target == "") { target = "Unknown_Subject"; }
    
    document.getElementById('main-header').innerHTML = `TARGET ACQUIRED: <span class="target-name">${target.toUpperCase()}</span> | SECURED BY MOKIBUL KHAN`;

    function randomText(element, sentences, speed) {
        setInterval(() => {
            let p = document.createElement('div');
            let text = sentences[Math.floor(Math.random() * sentences.length)];
            // नाम को बीच में घुसाना
            text = text.replace("{name}", `<span class="target-name">${target}</span>`);
            p.innerHTML = text;
            element.prepend(p);
            if (element.children.length > 25) element.lastChild.remove();
        }, speed);
    }

    const bruteTexts = [
        "[!] SCANNING DEVICE: {name}_MOBILE...",
        "[+] IP FOUND: 103.${Math.floor(Math.random()*255)}.1.${Math.floor(Math.random()*255)}",
        "[!] BYPASSING {name}'S FIREWALL...",
        "[!] UPLOADING KEYLOGGER TO {name}..."
    ];
    
    const logTexts = [
        "> [OK] ACCESSING {name}'S GALLERY...",
        "> [WARN] FIREWALL DETECTED IN SECTOR 7",
        "> [SUCCESS] {name}_WHATSAPP_DATABASE LINKED",
        "> [OK] MOKIBUL KHAN GRANTED ROOT ACCESS"
    ];

    const dbTexts = [
        "EXTRACTING: {name}_private_keys.dat",
        "DELETING {name}'S BROWSER_HISTORY...",
        "CRACKING PASSWORD FOR {name}...",
        "DOWNLOAD COMPLETE: {name}_social_data.zip"
    ];

    const satTexts = [
        "SAT-LINK ACTIVE: TARGETING {name}...",
        "MOKIBUL_KHAN: INJECTING PAYLOAD...",
        "COORDINATES FOUND: NEAR {name}'S AREA",
        "SYSTEM STATUS: {name} IS UNDER CONTROL"
    ];

    randomText(document.getElementById('brute'), bruteTexts, 600);
    randomText(document.getElementById('logs'), logTexts, 900);
    randomText(document.getElementById('db'), dbTexts, 700);
    randomText(document.getElementById('sat'), satTexts, 1200);
</script>

</body>
</html>
