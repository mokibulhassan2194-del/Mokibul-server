<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL - MOKIBUL KHAN</title>
    <style>
        body { background: black; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #0f0; padding: 10px; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #0f0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: 90vh; gap: 10px; padding: 10px; }
        .box { border: 1px solid #0f0; padding: 10px; overflow: hidden; position: relative; font-size: 12px; }
        .box-title { position: absolute; top: 0; right: 0; background: #0f0; color: black; padding: 2px 10px; font-weight: bold; }
        .scanner-text { line-height: 1.5; white-space: nowrap; }
        @keyframes scan { 0% { transform: translateY(100%); } 100% { transform: translateY(-100%); } }
    </style>
</head>
<body>

<div class="header">SYSTEM OVERRIDE BY: MOKIBUL KHAN v2.0</div>

<div class="grid">
    <div class="box">
        <div class="box-title">IP_BRUTE_FORCE</div>
        <div id="brute" class="scanner-text"></div>
    </div>

    <div class="box">
        <div class="box-title">ENCRYPTED_LOGS</div>
        <div id="logs" class="scanner-text"></div>
    </div>

    <div class="box">
        <div class="box-title">DATABASE_BREACH</div>
        <div id="db" class="scanner-text" style="color: red;"></div>
    </div>

    <div class="box">
        <div class="box-title">MOKIBUL_SAT_LINK</div>
        <div id="sat" class="scanner-text" style="color: aqua;"></div>
    </div>
</div>

<script>
    function randomText(element, sentences, speed) {
        setInterval(() => {
            let p = document.createElement('div');
            p.innerText = sentences[Math.floor(Math.random() * sentences.length)];
            element.prepend(p);
            if (element.children.length > 20) element.lastChild.remove();
        }, speed);
    }

    const bruteTexts = ["[!] TRYING: 192.168.1.1...", "[!] BYPASSING SALT...", "[+] TOKEN FOUND: " + Math.random().toString(36).substr(2, 9), "[!] EXPLOITING PORT 4444..."];
    const logTexts = ["> [OK] CONNECTION SECURE", "> [WARN] FIREWALL DETECTED", "> [CRITICAL] BYPASSING GOVT_FIREWALL", "> [SUCCESS] ROOT ACCESS GRANTED"];
    const dbTexts = ["EXTRACTING: cc_data.sql", "UPLOADING MALWARE...", "DELETING SERVER BACKUP...", "PASSWORD CRACKED: ********"];
    const satTexts = ["CONNECTING TO SAT-09...", "LOCATING COORDINATES...", "TARGET: ENCRYPTED_SERVER", "MOKIBUL_KHAN: ACCESS VERIFIED"];

    randomText(document.getElementById('brute'), bruteTexts, 500);
    randomText(document.getElementById('logs'), logTexts, 800);
    randomText(document.getElementById('db'), dbTexts, 600);
    randomText(document.getElementById('sat'), satTexts, 1000);
</script>

</body>
</html>
