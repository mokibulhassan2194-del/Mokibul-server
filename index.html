<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOKIBUL DHAMAKA</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; /* स्क्रीन हिलना बंद */
            background-color: #000;
            touch-action: none; /* टच करने पर पेज नहीं हिलेगा */
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: #111;
        }
        #ui {
            position: absolute; top: 10px; left: 10px;
            color: #0f0; font-family: 'Courier New', Courier, monospace;
            font-size: 22px; font-weight: bold;
            pointer-events: none; /* UI पर टच काम नहीं करेगा, सीधा गेम पर करेगा */
        }
    </style>
</head>
<body>

    <div id="ui">MOKIBUL DHAMAKA <br> SCORE: <span id="score">0</span></div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameSpeed = 5;
        let gravity = 0.8;
        
        let player = {
            x: 50,
            y: canvas.height - 150,
            w: 40, h: 60, // थोड़ा लंबा 'इंसान' जैसा साइज
            dy: 0,
            jump: 16,
            grounded: false
        };

        let obstacles = [];

        function spawnObstacle() {
            let h = Math.random() * (80 - 30) + 30;
            obstacles.push({
                x: canvas.width,
                y: canvas.height - h,
                w: 30, h: h
            });
        }

        function jump() {
            if (player.grounded) {
                player.dy = -player.jump;
                player.grounded = false;
            }
        }

        // मोबाइल टच फिक्स
        window.addEventListener("touchstart", function(e) {
            e.preventDefault(); // ब्राउज़र का डिफ़ॉल्ट हिलना बंद
            jump();
        }, {passive: false});

        window.addEventListener("mousedown", jump);

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ground Line
            ctx.strokeStyle = "#0f0";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 2);
            ctx.lineTo(canvas.width, canvas.height - 2);
            ctx.stroke();

            // Player Physics
            player.dy += gravity;
            player.y += player.dy;

            if (player.y + player.h > canvas.height) {
                player.y = canvas.height - player.h;
                player.dy = 0;
                player.grounded = true;
            }

            // Draw Character (Blue Body, Yellow Head)
            ctx.fillStyle = "#007bff"; 
            ctx.fillRect(player.x, player.y + 20, player.w, player.h - 20); // Body
            ctx.fillStyle = "#ffd700"; 
            ctx.fillRect(player.x + 5, player.y, 30, 25); // Head

            // Obstacles
            if (Math.random() < 0.015) {
                if(obstacles.length == 0 || obstacles[obstacles.length-1].x < canvas.width - 250) {
                    spawnObstacle();
                }
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= gameSpeed;

                ctx.fillStyle = "red";
                ctx.fillRect(o.x, o.y, o.w, o.h);

                // Collision Detection
                if (player.x < o.x + o.w && player.x + player.w > o.x &&
                    player.y < o.y + o.h && player.y + player.h > o.y) {
                    score = 0;
                    gameSpeed = 5;
                    obstacles = [];
                    scoreEl.innerText = score;
                }

                if (o.x + o.w < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreEl.innerText = score;
                    gameSpeed += 0.1;
                }
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
