<!DOCTYPE html>
<html>
<head>
    <title>Mokibul Hill Climber</title>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: linear-gradient(#87CEEB, #E0F6FF); }
        .stats { position: absolute; top: 10px; left: 10px; font-weight: bold; font-size: 20px; color: #333; }
    </style>
</head>
<body>
    <div class="stats">Distance: <span id="dist">0</span>m</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let distance = 0;
        let speed = 0;
        let carY = 0;
        let rotation = 0;
        let isGas = false;

        // पहाड़ों का नक्शा (Terrain points)
        let points = [];
        for (let i = 0; i < 1000; i++) {
            points.push(Math.sin(i * 0.1) * 30 + Math.cos(i * 0.05) * 50 + 400);
        }

        let scrollX = 0;

        // Input
        window.addEventListener("mousedown", () => isGas = true);
        window.addEventListener("mouseup", () => isGas = false);
        window.addEventListener("touchstart", () => isGas = true);
        window.addEventListener("touchend", () => isGas = false);

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. ज़मीन (Terrain) बनाना
            ctx.fillStyle = "#4a7a2a";
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for (let i = 0; i < canvas.width; i++) {
                let worldX = i + scrollX;
                let pIndex = Math.floor(worldX / 10);
                let y = points[pIndex];
                ctx.lineTo(i, y);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();

            // 2. गाड़ी की पोजीशन (Car Physics)
            let carX = 100;
            let currentPointIndex = Math.floor((carX + scrollX) / 10);
            let groundY = points[currentPointIndex];
            
            if (isGas) speed += 0.2;
            else speed *= 0.98; // Friction
            
            if (speed > 10) speed = 10;
            scrollX += speed;
            distance = Math.floor(scrollX / 10);
            document.getElementById("dist").innerText = distance;

            // 3. गाड़ी बनाना (Red Car)
            ctx.save();
            ctx.translate(carX, groundY - 20);
            
            // बॉडी
            ctx.fillStyle = "red";
            ctx.fillRect(-20, -10, 40, 15);
            ctx.fillStyle = "black";
            ctx.fillRect(-15, -20, 25, 10); // छत
            
            // पहिये
            ctx.beginPath();
            ctx.arc(-15, 8, 8, 0, Math.PI * 2);
            ctx.arc(15, 8, 8, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
