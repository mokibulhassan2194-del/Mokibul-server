<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOKIBUL DHAMAKA CLASSIC</title>
    <style>
        /* गेम को हिलने से रोकने के लिए */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; touch-action: none;
        }
        canvas { 
            display: block; background: #111; 
        }
        #scoreBoard {
            position: absolute; top: 10px; left: 10px;
            color: #0f0; font-family: Arial, sans-serif; font-size: 24px;
        }
    </style>
</head>
<body>

    <div id="scoreBoard">SCORE: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameSpeed = 5;
        let gravity = 0.6;
        
        let player = {
            x: 50, y: canvas.height - 50,
            w: 40, h: 40, dy: 0, jump: 12, grounded: false
        };

        let obstacles = [];

        // कूदने का फंक्शन
        function jump() {
            if (player.grounded) {
                player.dy = -player.jump;
                player.grounded = false;
            }
        }

        // टच और क्लिक कंट्रोल (बिना किसी रुकावट के)
        window.addEventListener("touchstart", function(e) {
            e.preventDefault();
            jump();
        }, {passive: false});

        window.addEventListener("mousedown", jump);

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // प्लेयर की हलचल
            player.dy += gravity;
            player.y += player.dy;

            if (player.y + player.h > canvas.height) {
                player.y = canvas.height - player.h;
                player.dy = 0;
                player.grounded = true;
            }

            // प्लेयर बनाना (Classic Blue Box)
            ctx.fillStyle = "#007bff"; 
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // बाधाएं (Obstacles) बनाना
            if (Math.random() < 0.02) {
                if(obstacles.length == 0 || obstacles[obstacles.length-1].x < canvas.width - 200) {
                    obstacles.push({ x: canvas.width, y: canvas.height - 40, w: 25, h: 40 });
                }
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= gameSpeed;

                ctx.fillStyle = "red";
                ctx.fillRect(o.x, o.y, o.w, o.h);

                // टकराने पर गेम खत्म
                if (player.x < o.x + o.w && player.x + player.w > o.x &&
                    player.y < o.y + o.h && player.y + player.h > o.y) {
                    score = 0;
                    gameSpeed = 5;
                    obstacles = [];
                    scoreEl.innerText = score;
                }

                if (o.x + o.w < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreEl.innerText = score;
                    gameSpeed += 0.1;
                }
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
