<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MakiShow | Profile</title>
    <style>
        /* CSS - डिज़ाइन के लिए */
        body {
            font-family: Arial, sans-serif;
            background-color: #fafafa;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            background-color: white;
            width: 100%;
            border-bottom: 1px solid #dbdbdb;
            padding: 10px 0;
            text-align: center;
            font-weight: bold;
            font-size: 24px;
            color: #262626;
            position: sticky;
            top: 0;
        }
        .profile-container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
        }
        .profile-top {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            padding: 3px;
        }
        .profile-pic img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: white;
            border: 2px solid white;
        }
        .profile-info {
            margin-left: 30px;
        }
        .username {
            font-size: 20px;
            font-weight: bold;
        }
        .bio {
            margin-top: 10px;
            font-size: 14px;
            color: #262626;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 14px;
        }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-top: 20px;
        }
        .post-box {
            background-color: #efefef;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: #8e8e8e;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="header">MakiShow</div>

    <div class="profile-container">
        <div class="profile-top">
            <div class="profile-pic">
                <img src="https://via.placeholder.com/150" alt="Maki">
            </div>
            <div class="profile-info">
                <div class="username">makibul_official</div>
                <div class="stats">
                    <span><b>15</b> Posts</span>
                    <span><b>500</b> Followers</span>
                    <span><b>200</b> Following</span>
                </div>
                <div class="bio">
                    <b>Makibul</b><br>
                    Singer | Coder | Dreamer 🎸💻<br>
                    Never give up on your vibes!
                </div>
            </div>
        </div>

        <hr style="border: 0.5px solid #dbdbdb;">

        <div class="posts-grid">
            <div class="post-box">Video 1</div>
            <div class="post-box">Video 2</div>
            <div class="post-box">Video 3</div>
            <div class="post-box">Video 4</div>
            <div class="post-box">Video 5</div>
            <div class="post-box">Video 6</div>
        </div>
    </div>

</body>
</html>
