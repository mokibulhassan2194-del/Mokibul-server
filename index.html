<!DOCTYPE html>
<html>
<head>
    <title>MOKIBUL DHAMAKA SERVER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #fff; text-align: center; height: 100vh; touch-action: manipulation; }
        canvas { display: block; border: 4px solid #f0f; box-shadow: 0 0 25px #f0f; margin: 10px auto; max-width: 95%; background: #050010; }
        /* MOKIBUL special UI */
        .mokibul-ui { position: absolute; width: 100%; top: 10px; font-size: 24px; font-weight: bold; color: #0f0; pointer-events: none; text-shadow: 2px 2px #000; display: flex; justify-content: space-around; }
        h1 { margin-top: 50px; text-shadow: 0 0 10px #f0f; }
    </style>
</head>
<body onclick="jump()" ontouchstart="jump()">
    <div class="mokibul-ui">
        <span>[ MOKIBUL ]</span>
        <span>SCORE: <span id="score">0</span></span>
        <span>COINS: <span id="coins">0</span></span>
    </div>
    
    <h1>MOKIBUL DHAMAKA <span style="font-size:40px;">🌙</span></h1>
    <canvas id="gameCanvas"></canvas>
    <p style="color: #ff0; font-weight: bold;">🔥 DODGE THE BLOCKS & COLLECT MOKIBUL COINS! 🔥</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 800; canvas.height = 350;

        let score = 0, coinCount = 0, gameSpeed = 9; // स्पीड Fast है!
        let isGameOver = false;

        const player = { x: 80, y: 250, w: 45, h: 45, dy: 0, jumpForce: 16, gravity: 0.9, grounded: false };
        let obstacles = [], coins = [];

        // दुश्मन पैदा करने का लॉजिक (Spacing बढ़ा दी है)
        function spawnEverything() {
            if (isGameOver) return;

            // पहला दुश्मन
            obstacles.push({ x: canvas.width, y: 260, w: 40, h: 45 });

            // 'घना-घना' कम करने के लिए दूसरा बॉक्स कभी-कभी और बहुत दूर आएगा 😂
            if (Math.random() > 0.7) { 
                obstacles.push({ x: canvas.width + 600, y: 260, w: 40, h: 45 }); 
            }

            // सिक्के (Coins) जम्प करने वाले एरिया में
            coins.push({ x: canvas.width + 350, y: 120 + Math.random() * 80, r: 16, collected: false });
            
            // नया पैदा होने का समय बढ़ा दिया (Spacing)
            setTimeout(spawnEverything, 1500 + Math.random() * 1000); 
        }

        function update() {
            if (isGameOver) return;
            player.dy += player.gravity;
            player.y += player.dy;

            if (player.y > 250) { player.y = 250; player.dy = 0; player.grounded = true; }

            // Obstacles update & spacing check
            obstacles.forEach((obs, i) => {
                obs.x -= gameSpeed;
                if (obs.x + obs.w < 0) { obstacles.splice(i, 1); score += 10; }
                if (player.x < obs.x + obs.w && player.x + player.w > obs.x && player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                    isGameOver = true;
                    alert("PHAT GAYA! 😂 Mokibul's Score: " + score);
                    location.reload();
                }
            });

            // Coins update with collect effect
            coins.forEach((c, i) => {
                c.x -= gameSpeed;
                let dx = (player.x + 22) - c.x, dy = (player.y + 22) - c.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 40 && !c.collected) {
                    c.collected = true; coinCount++; score += 100; // कॉइन से ज़्यादा पॉइंट
                    flashExplosion(c.x, c.y); 
                }
                if (c.x + c.r < 0) coins.splice(i, 1);
            });
            
            document.getElementById("score").innerText = score;
            document.getElementById("coins").innerText = coinCount;
        }

        // कॉइन कलेक्शन धमाका इफ़ेक्ट
        function flashExplosion(x, y) {
            ctx.fillStyle = "rgba(255, 255, 0, 0.6)"; ctx.beginPath(); ctx.arc(x, y, 60, 0, Math.PI*2); ctx.fill();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Ground
            ctx.fillStyle = "#222"; ctx.fillRect(0, 300, canvas.width, 50);

            // Draw Player (Neon Green)
            ctx.fillStyle = "#0f0"; ctx.shadowBlur = 15; ctx.shadowColor = "#0f0";
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Draw Obstacles (Red Neon)
            ctx.fillStyle = "#f00"; ctx.shadowColor = "#f00"; ctx.shadowBlur = 10;
            obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

            // Draw Coins (Gold Sphere)
            ctx.fillStyle = "#ff0"; ctx.shadowColor = "#ff0"; ctx.shadowBlur = 15;
            coins.forEach(c => {
                if (!c.collected) {
                    ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
                }
            });
            ctx.shadowBlur = 0;

            update();
            requestAnimationFrame(draw);
        }

        function jump() { if (player.grounded) { player.dy = -player.jumpForce; player.grounded = false; } }
        spawnEverything(); draw();
    </script>
</body>
</html>
