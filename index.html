<!DOCTYPE html>
<html>
<head>
    <title>Mokibul Ultra Smooth Racer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; touch-action: none; }
        .ui { position: absolute; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 2px solid #0f0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="ui">Distance: <span id="dist">0</span>m | Speed: <span id="spd">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        let scrollX = 0;
        let speed = 0;
        let isGas = false;
        let points = [];

        // --- पहाड़ बनाने का नया और असली फॉर्मूला ---
        // यहाँ हमने i * 0.01 किया है ताकि पहाड़ बहुत चौड़े और आराम से ऊपर-नीचे हों
        for (let i = 0; i < 20000; i++) {
            let h = (canvas.height / 1.5) + 
                    Math.sin(i * 0.01) * 80 + // बड़े पहाड़
                    Math.cos(i * 0.005) * 40;  // हल्का उतार-चढ़ाव
            points.push(h);
        }

        window.onmousedown = window.ontouchstart = () => isGas = true;
        window.onmouseup = window.ontouchend = () => isGas = false;

        function draw() {
            // 1. प्रीमियम डार्क स्काई
            let sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
            sky.addColorStop(0, "#020111");
            sky.addColorStop(1, "#191970");
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. स्मूथ रास्ता खींचना
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for (let i = 0; i < canvas.width; i++) {
                let pIdx = Math.floor(i + scrollX);
                ctx.lineTo(i, points[pIdx] || canvas.height/1.5);
            }
            ctx.lineTo(canvas.width, canvas.height);
            
            // घास और मिट्टी
            let ground = ctx.createLinearGradient(0, canvas.height/2, 0, canvas.height);
            ground.addColorStop(0, "#27ae60"); // हरी घास
            ground.addColorStop(0.1, "#3e2723"); // गहरी मिट्टी
            ctx.fillStyle = ground;
            ctx.fill();

            // 3. रफ़्तार और मूवमेंट
            if (isGas) speed += 0.15;
            else speed *= 0.98;
            if (speed > 15) speed = 15;
            scrollX += speed;

            // 4. गाड़ी की पोजीशन
            let carX = 150;
            let currentIdx = Math.floor(carX + scrollX);
            let carY = (points[currentIdx] || canvas.height/1.5) - 15;

            // गाड़ी को पहाड़ के हिसाब से टेढ़ा करना
            let angle = Math.atan2(points[currentIdx + 5] - points[currentIdx - 5], 10);

            ctx.save();
            ctx.translate(carX, carY);
            ctx.rotate(angle);
            
            // गाड़ी की बॉडी
            ctx.fillStyle = "#ff0000";
            ctx.fillRect(-25, -15, 50, 18);
            ctx.fillStyle = "#000";
            ctx.fillRect(-10, -28, 20, 15); // शीशा
            
            // पहिये (काले गोल)
            ctx.fillStyle = "#222";
            ctx.beginPath();
            ctx.arc(-15, 8, 10, 0, Math.PI*2);
            ctx.arc(15, 8, 10, 0, Math.PI*2);
            ctx.fill();
            
            ctx.restore();

            document.getElementById("dist").innerText = Math.floor(scrollX / 10);
            document.getElementById("spd").innerText = Math.floor(speed * 10);
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
