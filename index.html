<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOKIBUL DHAMAKA</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; touch-action: none;
        }
        canvas { display: block; background: #111; }
        #score { 
            position: absolute; top: 20px; left: 20px; 
            color: #0f0; font-family: sans-serif; font-size: 28px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="score">SCORE: 0</div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");

        // मोबाइल स्क्रीन के हिसाब से साइज
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let velocity = 5;
        let gravity = 0.6;
        let obstacles = [];

        let player = {
            x: 50,
            y: canvas.height - 60,
            w: 40, h: 40,
            dy: 0,
            jumpForce: 14,
            grounded: false
        };

        function jump() {
            if (player.grounded) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }
        }

        // टच कंट्रोल
        window.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); }, {passive: false});
        window.addEventListener("mousedown", jump);

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Player Physics
            player.dy += gravity;
            player.y += player.dy;

            if (player.y + player.h > canvas.height) {
                player.y = canvas.height - player.h;
                player.dy = 0;
                player.grounded = true;
            }

            // Draw Player (Blue Box)
            ctx.fillStyle = "#007bff";
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Obstacles logic
            if (Math.random() < 0.02 && (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 250)) {
                obstacles.push({ x: canvas.width, y: canvas.height - 40, w: 30, h: 40 });
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= velocity;

                // Draw Obstacle (Red Box)
                ctx.fillStyle = "red";
                ctx.fillRect(o.x, o.y, o.w, o.h);

                // Collision (Takkar)
                if (player.x < o.x + o.w && player.x + player.w > o.x &&
                    player.y < o.y + o.h && player.y + player.h > o.y) {
                    // Game Over - Restart
                    score = 0;
                    velocity = 5;
                    obstacles = [];
                    scoreDisplay.innerText = "SCORE: 0";
                }

                // Remove obstacle and add score
                if (o.x + o.w < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreDisplay.innerText = "SCORE: " + score;
                    velocity += 0.1; // धीरे-धीरे स्पीड बढ़ाना
                }
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
