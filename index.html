<!DOCTYPE html>
<html>
<head>
    <title>Mokibul Real Smooth Racer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; touch-action: none; }
        .ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-size: 18px; border: 1px solid #fff; }
    </style>
</head>
<body>
    <div class="ui">Distance: <span id="dist">0</span>m | Speed: <span id="spd">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        let scrollX = 0;
        let speed = 0;
        let isGas = false;
        let points = [];

        // --- असली स्मूथ पहाड़ का जादू यहाँ है ---
        let y = canvas.height / 1.5;
        for (let i = 0; i < 10000; i++) {
            // हमने Sin और Cos को बहुत धीमा (0.01) कर दिया ताकि पहाड़ चौड़े बनें
            y = (canvas.height / 1.5) + Math.sin(i * 0.02) * 60 + Math.sin(i * 0.01) * 40;
            points.push(y);
        }

        window.onmousedown = window.ontouchstart = () => isGas = true;
        window.onmouseup = window.ontouchend = () => isGas = false;

        function draw() {
            // 1. सुन्दर आसमान
            let sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
            sky.addColorStop(0, "#1e3c72");
            sky.addColorStop(1, "#2a5298");
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. रास्ता खींचना
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for (let i = 0; i < canvas.width; i++) {
                let pIdx = Math.floor(i + scrollX);
                ctx.lineTo(i, points[pIdx] || canvas.height/1.5);
            }
            ctx.lineTo(canvas.width, canvas.height);
            
            // घास और मिट्टी वाला रंग
            let ground = ctx.createLinearGradient(0, canvas.height/2, 0, canvas.height);
            ground.addColorStop(0, "#2ecc71"); // ऊपर हरी घास
            ground.addColorStop(0.1, "#795548"); // नीचे भूरी मिट्टी
            ctx.fillStyle = ground;
            ctx.fill();

            // 3. गाड़ी की फिजिक्स
            let carX = 100;
            let currentIdx = Math.floor(carX + scrollX);
            let carY = (points[currentIdx] || canvas.height/1.5) - 20;

            if (isGas) speed += 0.2;
            else speed *= 0.98;
            if (speed > 12) speed = 12;
            scrollX += speed;

            // 4. लाल गाड़ी (The Car)
            ctx.save();
            ctx.translate(carX, carY);
            
            // गाड़ी का एंगल (रास्ते के हिसाब से थोड़ा झुकेगी)
            let angle = (points[currentIdx+5] - points[currentIdx-5]) / 10;
            ctx.rotate(angle);

            ctx.fillStyle = "#e74c3c"; // लाल बॉडी
            ctx.fillRect(-25, -15, 50, 20);
            ctx.fillStyle = "#333"; // खिड़की
            ctx.fillRect(-10, -25, 20, 10);
            
            // पहिये
            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(-15, 10, 10, 0, Math.PI*2);
            ctx.arc(15, 10, 10, 0, Math.PI*2);
            ctx.fill();
            
            ctx.restore();

            document.getElementById("dist").innerText = Math.floor(scrollX / 10);
            document.getElementById("spd").innerText = Math.floor(speed * 10);
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
