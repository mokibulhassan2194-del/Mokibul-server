<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; background: #fff; overflow: hidden; }

        /* Login Section */
        #login-section { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: absolute; width: 100%; z-index: 100; background: #fff; }
        .login-box { width: 90%; max-width: 320px; text-align: center; }
        .logo { font-size: 3rem; font-weight: bold; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #dbdbdb; border-radius: 5px; background: #fafafa; }
        .btn { width: 100%; padding: 12px; background: #0095f6; color: #fff; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* Main App Section */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        .header { height: 50px; border-bottom: 1px solid #dbdbdb; display: flex; align-items: center; padding: 0 15px; font-weight: bold; font-size: 1.2rem; background: #fff; }
        .content { flex: 1; overflow-y: auto; padding-bottom: 60px; background: #fafafa; }

        /* Post Style */
        .post { background: #fff; border-bottom: 1px solid #dbdbdb; margin-bottom: 15px; }
        .post-header { padding: 10px; display: flex; align-items: center; font-weight: bold; gap: 10px; }
        .p-img { width: 100%; aspect-ratio: 1/1; background: #eee; display: flex; align-items: center; justify-content: center; color: #999; }
        .actions { padding: 12px; font-size: 22px; display: flex; gap: 15px; }
        .like-btn { cursor: pointer; transition: 0.2s; }
        .liked { color: red; }

        /* Profile Style */
        #profile-page { display: none; padding: 20px; text-align: center; }
        .profile-pic { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(45deg, orange, red); margin: 0 auto 15px; border: 3px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }

        /* Bottom Nav */
        .nav { height: 55px; border-top: 1px solid #dbdbdb; display: flex; justify-content: space-around; align-items: center; background: #fff; position: fixed; bottom: 0; width: 100%; }
        .nav-item { font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-box">
            <div class="logo">Max Ful</div>
            <input type="text" placeholder="Username" id="u">
            <input type="password" placeholder="Password" id="p">
            <button class="btn" onclick="login()">Log In</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header" id="h-title">Max Ful</div>
        <div class="content">
            
            <div id="home-page">
                <div class="post">
                    <div class="post-header">makibul_official</div>
                    <div class="p-img">Max Ful Post 1</div>
                    <div class="actions">
                        <span class="like-btn" onclick="toggleLike(this)">❤️</span>
                        <span>💬</span><span>✈️</span>
                    </div>
                </div>
            </div>

            <div id="profile-page">
                <div class="profile-pic"></div>
                <h2>makibul_official</h2>
                <p>Coder | Singer | Dreamer</p>
                <hr>
                <p>Yahan tumhare videos dikhenge!</p>
            </div>

        </div>

        <div class="nav">
            <div class="nav-item" onclick="nav('home')">🏠</div>
            <div class="nav-item">🔍</div>
            <div class="nav-item">➕</div>
            <div class="nav-item" onclick="nav('profile')">👤</div>
        </div>
    </div>

    <script>
        // Login Function
        function login() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        }

        // Like Button Function
        function toggleLike(btn) {
            btn.classList.toggle('liked');
        }

        // Navigation Function (Switching Pages)
        function nav(page) {
            if(page === 'home') {
                document.getElementById('home-page').style.display = 'block';
                document.getElementById('profile-page').style.display = 'none';
                document.getElementById('h-title').innerText = 'Max Ful';
            } else {
                document.getElementById('home-page').style.display = 'none';
                document.getElementById('profile-page').style.display = 'block';
                document.getElementById('h-title').innerText = 'Profile';
            }
        }
    </script>
</body>
</html>
