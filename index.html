<!DOCTYPE html>
<html>
<head>
    <title>Mokibul HD Climber</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { display: block; touch-action: none; }
        .ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; border: 2px solid #fff; }
    </style>
</head>
<body>
    <div class="ui">Distance: <span id="dist">0</span>m</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Screen Adjustments
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        let scrollX = 0;
        let speed = 0;
        let isGas = false;

        // Smooth Terrain Generation
        let points = [];
        let y = canvas.height / 1.5;
        for (let i = 0; i < 5000; i++) {
            y += Math.sin(i * 0.05) * 10 + (Math.random() - 0.5) * 5;
            points.push(y);
        }

        // Controls
        window.onmousedown = window.ontouchstart = () => isGas = true;
        window.onmouseup = window.ontouchend = () => isGas = false;

        function draw() {
            // 1. HD Sky Gradient
            let sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
            sky.addColorStop(0, "#00b4db");
            sky.addColorStop(1, "#90e0ef");
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Draw Sun
            ctx.fillStyle = "#fffc00";
            ctx.beginPath();
            ctx.arc(canvas.width - 80, 80, 40, 0, Math.PI * 2);
            ctx.fill();

            // 3. Smooth Terrain with Grass
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for (let i = 0; i < canvas.width; i++) {
                let pIndex = Math.floor((i + scrollX) / 2);
                ctx.lineTo(i, points[pIndex]);
            }
            ctx.lineTo(canvas.width, canvas.height);
            
            // Ground Color (Soil)
            let ground = ctx.createLinearGradient(0, canvas.height/2, 0, canvas.height);
            ground.addColorStop(0, "#5d4037");
            ground.addColorStop(1, "#3e2723");
            ctx.fillStyle = ground;
            ctx.fill();
            
            // Grass Line
            ctx.strokeStyle = "#2e7d32";
            ctx.lineWidth = 10;
            ctx.stroke();

            // 4. Car Logic
            let carX = 100;
            let currentP = Math.floor((carX + scrollX) / 2);
            let carY = points[currentP] - 15;

            if (isGas) speed += 0.3;
            else speed *= 0.96;
            
            if (speed > 15) speed = 15;
            scrollX += speed;

            // 5. High Graphics Car
            ctx.save();
            ctx.translate(carX, carY);
            
            // Car Body (Red)
            ctx.fillStyle = "#d32f2f";
            ctx.fillRect(-25, -15, 50, 20);
            ctx.fillStyle = "#000"; // Window
            ctx.fillRect(-10, -25, 20, 10);
            
            // Wheels
            ctx.fillStyle = "#333";
            ctx.beginPath();
            ctx.arc(-15, 10, 10, 0, Math.PI*2);
            ctx.arc(15, 10, 10, 0, Math.PI*2);
            ctx.fill();
            
            ctx.restore();

            document.getElementById("dist").innerText = Math.floor(scrollX / 10);
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
