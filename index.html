<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Login</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 85%; text-align: center; }
        .logo { font-size: 40px; font-weight: bold; color: #FFD700; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #121212; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #FFD700; border: none; font-weight: bold; border-radius: 5px; margin-top: 10px; cursor: pointer; text-decoration: none; display: inline-block; color: #000; }
        .create-btn { background: none; color: #FFD700; border: 1px solid #FFD700; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">Max Ful</div>
        <input type="text" placeholder="Phone number, username, or email">
        <input type="password" placeholder="Password">
        <a href="home.html" class="btn">Log In</a>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        <a href="signup.html" class="btn create-btn">Create New Account</a>
    </div>
</body>
</html>
