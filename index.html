<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful | Login</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        body { 
            background-color: #000; color: #fff; font-family: sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
            overflow: hidden; 
        }
        
        .logo { 
            font-size: 55px; font-weight: 900; color: #FFD700; margin-bottom: 40px; 
            letter-spacing: -1.5px; text-transform: none; 
        }

        .login-container { width: 85%; max-width: 320px; text-align: center; }

        input {
            width: 100%; padding: 14px; margin-bottom: 12px; background: #1a1a1a;
            border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box;
            font-size: 16px; display: block; outline: none; transition: 0.3s;
            text-align: center; 
        }

        input:focus { border-color: #FFD700; background: #222; }

        .forgot-link {
            display: block; text-align: center; font-size: 13px; color: #FFD700;
            text-decoration: none; margin-top: 5px; margin-bottom: 25px; font-weight: 500;
        }

        .login-btn {
            width: 100%; padding: 14px; background: #FFD700; border: none;
            color: #000; font-weight: bold; border-radius: 10px; cursor: pointer;
            font-size: 16px; transition: 0.2s;
        }
        .login-btn:active { transform: scale(0.98); background: #e6c200; }

        .divider { 
            margin: 35px 0; color: #555; font-size: 13px; 
            display: flex; align-items: center; width: 100%; 
        }
        .divider::before, .divider::after { 
            content: ""; flex: 1; height: 1px; background: #222; margin: 0 10px; 
        }

        .create-btn {
            width: 100%; padding: 12px; background: transparent; border: 1px solid #333;
            color: #FFD700; font-weight: bold; border-radius: 10px; cursor: pointer;
            font-size: 14px; text-decoration: none; display: inline-block; box-sizing: border-box;
            transition: 0.3s; text-align: center;
        }
        .create-btn:hover { border-color: #FFD700; background: #111; }
        #recaptcha-container { margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="logo">Max Ful</div>

    <div class="login-container">
        <input type="text" id="userInput" placeholder="Phone, username or email" required>
        <input type="password" id="pass" placeholder="Password">
        
        <a href="forgot.html" class="forgot-link">Forgot password?</a>
        
        <button type="button" onclick="handleLogin()" class="login-btn">Log In</button>

        <div id="recaptcha-container"></div>

        <div class="divider">OR</div>

        <a href="signup.html" class="create-btn">Create New Account</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA4Z92DUiG6bJi8JEn4CoE6j03B8cF1dWE",
            authDomain: "max-ful-apps-cce76.firebaseapp.com",
            projectId: "max-ful-apps-cce76",
            storageBucket: "max-ful-apps-cce76.firebasestorage.app",
            messagingSenderId: "1097891042184",
            appId: "1:1097891042184:web:23c2d391f35a008774603d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // OTP setup
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
            'size': 'invisible'
        });

        function handleLogin() {
            const input = document.getElementById('userInput').value;
            const password = document.getElementById('pass').value;

            if(input === "") {
                alert("Bhai, detail to bhar do!");
                return;
            }

            // 1. Check if it's a Phone Number (Starts with +)
            if(input.startsWith('+')) {
                const appVerifier = window.recaptchaVerifier;
                auth.signInWithPhoneNumber(input, appVerifier)
                .then((confirmationResult) => {
                    const code = window.prompt("OTP bhej diya hai, yahan likhein:");
                    if (code) {
                        confirmationResult.confirm(code).then(() => {
                            window.location.href = "home.html";
                        }).catch(() => alert("Galat OTP!"));
                    }
                }).catch((err) => alert("SMS Error: " + err.message));
            } 
            // 2. Otherwise assume it's Email/Username
            else {
                if(password === "") {
                    alert("Bhai, password bhi chahiye!");
                    return;
                }
                
                // Normal Email Login
                auth.signInWithEmailAndPassword(input, password)
                .then(() => {
                    window.location.href = "home.html";
                })
                .catch((error) => {
                    alert("Error: " + error.message);
                });
            }
        }
    </script>
</body>
</html>
