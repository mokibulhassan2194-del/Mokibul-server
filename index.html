<!DOCTYPE html>
<html>
<head>
    <title>MOKIBUL JUNGLE RUN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: #fff; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let score = 0, lane = 0, speed = 0.08, gameActive = true;
        let objects = [], roadOffset = 0;

        let roadImg = new Image();
        roadImg.src = 'road.png'; 
        let roadLoaded = false;
        roadImg.onload = () => roadLoaded = true;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        let touchStartX = 0;
        window.ontouchstart = e => touchStartX = e.touches[0].clientX;
        window.ontouchend = e => {
            let diff = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(diff) > 30) {
                if (diff > 0 && lane < 1) lane++;
                else if (diff < 0 && lane > -1) lane--;
            }
        };

        function spawn() {
            if (!gameActive) return;
            objects.push({ z: 10, lane: Math.floor(Math.random() * 3) - 1 });
            setTimeout(spawn, 900);
        }
        spawn();

        function draw() {
            ctx.fillStyle = "#050510"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2, cy = canvas.height / 2;

            if (roadLoaded) {
                roadOffset += speed * 40;
                if (roadOffset > 100) roadOffset = 0;
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(cx - 40, cy); ctx.lineTo(cx + 40, cy);
                ctx.lineTo(cx + 500, canvas.height); ctx.lineTo(cx - 500, canvas.height);
                ctx.clip();
                for(let i=-1; i<2; i++) {
                    ctx.drawImage(roadImg, cx - 300, cy + (i * canvas.height) + (roadOffset * 10), 600, canvas.height);
                }
                ctx.restore();
            }

            objects.forEach((obj, i) => {
                obj.z -= speed;
                let scale = 1 / obj.z;
                let x = cx + (obj.lane * 180 * scale);
                let y = cy + (120 * scale);
                let size = 70 * scale;
                if (obj.z > 0.1) {
                    ctx.fillStyle = "red";
                    ctx.fillRect(x - size/2, y - size, size, size);
                }
                if (obj.z < 0.2 && obj.z > 0 && obj.lane === lane) {
                    gameActive = false;
                    alert("खेला खत्म! स्कोर: " + score);
                    location.reload();
                }
                if (obj.z < 0) { objects.splice(i, 1); score += 50; }
            });

            ctx.fillStyle = "#0cf";
            ctx.fillRect(cx + (lane * 120) - 20, canvas.height - 80, 40, 40);

            document.getElementById("score").innerText = score;
            if (gameActive) requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
