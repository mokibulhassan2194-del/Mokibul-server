<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Login</title>
    <style>
        body { font-family: sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px; text-align: center; }
        .logo { font-size: 35px; font-weight: bold; margin-bottom: 30px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; }
        .btn { width: 100%; padding: 8px; background: #0095f6; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">Max Ful</div>
        <form id="l-form">
            <input type="text" placeholder="Username (maki123)" required>
            <input type="password" placeholder="Password (bhai786)" required>
            <button type="submit" class="btn">Log In</button>
        </form>
    </div>

    <script>
        document.getElementById('l-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.querySelectorAll('input')[0].value;
            const p = document.querySelectorAll('input')[1].value;
            if(u === "maki123" && p === "bhai786") {
                window.location.href = "profile.html"; // यहाँ ध्यान दे! यह profile.html पर भेजेगा
            } else {
                alert("Galat Password!");
            }
        });
    </script>
</body>
</html>
