<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOKIBUL DHAMAKA</title>
    <style>
        /* ब्राउज़र को हिलने से रोकने के लिए */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; touch-action: none;
        }
        canvas { 
            display: block; background: #111; 
            border-bottom: 5px solid #0f0; 
        }
        #ui {
            position: absolute; top: 10px; left: 10px;
            color: #0f0; font-family: Arial; font-size: 20px;
            text-shadow: 2px 2px #000; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui">MOKIBUL DHAMAKA <br> Score: <span id="score">0</span></div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameSpeed = 4;
        let gravity = 0.6;
        
        let player = {
            x: 50, y: canvas.height - 100,
            w: 40, h: 40, dy: 0, jump: 15, grounded: false
        };

        let obstacles = [];

        function spawnObstacle() {
            let size = Math.random() * (60 - 20) + 20;
            obstacles.push({
                x: canvas.width, y: canvas.height - size,
                w: 30, h: size
            });
        }

        function handleJump() {
            if (player.grounded) {
                player.dy = -player.jump;
                player.grounded = false;
            }
        }

        // कहीं भी टच या क्लिक करो, काम करेगा!
        window.addEventListener("touchstart", (e) => { e.preventDefault(); handleJump(); }, {passive: false});
        window.addEventListener("mousedown", handleJump);

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Player Physics
            player.dy += gravity;
            player.y += player.dy;

            if (player.y + player.h > canvas.height) {
                player.y = canvas.height - player.h;
                player.dy = 0;
                player.grounded = true;
            }

            // Draw Player (Mokibul Hero)
            ctx.fillStyle = "#007bff"; 
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = "#ffd700"; // Head
            ctx.fillRect(player.x + 5, player.y - 15, 30, 20);

            // Obstacles
            if (Math.random() < 0.02) {
                if(obstacles.length == 0 || obstacles[obstacles.length-1].x < canvas.width - 200) spawnObstacle();
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= gameSpeed;

                ctx.fillStyle = "red";
                ctx.fillRect(o.x, o.y, o.w, o.h);

                // Collision
                if (player.x < o.x + o.w && player.x + player.w > o.x &&
                    player.y < o.y + o.h && player.y + player.h > o.y) {
                    location.reload(); // Game Over
                }

                if (o.x + o.w < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreEl.innerText = score;
                    gameSpeed += 0.05;
                }
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
