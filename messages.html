<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Messages</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; background-color: #000;
            color: #fff; font-family: sans-serif;
        }
        .header {
            padding: 15px; display: flex; align-items: center;
            border-bottom: 1px solid #222; position: sticky; top: 0; background: #000;
        }
        .back-btn { text-decoration: none; color: #fff; font-size: 24px; margin-right: 20px; }
        .title { font-size: 20px; font-weight: bold; flex-grow: 1; }
        
        .chat-list { display: flex; flex-direction: column; }
        
        /* चैट लिस्ट आइटम */
        .chat-item {
            display: flex; align-items: center; padding: 15px;
            text-decoration: none; color: #fff; border-bottom: 1px solid #111;
        }
        .chat-item:active { background-color: #111; }
        
        .user-pic {
            width: 55px; height: 55px; border-radius: 50%;
            border: 2px solid #FFC107; margin-right: 15px;
        }
        .chat-info { display: flex; flex-direction: column; }
        .user-name { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .last-msg { font-size: 13px; color: #aaa; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <span class="title">Messages</span>
    </div>

    <div class="chat-list">
        <a href="chat.html" class="chat-item">
            <img src="https://picsum.photos/id/91/100/100" class="user-pic">
            <div class="chat-info">
                <span class="user-name">Sahil Khan</span>
                <span class="last-msg">Abhi chat system bhi chalu kar diya! 😎</span>
            </div>
        </a>

        <a href="#" class="chat-item">
            <img src="https://picsum.photos/id/101/100/100" class="user-pic">
            <div class="chat-info">
                <span class="user-name">Rakibul Khan</span>
                <span class="last-msg">Bhai, Max Ful kab launch ho raha hai?</span>
            </div>
        </a>

        <a href="#" class="chat-item">
            <img src="https://picsum.photos/id/64/100/100" class="user-pic">
            <div class="chat-info">
                <span class="user-name">Almina</span>
                <span class="last-msg">Hero, kya kar rahe ho? ❤️</span>
            </div>
        </a>
    </div>

</body>
</html>
