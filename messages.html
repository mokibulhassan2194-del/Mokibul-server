<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful | Messages</title>
    <style>
        body { 
            background-color: #000; color: #fff; font-family: sans-serif; 
            margin: 0; touch-action: manipulation; 
        }
        
        .header { 
            display: flex; align-items: center; padding: 15px; 
            border-bottom: 1px solid #222; position: sticky; top: 0; 
            background: #000; z-index: 100;
        }
        .back-btn { text-decoration: none; color: #fff; font-size: 24px; margin-right: 20px; }
        
        .search-container { padding: 5px 15px; }
        .search-box { 
            background: #262626; padding: 10px 12px; 
            border-radius: 10px; color: #8e8e8e; font-size: 15px; 
            display: flex; align-items: center; gap: 10px;
        }
        
        .chat-list { padding-top: 10px; }
        .chat-item { 
            display: flex; align-items: center; padding: 12px 15px; 
            text-decoration: none; color: #fff; 
        }

        .profile-pic-wrapper {
            width: 60px; height: 60px; border-radius: 50%; 
            padding: 2px; border: 1.5px solid #FFD700; margin-right: 15px;
        }
        .profile-pic { 
            width: 100%; height: 100%; border-radius: 50%; 
            object-fit: cover; background: #333; 
        }
        
        .chat-info { flex: 1; border-bottom: 0.1px solid #1a1a1a; padding-bottom: 10px; }
        .name { font-weight: bold; font-size: 15px; margin-bottom: 2px; }
        .last-msg { color: #8e8e8e; font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html" class="back-btn">←</a>
        <span style="font-size: 19px; font-weight: bold;">Messages</span>
    </div>

    <div class="search-container">
        <div class="search-box">🔍 Search</div>
    </div>

    <div class="chat-list">
        <a href="chat.html" class="chat-item">
            <div class="profile-pic-wrapper">
                <img src="https://picsum.photos/id/91/100/100" class="profile-pic" alt="Sahil">
            </div>
            <div class="chat-info">
                <div class="name">Sahil Khan</div>
                <div class="last-msg">Bhai app ekdam kadak hai! · 2h</div>
            </div>
        </a>

        <a href="#" class="chat-item">
            <div class="profile-pic-wrapper">
                <img src="https://picsum.photos/id/60/100/100" class="profile-pic" alt="Team">
            </div>
            <div class="chat-info">
                <div class="name">Team Max Ful</div>
                <div class="last-msg">Welcome to your new app! · 5h</div>
            </div>
        </a>
    </div>

</body>
</html>
