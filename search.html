<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Search</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        
        /* Search Box Styling */
        .search-box { padding: 15px; position: sticky; top: 0; background: #000; z-index: 100; }
        .search-input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #262626; color: #fff; outline: none; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        .search-input:focus { border: 1px solid #FFD700; } /* Focus hone par halka yellow border */

        /* Default Grid (Trending Videos/Images) */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; transition: 0.3s; }
        .grid-item { aspect-ratio: 1/1; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        /* Search Results List */
        #search-results { display: none; padding: 10px; }
        .user-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #111; animation: fadeIn 0.3s; }
        .user-pic { width: 45px; height: 45px; border-radius: 50%; background: #333; margin-right: 15px; object-fit: cover; border: 1px solid #FFD700; }
        .user-name { font-weight: bold; font-size: 15px; color: #fff; }
        .user-followers { font-size: 12px; color: #888; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: #fff; text-decoration: none; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

    <div class="search-box">
        <input type="text" class="search-input" id="mainSearch" placeholder="🔍 Search..." oninput="doSearch()">
    </div>

    <div class="grid" id="default-grid">
        <div class="grid-item">🎬</div><div class="grid-item">📸</div><div class="grid-item">🔥</div>
        <div class="grid-item">🌟</div><div class="grid-item">🎵</div><div class="grid-item">⚽</div>
        <div class="grid-item">🎨</div><div class="grid-item">🎮</div><div class="grid-item">🍕</div>
    </div>

    <div id="search-results"></div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item">🏠<br>Home</a>
        <a href="search.html" class="nav-item">🔍<br>Search</a>
        <a href="#" style="font-size: 25px; color: #FFD700;">+</a>
        <a href="reels.html" class="nav-item">🎬<br>Reels</a>
        <a href="profile.html" class="nav-item">👤<br>Profile</a>
    </div>

    <script>
        // Fake Database (Followers ke sath)
        const allUsers = [
            { name: "priya.art", followers: 150000, pic: "https://via.placeholder.com/150" },
            { name: "makibul_islam", followers: 55000, pic: "https://via.placeholder.com/150" },
            { name: "ankit_99", followers: 12000, pic: "https://via.placeholder.com/150" },
            { name: "rahul_vlogs", followers: 8500, pic: "https://via.placeholder.com/150" },
            { name: "mr_beast_fan", followers: 200000, pic: "https://via.placeholder.com/150" }
        ];

        function doSearch() {
            let input = document.getElementById('mainSearch').value.toLowerCase();
            let grid = document.getElementById('default-grid');
            let resultsDiv = document.getElementById('search-results');

            // Logic: Agar box khali nahi hai, tabhi grid hide hogi
            if (input.length > 0) {
                grid.style.display = 'none';
                resultsDiv.style.display = 'block';
                
                resultsDiv.innerHTML = ""; // Purana clear karo

                // Filter aur Sort (Followers upar)
                let filteredUsers = allUsers
                    .filter(u => u.name.toLowerCase().includes(input))
                    .sort((a, b) => b.followers - a.followers);

                filteredUsers.forEach(user => {
                    resultsDiv.innerHTML += `
                        <div class="user-row" onclick="location.href='profile.html'">
                            <img src="${user.pic}" class="user-pic">
                            <div>
                                <div class="user-name">${user.name}</div>
                                <div class="user-followers">${(user.followers/1000).toFixed(1)}k followers</div>
                            </div>
                        </div>
                    `;
                });
            } else {
                // Agar box khali hai, to wapas Grid dikhao
                grid.style.display = 'grid';
                resultsDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
