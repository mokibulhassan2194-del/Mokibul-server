<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Max Ful | Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            background-color: #000; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding-bottom: 70px; overflow-x: hidden; 
        }
        
        /* Search Box: Instagram जैसा गोल और आइकॉन के साथ */
        .search-container { 
            padding: 10px 15px; position: sticky; top: 0; background: #000; z-index: 100; 
        }
        .search-wrapper {
            background: #262626; border-radius: 10px; display: flex; align-items: center; padding: 8px 12px; gap: 10px;
        }
        .search-wrapper i { color: #8e8e8e; font-size: 14px; }
        .search-input { 
            width: 100%; border: none; background: transparent; color: #fff; 
            outline: none; font-size: 16px; 
        }

        /* Explore Grid: रील और फोटो का मिक्सचर */
        .explore-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            grid-auto-rows: 130px; gap: 2px; padding: 2px; 
        }
        .grid-item { position: relative; background: #1a1a1a; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Tall Layout for Reels */
        .grid-item.tall { grid-row: span 2; }
        .video-icon { position: absolute; top: 8px; right: 8px; color: #fff; font-size: 14px; text-shadow: 0 0 4px rgba(0,0,0,0.5); }

        /* Search Results: प्रोफेशनल लुक */
        #search-results { display: none; padding: 5px 15px; }
        .user-row { 
            display: flex; align-items: center; padding: 10px 0; 
            animation: fadeIn 0.2s ease-in; cursor: pointer; 
        }
        .user-pic { 
            width: 50px; height: 50px; border-radius: 50%; 
            margin-right: 12px; object-fit: cover; border: 0.1px solid #333; 
        }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-weight: 600; font-size: 14px; }
        .user-full-name { font-size: 13px; color: #a8a8a8; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Bottom Navigation */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 55px; 
            background: #000; border-top: 0.1px solid #262626; 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; 
        }
        .nav-item { color: #fff; text-decoration: none; font-size: 24px; opacity: 0.7; }
        .nav-item.active { opacity: 1; }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" class="search-input" id="mainSearch" placeholder="Search" oninput="doSearch()">
        </div>
    </div>

    <div class="explore-grid" id="explore-grid">
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=1"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=2"></div>
        <div class="grid-item tall">
            <img src="https://picsum.photos/300/600?random=3">
            <i class="fas fa-play video-icon"></i>
        </div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=4"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=5"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=6"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=7"></div>
        <div class="grid-item tall">
            <img src="https://picsum.photos/300/600?random=8">
            <i class="fas fa-play video-icon"></i>
        </div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=9"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=10"></div>
    </div>

    <div id="search-results"></div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fas fa-house"></i></a>
        <a href="search.html" class="nav-item active"><i class="fas fa-magnifying-glass"></i></a>
        <a href="upload.html" class="nav-item" style="color: #FFD700; font-size: 28px;"><i class="far fa-square-plus"></i></a>
        <a href="reels.html" class="nav-item"><i class="fas fa-clapperboard"></i></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-circle-user"></i></a>
    </div>

    <script>
        const allUsers = [
            { id: "mr_beast", name: "MrBeast", full: "Jimmy Donaldson", pic: "https://picsum.photos/150/150?random=50", link: "mrbeast.html" },
            { id: "mokibul_hassan", name: "mokibul_hassan", full: "Mokibul Hassan", pic: "https://picsum.photos/150/150?random=51", link: "profile.html" },
            { id: "priya_art", name: "priya.art", full: "Priya Sharma", pic: "https://picsum.photos/150/150?random=52", link: "profile.html" },
            { id: "cristiano", name: "cristiano", full: "Cristiano Ronaldo", pic: "https://picsum.photos/150/150?random=53", link: "profile.html" }
        ];

        function doSearch() {
            let input = document.getElementById('mainSearch').value.toLowerCase();
            let grid = document.getElementById('explore-grid');
            let resultsDiv = document.getElementById('search-results');

            if (input.length > 0) {
                grid.style.display = 'none';
                resultsDiv.style.display = 'block';
                resultsDiv.innerHTML = ""; 

                let filtered = allUsers.filter(u => u.name.toLowerCase().includes(input) || u.full.toLowerCase().includes(input));

                filtered.forEach(user => {
                    resultsDiv.innerHTML += `
                        <div class="user-row" onclick="location.href='${user.link}'">
                            <img src="${user.pic}" class="user-pic">
                            <div class="user-info">
                                <span class="user-name">${user.name}</span>
                                <span class="user-full-name">${user.full}</span>
                            </div>
                        </div>
                    `;
                });
            } else {
                grid.style.display = 'grid';
                resultsDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
