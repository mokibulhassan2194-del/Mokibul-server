<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Search</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        .search-box { padding: 15px; position: sticky; top: 0; background: #000; }
        .search-input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #262626; color: #fff; outline: none; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: #fff; text-decoration: none; text-align: center; font-size: 12px; }
    </style>
</head>
<body>
    <div class="search-box"><input type="text" class="search-input" placeholder="🔍 Search..."></div>
    <div class="grid">
        <div class="grid-item">🎬</div><div class="grid-item">📸</div><div class="grid-item">🔥</div>
        <div class="grid-item">🌟</div><div class="grid-item">🎵</div><div class="grid-item">⚽</div>
    </div>
    <div class="bottom-nav">
        <a href="home.html" class="nav-item">🏠<br>Home</a>
        <a href="search.html" class="nav-item">🔍<br>Search</a>
        <a href="#" style="font-size: 25px; color: #FFD700;">+</a>
        <a href="reels.html" class="nav-item">🎬<br>Reels</a>
        <a href="profile.html" class="nav-item">👤<br>Profile</a>
    </div>
</body>
</html>
