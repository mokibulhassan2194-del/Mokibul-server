<style>
    /* पूरे पेज को हिलने से रोकने के लिए */
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000;
        color: #fff;
        font-family: sans-serif;
        position: fixed; /* सबसे जरूरी: ताकि पेज ऊपर न भागे */
        width: 100%;
    }

    /* हेडर हमेशा टॉप पर रहेगा */
    .header {
        position: absolute; 
        top: 0;
        width: 100%;
        height: 60px;
        background: #000;
        z-index: 1000;
        display: flex;
        align-items: center;
        padding: 0 15px;
        border-bottom: 1px solid #222;
        box-sizing: border-box;
    }

    /* चैट कंटेनर: यह हेडर और इनपुट के बीच में रहेगा */
    .chat-container {
        position: absolute;
        top: 60px; /* हेडर की हाइट */
        bottom: 70px; /* इनपुट बार की हाइट */
        width: 100%;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        box-sizing: border-box;
        -webkit-overflow-scrolling: touch; /* स्मूथ स्क्रॉल के लिए */
    }

    /* इनपुट बार हमेशा बॉटम पर रहेगा */
    .chat-input-area {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 70px;
        background: #000;
        padding: 10px;
        display: flex;
        align-items: center;
        border-top: 1px solid #222;
        box-sizing: border-box;
        z-index: 1000;
    }

    .message-input {
        background: #262626;
        border: none;
        border-radius: 25px;
        color: #fff;
        padding: 12px 18px;
        flex: 1;
        outline: none;
        font-size: 16px;
    }

    .send-btn {
        color: #FFD700;
        font-weight: bold;
        margin-left: 12px;
        background: none;
        border: none;
        font-size: 16px;
    }

    /* चैट बबल्स */
    .bubble { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; }
    .received { background: #262626; align-self: flex-start; }
    .sent { background: #FFC107; color: #000; align-self: flex-end; font-weight: 500; }
</style>
