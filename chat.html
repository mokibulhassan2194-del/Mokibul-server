<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful | Chat</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        
        /* ऊपर का हेडर */
        .header { 
            display: flex; align-items: center; padding: 10px 15px; 
            border-bottom: 1px solid #222; position: sticky; top: 0; 
            background: #000; z-index: 100;
        }
        .back-btn { text-decoration: none; color: #fff; font-size: 24px; margin-right: 15px; }
        .user-pic { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid #FFD700; margin-right: 10px; }
        .user-name { font-weight: bold; font-size: 16px; }

        /* चैट एरिया */
        .chat-container {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 80px; /* नीचे इनपुट के लिए जगह */
        }

        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .received { background: #262626; align-self: flex-start; color: #fff; }
        .sent { background: #FFD700; align-self: flex-end; color: #000; font-weight: 500; }

        /* नीचे वाला इनपुट बार */
        .chat-input-area {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            padding: 10px;
            display: flex;
            align-items: center;
            border-top: 1px solid #222;
            box-sizing: border-box;
        }

        .message-input {
            background: #262626;
            border: none;
            border-radius: 20px;
            color: #fff;
            padding: 10px 15px;
            flex: 1;
            outline: none;
            font-size: 16px; /* 16px से ब्राउजर ज़ूम नहीं करता */
        }

        .send-btn {
            color: #FFD700;
            font-weight: bold;
            margin-left: 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="messages.html" class="back-btn">←</a>
        <img src="https://picsum.photos/id/91/100/100" class="user-pic">
        <span class="user-name">Sahil Khan</span>
    </div>

    <div class="chat-container" id="chatBox">
        <div class="bubble received">Oye Makibul! App to ekdam Instagram jaisi lag rahi hai bhai! 🔥</div>
        <div class="bubble sent">Haan bhai, mehnat rang la rahi hai. Abhi chat system bhi chalu kar diya! 😎</div>
    </div>

    <div class="chat-input-area">
        <input type="text" class="message-input" placeholder="Message..." id="msgInput">
        <button class="send-btn">Send</button>
    </div>

    <script>
        // पेज लोड होते ही इनपुट पर फोकस ताकि कीबोर्ड खुल सके
        window.onload = function() {
            const input = document.getElementById('msgInput');
            input.focus();
            
            // मोबाइल पर कभी-कभी तुरंत फोकस नहीं होता, इसलिए थोड़ा डिले
            setTimeout(() => {
                input.click();
            }, 300);
        };
    </script>

</body>
</html>
