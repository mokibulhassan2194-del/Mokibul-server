<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Max Ful | Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; }
        
        /* हेडर स्टाइल */
        .header { height: 60px; background: #000; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #222; flex-shrink: 0; justify-content: space-between; }
        .header-left { display: flex; align-items: center; }
        .back-btn { text-decoration: none; color: #fff; font-size: 24px; margin-right: 15px; }
        .user-pic { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid #FFC107; margin-right: 10px; }
        .user-name { font-weight: bold; font-size: 16px; }
        
        /* डिलीट आइकन - शुरू में छुपा रहेगा */
        #deleteHeaderIcon { display: none; color: #ff4444; font-size: 20px; cursor: pointer; padding: 10px; }

        .chat-container { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #000; }
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; word-wrap: break-word; position: relative; display: flex; flex-direction: column; transition: 0.2s; cursor: pointer; border: 2px solid transparent; }
        .received { background: #262626; align-self: flex-start; }
        .sent { background: #FFC107; color: #000; align-self: flex-end; font-weight: 500; }
        
        /* सेलेक्ट होने पर हल्का सा बॉर्डर */
        .selected { border: 2px solid #fff; opacity: 0.8; }

        .msg-info { font-size: 10px; margin-top: 5px; display: flex; justify-content: flex-end; opacity: 0.7; }

        .chat-input-area { min-height: 60px; background: #000; display: flex; align-items: center; padding: 10px; border-top: 1px solid #222; flex-shrink: 0; }
        .message-input { background: #262626; border: none; border-radius: 25px; color: #fff; padding: 10px 15px; flex: 1; outline: none; font-size: 16px; }
        .send-btn { color: #FFC107; font-weight: bold; margin-left: 10px; background: none; border: none; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left" id="userInfo">
            <a href="messages.html" class="back-btn">←</a>
            <img src="https://picsum.photos/id/91/100/100" class="user-pic">
            <span class="user-name">Sahil Khan</span>
        </div>
        <i class="fa-solid fa-trash-can" id="deleteHeaderIcon"></i>
    </div>

    <div class="chat-container" id="chatBox"></div>

    <div class="chat-input-area">
        <input type="text" class="message-input" placeholder="Message..." id="msgInput">
        <button class="send-btn" id="sendBtn">Send</button>
    </div>

    <script>
        const sendBtn = document.getElementById('sendBtn');
        const msgInput = document.getElementById('msgInput');
        const chatBox = document.getElementById('chatBox');
        const deleteIcon = document.getElementById('deleteHeaderIcon');
        const userInfo = document.getElementById('userInfo');

        let selectedMsgId = null;
        let selectedElement = null;

        window.onload = loadMessages;

        function sendMessage() {
            const text = msgInput.value.trim();
            if (text === "") return;

            const now = new Date();
            const timeStr = now.toLocaleString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true });
            
            const msgData = { text, time: timeStr, id: Date.now() };
            displayMessage(msgData);
            saveMessage(msgData);
            
            msgInput.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function displayMessage(data) {
            const div = document.createElement('div');
            div.classList.add('bubble', 'sent');
            div.setAttribute('data-id', data.id);
            div.innerHTML = `${data.text}<div class="msg-info"><span>${data.time}</span></div>`;
            
            div.onclick = () => {
                if (selectedElement === div) {
                    deselect();
                } else {
                    if (selectedElement) deselect();
                    selectMessage(data.id, div);
                }
            };

            chatBox.appendChild(div);
        }

        function selectMessage(id, element) {
            selectedMsgId = id;
            selectedElement = element;
            element.classList.add('selected');
            userInfo.style.visibility = 'hidden'; // नाम छुपाओ
            deleteIcon.style.display = 'block'; // डस्टबिन दिखाओ
        }

        function deselect() {
            if (selectedElement) selectedElement.classList.remove('selected');
            selectedMsgId = null;
            selectedElement = null;
            userInfo.style.visibility = 'visible';
            deleteIcon.style.display = 'none';
        }

        deleteIcon.onclick = () => {
            if (selectedMsgId) {
                let messages = JSON.parse(localStorage.getItem('chat_sahil') || '[]');
                messages = messages.filter(m => m.id !== selectedMsgId);
                localStorage.setItem('chat_sahil', JSON.stringify(messages));
                selectedElement.remove();
                deselect();
            }
        };

        function saveMessage(data) {
            let messages = JSON.parse(localStorage.getItem('chat_sahil') || '[]');
            messages.push(data);
            localStorage.setItem('chat_sahil', JSON.stringify(messages));
        }

        function loadMessages() {
            let messages = JSON.parse(localStorage.getItem('chat_sahil') || '[]');
            messages.forEach(displayMessage);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        sendBtn.onclick = sendMessage;
        msgInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
