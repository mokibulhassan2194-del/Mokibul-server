<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Max Ful | Chat</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #fff; font-family: sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* हेडर अपनी जगह फिक्स रहेगा */
        .header {
            height: 60px;
            background: #000;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #222;
            flex-shrink: 0; /* इसे दबने नहीं देगा */
        }
        .back-btn { text-decoration: none; color: #fff; font-size: 24px; margin-right: 15px; }
        .user-pic { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid #FFC107; margin-right: 10px; }
        .user-name { font-weight: bold; font-size: 16px; }

        /* चैट एरिया: यह कीबोर्ड आने पर अपने आप छोटा हो जाएगा */
        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #000;
        }

        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; }
        .received { background: #262626; align-self: flex-start; }
        .sent { background: #FFC107; color: #000; align-self: flex-end; font-weight: 500; }

        /* इनपुट एरिया: यह हमेशा कीबोर्ड के ठीक ऊपर रहेगा */
        .chat-input-area {
            min-height: 60px;
            background: #000;
            display: flex;
            align-items: center;
            padding: 10px;
            border-top: 1px solid #222;
            flex-shrink: 0;
        }

        .message-input {
            background: #262626;
            border: none;
            border-radius: 25px;
            color: #fff;
            padding: 10px 15px;
            flex: 1;
            outline: none;
            font-size: 16px;
        }

        .send-btn {
            color: #FFC107;
            font-weight: bold;
            margin-left: 10px;
            background: none;
            border: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="messages.html" class="back-btn">←</a>
        <img src="https://picsum.photos/id/91/100/100" class="user-pic">
        <span class="user-name">Sahil Khan</span>
    </div>

    <div class="chat-container" id="chatBox">
        <div class="bubble received">Oye Makibul! App to ekdam Instagram jaisi lag rahi hai bhai! 🔥</div>
        <div class="bubble sent">Haan bhai, mehnat rang la rahi hai. Abhi chat system bhi chalu kar diya! 😎</div>
    </div>

    <div class="chat-input-area">
        <input type="text" class="message-input" placeholder="Message..." id="msgInput">
        <button class="send-btn">Send</button>
    </div>

    <script>
        // कीबोर्ड खुलने पर स्क्रीन को एडजस्ट करने का जुगाड़
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
                window.scrollTo(0, 0);
                const chatBox = document.getElementById('chatBox');
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }
    </script>

</body>
</html>
