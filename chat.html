<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Sahil Khan</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Chat Header */
        .chat-header { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid #222; background: #000; }
        .back-btn { text-decoration: none; color: #fff; font-size: 24px; margin-right: 15px; }
        .user-pic { width: 35px; height: 35px; border-radius: 50%; background: #333; margin-right: 10px; border: 1px solid #FFD700; }
        .user-name { font-weight: bold; font-size: 16px; flex: 1; }

        /* Messages Area */
        .chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .received { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }
        .sent { background: #FFD700; color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }

        /* Bottom Input */
        .chat-input-area { padding: 10px; border-top: 1px solid #222; display: flex; align-items: center; gap: 10px; background: #000; }
        .input-box { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 10px 15px; border-radius: 25px; color: #fff; outline: none; }
        .send-btn { color: #FFD700; font-weight: bold; cursor: pointer; text-decoration: none; padding: 5px 10px; }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="messages.html" class="back-btn">←</a>
        <div class="user-pic"></div>
        <div class="user-name">Sahil Khan</div>
    </div>

    <div class="chat-container">
        <div class="msg received">Oye Makibul! App to ekdam Instagram jaisi lag rahi hai bhai! 🔥</div>
        <div class="msg sent">Haan bhai, mehnat rang la rahi hai. Abhi chat system bhi chalu kar diya! 😎</div>
        <div class="msg received">Sahi hai! Bas ab photo upload wala bhi daal de maza aa jayega.</div>
    </div>

    <div class="chat-input-area">
        <input type="text" class="input-box" placeholder="Message...">
        <div class="send-btn">Send</div>
    </div>

</body>
</html>
