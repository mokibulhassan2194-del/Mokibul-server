<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful | Chat</title>
    <style>
        /* नया फिक्स कोड यहाँ शुरू होता है */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* सफेद हिस्सा रोकने के लिए */
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
        }

        .header {
            position: fixed; /* अब यह अपनी जगह से नहीं हिलेगा */
            top: 0;
            width: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid #222;
            box-sizing: border-box;
        }

        .back-btn { text-decoration: none; color: #fff; font-size: 24px; margin-right: 15px; }
        .user-pic { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid #FFD700; margin-right: 10px; }
        .user-name { font-weight: bold; font-size: 16px; }

        .chat-container {
            /* कीबोर्ड के लिए जगह छोड़ते हुए हाइट सेट की है */
            height: calc(100vh - 130px); 
            overflow-y: auto;
            margin-top: 60px; /* हेडर के नीचे से शुरू होगा */
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
        }

        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .received { background: #262626; align-self: flex-start; color: #fff; }
        .sent { background: #FFD700; align-self: flex-end; color: #000; font-weight: 500; }

        .chat-input-area {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            padding: 10px;
            display: flex;
            align-items: center;
            border-top: 1px solid #222;
            box-sizing: border-box;
            z-index: 1000;
        }

        .message-input {
            background: #262626;
            border: none;
            border-radius: 20px;
            color: #fff;
            padding: 10px 15px;
            flex: 1;
            outline: none;
            font-size: 16px; /* ज़ूम रोकने के लिए */
        }

        .send-btn {
            color: #FFD700;
            font-weight: bold;
            margin-left: 15px;
            background: none;
            border: none;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="messages.html" class="back-btn">←</a>
        <img src="https://picsum.photos/id/91/100/100" class="user-pic">
        <span class="user-name">Sahil Khan</span>
    </div>

    <div class="chat-container" id="chatBox">
        <div class="bubble received">Oye Makibul! App तो एकदम Instagram जैसी लग रही है भाई! 🔥</div>
        <div class="bubble sent">Haan bhai, मेहनत रंग ला रही है। Abhi chat system भी चालू कर दिया! 😎</div>
        </div>

    <div class="chat-input-area">
        <input type="text" class="message-input" placeholder="Message..." id="msgInput">
        <button class="send-btn">Send</button>
    </div>

    <script>
        window.onload = function() {
            const input = document.getElementById('msgInput');
            input.focus();
            
            // चैट को हमेशा नीचे (Latest Message पर) रखने के लिए
            const chatBox = document.getElementById('chatBox');
            chatBox.scrollTop = chatBox.scrollHeight;
        };
    </script>

</body>
</html>
