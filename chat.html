<style>
    /* चैट एरिया को थोड़ा ऊपर रखें ताकि नीचे इनपुट बॉक्स की जगह बने */
    .chat-container {
        padding-bottom: 70px; 
    }

    /* नीचे वाला इनपुट बार */
    .chat-input-area {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: #000;
        padding: 10px;
        display: flex;
        align-items: center;
        border-top: 1px solid #222;
        box-sizing: border-box;
    }

    .message-input {
        background: #262626;
        border: none;
        border-radius: 20px;
        color: #fff;
        padding: 10px 15px;
        flex: 1;
        outline: none;
        font-size: 15px;
    }

    .send-btn {
        color: #FFD700;
        font-weight: bold;
        margin-left: 15px;
        text-decoration: none;
        font-size: 15px;
        background: none;
        border: none;
        cursor: pointer;
    }
</style>

<div class="chat-container">
    </div>

<div class="chat-input-area">
    <input type="text" class="message-input" placeholder="Message..." id="msgInput">
    <button class="send-btn">Send</button>
</div>

<script>
    // जैसे ही पेज खुलेगा, इनपुट पर फोकस होगा और कीबोर्ड आ सकता है
    window.onload = function() {
        document.getElementById('msgInput').focus();
    };
</script>
