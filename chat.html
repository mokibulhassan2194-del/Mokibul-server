<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful | Chat</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #fff; font-family: sans-serif;
            overflow: hidden; /* ताकि पेज फालतू न हिले */
        }

        /* मुख्य ढांचा */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* हेडर: ऊपर चिपका रहेगा */
        .header {
            height: 60px;
            background: #000;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }
        .back-btn { text-decoration: none; color: #fff; font-size: 24px; margin-right: 15px; }
        .user-pic { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid #FFC107; margin-right: 10px; }
        .user-name { font-weight: bold; font-size: 16px; }

        /* चैट एरिया: यह बीच में स्क्रॉल होगा */
        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            -webkit-overflow-scrolling: touch;
        }

        /* मैसेज बबल्स */
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .received { background: #262626; align-self: flex-start; }
        .sent { background: #FFC107; color: #000; align-self: flex-end; font-weight: 500; }

        /* इनपुट बार: हमेशा कीबोर्ड के ऊपर रहेगा */
        .chat-input-area {
            height: 70px;
            background: #000;
            display: flex;
            align-items: center;
            padding: 10px;
            border-top: 1px solid #222;
            flex-shrink: 0;
        }

        .message-input {
            background: #262626;
            border: none;
            border-radius: 25px;
            color: #fff;
            padding: 12px 18px;
            flex: 1;
            outline: none;
            font-size: 16px;
        }

        .send-btn {
            color: #FFC107;
            font-weight: bold;
            margin-left: 12px;
            background: none;
            border: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="header">
            <a href="messages.html" class="back-btn">←</a>
            <img src="https://picsum.photos/id/91/100/100" class="user-pic">
            <span class="user-name">Sahil Khan</span>
        </div>

        <div class="chat-container" id="chatBox">
            <div class="bubble received">Oye Makibul! App to ekdam Instagram jaisi lag rahi hai bhai! 🔥</div>
            <div class="bubble sent">Haan bhai, mehnat rang la rahi hai. Abhi chat system bhi chalu kar diya! 😎</div>
        </div>

        <div class="chat-input-area">
            <input type="text" class="message-input" placeholder="Message..." id="msgInput">
            <button class="send-btn">Send</button>
        </div>
    </div>

    <script>
        // चैट को नीचे रखने के लिए
        const chatBox = document.getElementById('chatBox');
        chatBox.scrollTop = chatBox.scrollHeight;

        // कीबोर्ड आने पर व्यू पोर्ट एडजस्ट करना
        window.visualViewport.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>

</body>
</html>
