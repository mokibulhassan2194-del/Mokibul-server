<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat | Sahil Khan</title>
    <style>
        body { 
            background-color: #000; color: #fff; font-family: sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; 
            overflow: hidden; 
            touch-action: manipulation;
        }
        
        /* Chat Header */
        .chat-header { 
            display: flex; align-items: center; padding: 10px 15px; 
            border-bottom: 1px solid #222; background: #000; position: sticky; top: 0; z-index: 100;
        }
        /* BACK BUTTON FIX: Ismein link sahi kar diya gaya hai */
        .back-btn { text-decoration: none; color: #fff; font-size: 24px; margin-right: 15px; cursor: pointer; }
        
        .user-pic-wrapper { width: 35px; height: 35px; border-radius: 50%; margin-right: 10px; border: 1.5px solid #FFD700; padding: 1px; }
        .user-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .user-name { font-weight: bold; font-size: 16px; flex: 1; }

        /* Messages Area */
        .chat-container { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 12px;
            background: #000;
            scroll-behavior: smooth;
        }
        
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .received { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }
        .sent { background: #FFD700; color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }

        /* Bottom Input Area */
        .chat-input-area { 
            padding: 10px 15px; border-top: 1px solid #222; 
            display: flex; align-items: center; gap: 10px; background: #000;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        
        .input-box { 
            flex: 1; background: #1a1a1a; border: 1px solid #333; 
            padding: 12px 18px; border-radius: 25px; color: #fff; 
            outline: none; font-size: 16px; 
        }
        
        .send-btn { color: #FFD700; font-weight: bold; cursor: pointer; text-decoration: none; padding: 5px 10px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="../messages.html" class="back-btn">←</a>
        <div class="user-pic-wrapper">
            <img src="https://picsum.photos/id/91/100/100" class="user-pic" alt="Sahil">
        </div>
        <div class="user-name">Sahil Khan</div>
        <div style="font-size: 20px; gap: 20px; display: flex; color: #FFD700;">
            <span>📞</span>
            <span>📹</span>
        </div>
    </div>

    <div class="chat-container" id="chatBox">
        <div class="msg received">Oye Makibul! App to ekdam Instagram jaisi lag rahi hai bhai! 🔥</div>
        <div class="msg sent">Haan bhai, mehnat rang la rahi hai. Abhi chat system bhi chalu kar diya! 😎</div>
        <div class="msg received">Sahi hai! Bas ab photo upload wala bhi daal de maza aa jayega.</div>
        <div class="msg sent">Bilkul bhai, dheere dheere sab features add kar raha hoon! 🚀</div>
    </div>

    <div class="chat-input-area">
        <input type="text" class="input-box" id="userInput" placeholder="Message..." autocomplete="off">
        <div class="send-btn" onclick="sendMessage()">Send</div>
    </div>

    <script>
        // Automatic Scroll to Bottom
        const chatBox = document.getElementById('chatBox');
        chatBox.scrollTop = chatBox.scrollHeight;

        function sendMessage() {
            const input = document.getElementById('userInput');
            if (input.value.trim() !== "") {
                const newMsg = document.createElement('div');
                newMsg.className = 'msg sent';
                newMsg.innerText = input.value;
                chatBox.appendChild(newMsg);
                input.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // Enter key support
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { sendMessage(); }
        });
    </script>
</body>
</html>
