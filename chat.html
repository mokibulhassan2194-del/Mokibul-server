<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Max Ful | Chat</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; }

        .header { height: 60px; background: #000; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #222; flex-shrink: 0; }
        .back-btn { text-decoration: none; color: #fff; font-size: 24px; margin-right: 15px; }
        .user-pic { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid #FFC107; margin-right: 10px; }
        .user-name { font-weight: bold; font-size: 16px; }

        .chat-container { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #000; }

        /* मैसेज बबल */
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; word-wrap: break-word; position: relative; display: flex; flex-direction: column; transition: 0.2s; cursor: pointer; }
        .received { background: #262626; align-self: flex-start; }
        .sent { background: #FFC107; color: #000; align-self: flex-end; font-weight: 500; }

        .msg-info { font-size: 10px; margin-top: 5px; display: flex; justify-content: flex-end; opacity: 0.7; }

        /* Unsend/Delete का जादुई मेनू */
        .delete-menu { 
            display: none; position: absolute; top: -35px; right: 10px; 
            background: #333; color: white; padding: 5px 12px; 
            border-radius: 8px; font-size: 12px; font-weight: bold; z-index: 10;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.5);
        }

        .chat-input-area { min-height: 60px; background: #000; display: flex; align-items: center; padding: 10px; border-top: 1px solid #222; flex-shrink: 0; }
        .message-input { background: #262626; border: none; border-radius: 25px; color: #fff; padding: 10px 15px; flex: 1; outline: none; font-size: 16px; }
        .send-btn { color: #FFC107; font-weight: bold; margin-left: 10px; background: none; border: none; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <a href="messages.html" class="back-btn">←</a>
        <img src="https://picsum.photos/id/91/100/100" class="user-pic">
        <span class="user-name">Sahil Khan</span>
    </div>

    <div class="chat-container" id="chatBox">
        <div class="bubble received">
            Oye Makibul! App to ekdam Instagram jaisi lag rahi hai bhai! 🔥
            <div class="msg-info"><span>4:46 PM</span></div>
        </div>
    </div>

    <div class="chat-input-area">
        <input type="text" class="message-input" placeholder="Message..." id="msgInput">
        <button class="send-btn" id="sendBtn">Send</button>
    </div>

    <script>
        const sendBtn = document.getElementById('sendBtn');
        const msgInput = document.getElementById('msgInput');
        const chatBox = document.getElementById('chatBox');

        function sendMessage() {
            const messageText = msgInput.value.trim();
            
            if (messageText !== "") {
                // 12-घंटे वाला टाइम (AM/PM)
                const now = new Date();
                let hours = now.getHours();
                const minutes = (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                const timeStr = hours + ":" + minutes + " " + ampm;

                const newBubble = document.createElement('div');
                newBubble.classList.add('bubble', 'sent');
                
                newBubble.innerHTML = `
                    ${messageText}
                    <div class="msg-info"><span>${timeStr}</span></div>
                    <div class="delete-menu">Unsend</div>
                `;

                // क्लिक करने पर 'Unsend' बटन दिखाना
                newBubble.onclick = function(e) {
                    const menu = this.querySelector('.delete-menu');
                    // अगर मेनू दिख रहा है तो हटा दो, नहीं तो दिखाओ
                    menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
                };

                // Unsend बटन पर क्लिक करने पर मैसेज डिलीट करना
                const unsendBtn = newBubble.querySelector('.delete-menu');
                unsendBtn.onclick = function(e) {
                    e.stopPropagation(); // बबल के क्लिक को रोकना
                    newBubble.style.transform = "scale(0)";
                    setTimeout(() => newBubble.remove(), 200);
                };

                chatBox.appendChild(newBubble);
                msgInput.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
                window.scrollTo(0, 0);
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }
    </script>
</body>
</html>
