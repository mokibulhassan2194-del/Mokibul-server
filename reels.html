<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Reels</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        .reels-wrapper {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-wrapper::-webkit-scrollbar { display: none; }

        .reel-video {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Double Tap Heart Animation */
        .big-heart {
            position: absolute;
            font-size: 100px;
            color: rgba(255, 48, 64, 0.9);
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
            z-index: 10;
        }
        .animate-heart { animation: heartPop 0.8s ease-out; }
        @keyframes heartPop {
            0% { transform: scale(0); opacity: 0; }
            30% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* Right Side Actions */
        .side-actions {
            position: absolute; right: 15px; bottom: 120px;
            display: flex; flex-direction: column; gap: 20px; align-items: center;
            z-index: 20;
        }
        .action-btn { text-align: center; color: white; cursor: pointer; }
        
        /* Bada Like Button */
        .heart-icon { 
            font-size: 35px; /* Size bada kiya */
            transition: 0.2s; 
            display: block;
        }
        .liked .heart-icon { color: #ff3040; transform: scale(1.2); }
        .action-btn span { display: block; font-size: 12px; margin-top: 4px; color: #eee; }

        .music-disk {
            width: 35px; height: 35px; border-radius: 50%;
            background: radial-gradient(circle, #333 20%, #222 100%);
            border: 2px solid #fff;
            animation: rotate 3s linear infinite;
            display: flex; align-items: center; justify-content: center;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Bottom Details */
        .reel-details {
            position: absolute; left: 15px; bottom: 80px; color: white; z-index: 20;
        }
        .reel-details b { font-size: 16px; display: block; margin-bottom: 5px; }

        /* Comment Panel (Slide Up) */
        .comment-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%;
            background: #1a1a1a; border-top-left-radius: 20px; border-top-right-radius: 20px;
            transition: 0.3s ease-in-out; z-index: 200; color: white; padding: 20px; box-sizing: border-box;
        }
        .comment-panel.active { bottom: 0; }
        .comment-header { text-align: center; font-weight: bold; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .close-btn { float: right; font-size: 24px; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { color: #fff; text-decoration: none; font-size: 22px; }
    </style>
</head>
<body>

    <div class="reels-wrapper">
        <div class="reel-video" ondblclick="handleDoubleTap(this)">
            <video src="3021.mp4" loop muted playsinline onclick="togglePlay(this)"></video>
            <span class="big-heart">❤️</span>
            
            <div class="side-actions">
                <div class="action-btn" onclick="toggleLike(this)">
                    <span class="heart-icon">🤍</span>
                    <span class="like-count">1.5k</span>
                </div>
                <div class="action-btn" onclick="openComments()">💬<span>450</span></div>
                <div class="action-btn">✈️<span>Share</span></div>
                <div class="music-disk">🎵</div>
            </div>

            <div class="reel-details">
                <b>@makibul_vlogs</b>
                <p>Max Ful app testing... 🔥</p>
            </div>
        </div>
    </div>

    <div id="commentBox" class="comment-panel">
        <span class="close-btn" onclick="closeComments()">×</span>
        <div class="comment-header">Comments</div>
        <div style="margin-top: 50px; text-align: center; opacity: 0.5;">No comments yet.</div>
        <input type="text" placeholder="Add a comment..." style="position: absolute; bottom: 20px; width: 85%; padding: 12px; border-radius: 25px; border: none; background: #333; color: white;">
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item">🏠</a>
        <a href="search.html" class="nav-item">🔍</a>
        <a href="#" style="font-size: 35px; color: #FFD700;">+</a>
        <a href="reels.html" class="nav-item">🎬</a>
        <a href="profile.html" class="nav-item">👤</a>
    </div>

    <script>
        function handleDoubleTap(element) {
            const heart = element.querySelector('.big-heart');
            const actionBtn = element.querySelector('.action-btn');
            heart.classList.add('animate-heart');
            setTimeout(() => heart.classList.remove('animate-heart'), 800);
            if (!actionBtn.classList.contains('liked')) toggleLike(actionBtn);
        }

        function toggleLike(btn) {
            const heartIcon = btn.querySelector('.heart-icon');
            btn.classList.toggle('liked');
            heartIcon.innerHTML = btn.classList.contains('liked') ? '❤️' : '🤍';
        }

        function togglePlay(video) {
            video.paused ? video.play() : video.pause();
        }

        function openComments() { document.getElementById('commentBox').classList.add('active'); }
        function closeComments() { document.getElementById('commentBox').classList.remove('active'); }
    </script>
</body>
</html>
