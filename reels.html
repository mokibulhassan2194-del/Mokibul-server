<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Reels</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        .reels-wrapper {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Hide scrollbar */
        }
        .reels-wrapper::-webkit-scrollbar { display: none; }

        .reel-video {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Double Tap Heart Animation */
        .big-heart {
            position: absolute;
            font-size: 80px;
            color: rgba(255, 255, 255, 0.9);
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .animate-heart { animation: heartPop 0.8s ease-out; }
        @keyframes heartPop {
            0% { transform: scale(0); opacity: 0; }
            40% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* Right Side Buttons */
        .side-actions {
            position: absolute; right: 15px; bottom: 120px;
            display: flex; flex-direction: column; gap: 20px; align-items: center;
            z-index: 20;
        }
        .action-btn { text-align: center; color: white; font-size: 28px; cursor: pointer; transition: 0.2s; }
        .action-btn span { display: block; font-size: 12px; margin-top: 4px; }
        .liked { color: #ff3040 !important; }

        .music-disk {
            width: 35px; height: 35px; border-radius: 50%;
            background: radial-gradient(circle, #333 20%, #222 100%);
            border: 2px solid #fff;
            animation: rotate 3s linear infinite;
            display: flex; align-items: center; justify-content: center;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Bottom Details */
        .reel-details {
            position: absolute; left: 15px; bottom: 80px; color: white; z-index: 20;
            max-width: 70%;
        }
        .reel-details b { font-size: 16px; display: block; margin-bottom: 5px; }
        .reel-details p { font-size: 14px; margin: 0; opacity: 0.9; line-height: 1.4; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { color: #fff; text-decoration: none; text-align: center; font-size: 20px; }
    </style>
</head>
<body>

    <div class="reels-wrapper">
        <div class="reel-video" ondblclick="handleDoubleTap(this)">
            <video src="3021.mp4" loop muted playsinline onclick="togglePlay(this)"></video>
            <span class="big-heart">❤️</span>
            
            <div class="side-actions">
                <div class="action-btn" onclick="toggleLike(this)">❤️<span>1.5k</span></div>
                <div class="action-btn">💬<span>450</span></div>
                <div class="action-btn">✈️<span>Share</span></div>
                <div class="music-disk">🎵</div>
            </div>

            <div class="reel-details">
                <b>@makibul_vlogs</b>
                <p>Max Ful app testing... 🔥 #4K #Reels</p>
            </div>
        </div>

        <div class="reel-video" ondblclick="handleDoubleTap(this)">
            <video src="3021.mp4" loop muted playsinline onclick="togglePlay(this)"></video>
            <span class="big-heart">❤️</span>
            
            <div class="side-actions">
                <div class="action-btn" onclick="toggleLike(this)">❤️<span>800</span></div>
                <div class="action-btn">💬<span>120</span></div>
                <div class="action-btn">✈️<span>Share</span></div>
                <div class="music-disk">🎵</div>
            </div>
            <div class="reel-details">
                <b>@makibul_vlogs</b>
                <p>Working on the swipe feature! 🚀 #Coding</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item">🏠</a>
        <a href="search.html" class="nav-item">🔍</a>
        <a href="#" style="font-size: 35px; color: #FFD700;">+</a>
        <a href="reels.html" class="nav-item">🎬</a>
        <a href="profile.html" class="nav-item">👤</a>
    </div>

    <script>
        // 1. Double Tap Like Function
        function handleDoubleTap(element) {
            const heart = element.querySelector('.big-heart');
            const likeBtn = element.querySelector('.side-actions .action-btn:first-child');
            
            // Show big heart animation
            heart.classList.add('animate-heart');
            setTimeout(() => heart.classList.remove('animate-heart'), 800);
            
            // Update like button color
            likeBtn.classList.add('liked');
        }

        // 2. Click Like Button Toggle
        function toggleLike(btn) {
            btn.classList.toggle('liked');
        }

        // 3. Play/Pause on click
        function togglePlay(video) {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        }

        // 4. Auto Play on Swipe (Simple version)
        const wrapper = document.querySelector('.reels-wrapper');
        wrapper.addEventListener('scroll', () => {
            const videos = document.querySelectorAll('video');
            videos.forEach(v => {
                const rect = v.getBoundingClientRect();
                if (rect.top >= 0 && rect.bottom <= window.innerHeight) {
                    v.play();
                } else {
                    v.pause();
                }
            });
        });
    </script>
</body>
</html>
