<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Reels</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        .reels-wrapper {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-wrapper::-webkit-scrollbar { display: none; }

        .reel-video {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center; justify-content: center;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Double Tap Heart */
        .big-heart {
            position: absolute; font-size: 110px; color: #ff3040;
            opacity: 0; transform: scale(0); pointer-events: none; z-index: 10;
        }
        .animate-heart { animation: heartPop 0.8s ease-out; }
        @keyframes heartPop {
            0% { transform: scale(0); opacity: 0; }
            40% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* Right Side Actions - BIGGER */
        .side-actions {
            position: absolute; right: 12px; bottom: 100px;
            display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 20;
        }

        .action-btn { text-align: center; color: white; cursor: pointer; }
        
        /* Icons Styling - SVG is used for exact sizing */
        .icon-svg {
            width: 42px; /* बाहुबली साइज */
            height: 42px;
            fill: white;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.8));
            transition: transform 0.2s, fill 0.2s;
        }

        /* Liked State Styling */
        .liked .icon-svg { fill: #ff3040; transform: scale(1.2); }
        
        .action-btn span { display: block; font-size: 13px; margin-top: 4px; font-weight: bold; text-shadow: 0 1px 3px #000; }

        .music-disk {
            width: 35px; height: 35px; border-radius: 50%;
            border: 2px solid #fff; animation: rotate 3s linear infinite;
            display: flex; align-items: center; justify-content: center; background: #222;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .reel-details {
            position: absolute; left: 15px; bottom: 85px; color: white; z-index: 20;
            max-width: 70%; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }
        .reel-details b { font-size: 17px; display: block; margin-bottom: 5px; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95) 50%);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { color: #fff; text-decoration: none; font-size: 26px; }
    </style>
</head>
<body>

    <div class="reels-wrapper">
        <div class="reel-video" ondblclick="handleDoubleTap(this)">
            <video src="3021.mp4" loop muted playsinline onclick="togglePlay(this)"></video>
            <div class="big-heart">❤️</div>
            
            <div class="side-actions">
                <div class="action-btn" onclick="toggleLike(this)">
                    <svg class="icon-svg heart-path" viewBox="0 0 24 24">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                    <span class="like-count">1.5k</span>
                </div>

                <div class="action-btn">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z"/>
                    </svg>
                    <span>450</span>
                </div>

                <div class="action-btn">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                    <span>Share</span>
                </div>

                <div class="music-disk">🎵</div>
            </div>

            <div class="reel-details">
                <b>@makibul_vlogs</b>
                <p>Ab icon ekdam BIG aur BOLD dikhenge bhai! 🚀</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item">🏠</a>
        <a href="search.html" class="nav-item">🔍</a>
        <a href="#" style="font-size: 38px; color: #FFD700;">+</a>
        <a href="reels.html" class="nav-item">🎬</a>
        <a href="profile.html" class="nav-item">👤</a>
    </div>

    <script>
        function handleDoubleTap(element) {
            const heart = element.querySelector('.big-heart');
            const actionBtn = element.querySelector('.side-actions .action-btn');
            
            heart.classList.add('animate-heart');
            setTimeout(() => heart.classList.remove('animate-heart'), 800);
            
            if (!actionBtn.classList.contains('liked')) {
                actionBtn.classList.add('liked');
            }
        }

        function toggleLike(btn) {
            btn.classList.toggle('liked');
        }

        function togglePlay(video) {
            video.paused ? video.play() : video.pause();
        }

        const wrapper = document.querySelector('.reels-wrapper');
        wrapper.addEventListener('scroll', () => {
            const videos = document.querySelectorAll('video');
            videos.forEach(v => {
                const rect = v.getBoundingClientRect();
                if (rect.top >= -50 && rect.bottom <= window.innerHeight + 50) {
                    v.play();
                } else {
                    v.pause();
                }
            });
        });
    </script>
</body>
</html>
