<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Reels</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        .reels-wrapper {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-wrapper::-webkit-scrollbar { display: none; }

        .reel-video {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Double Tap Big Heart */
        .big-heart {
            position: absolute;
            font-size: 100px;
            color: rgba(255, 48, 64, 0.9);
            opacity: 0;
            transform: scale(0) rotate(-15deg);
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 30px rgba(0,0,0,0.6);
        }
        .animate-heart { animation: heartPop 0.8s ease-out; }
        @keyframes heartPop {
            0% { transform: scale(0) rotate(-15deg); opacity: 0; }
            30% { transform: scale(1.3) rotate(0deg); opacity: 1; }
            45% { transform: scale(1.1) rotate(0deg); opacity: 1; }
            100% { transform: scale(1) rotate(15deg); opacity: 0; }
        }

        /* Right Side Buttons - Bigger as you asked */
        .side-actions {
            position: absolute; right: 15px; bottom: 120px;
            display: flex; flex-direction: column; gap: 25px;
            align-items: center;
            z-index: 20;
        }
        .action-btn { text-align: center; color: white; cursor: pointer; transition: 0.2s; }
        
        /* Icons Size - Big and Bold */
        .heart-icon, .comment-icon, .share-icon { 
            font-size: 38px; 
            display: inline-block;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }
        
        /* Liked State */
        .liked .heart-icon { color: #ff3040 !important; animation: pop 0.3s ease-out; }
        
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .action-btn span { display: block; font-size: 13px; margin-top: 2px; font-weight: bold; }

        .music-disk {
            width: 35px; height: 35px; border-radius: 50%;
            background: radial-gradient(circle, #333 20%, #222 100%);
            border: 2px solid #fff;
            animation: rotate 3s linear infinite;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; margin-top: 10px;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Bottom Details */
        .reel-details {
            position: absolute; left: 15px; bottom: 80px; color: white; z-index: 20;
            max-width: 70%; text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .reel-details b { font-size: 16px; display: block; margin-bottom: 5px; }
        .reel-details p { font-size: 14px; margin: 0; opacity: 0.9; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9) 40%);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { color: #fff; text-decoration: none; font-size: 24px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="reels-wrapper">
        <div class="reel-video" ondblclick="handleDoubleTap(this)">
            <video src="3021.mp4" loop muted playsinline onclick="togglePlay(this)"></video>
            <span class="big-heart">❤️</span>
            
            <div class="side-actions">
                <div class="action-btn" onclick="toggleLike(this)">
                    <span class="heart-icon">🤍</span>
                    <span class="like-count">1.5k</span>
                </div>
                <div class="action-btn">
                    <span class="comment-icon">💬</span>
                    <span>450</span>
                </div>
                <div class="action-btn">
                    <span class="share-icon">✈️</span>
                    <span>Share</span>
                </div>
                <div class="music-disk">🎵</div>
            </div>

            <div class="reel-details">
                <b>@makibul_vlogs</b>
                <p>Max Ful Reels are now BIG and BOLD! 🔥</p>
            </div>
        </div>

        <div class="reel-video" ondblclick="handleDoubleTap(this)">
            <video src="3021.mp4" loop muted playsinline onclick="togglePlay(this)"></video>
            <span class="big-heart">❤️</span>
            
            <div class="side-actions">
                <div class="action-btn" onclick="toggleLike(this)">
                    <span class="heart-icon">🤍</span>
                    <span class="like-count">800</span>
                </div>
                <div class="action-btn">
                    <span class="comment-icon">💬</span>
                    <span>120</span>
                </div>
                <div class="action-btn">
                    <span class="share-icon">✈️</span>
                    <span>Share</span>
                </div>
                <div class="music-disk">🎵</div>
            </div>
            <div class="reel-details">
                <b>@makibul_vlogs</b>
                <p>Full Screen Experience! 🚀</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item">🏠</a>
        <a href="search.html" class="nav-item">🔍</a>
        <a href="#" style="font-size: 35px; color: #FFD700;">+</a>
        <a href="reels.html" class="nav-item">🎬</a>
        <a href="profile.html" class="nav-item">👤</a>
    </div>

    <script>
        function handleDoubleTap(element) {
            const heart = element.querySelector('.big-heart');
            const actionBtn = element.querySelector('.side-actions .action-btn');
            const heartIcon = actionBtn.querySelector('.heart-icon');
            
            heart.classList.add('animate-heart');
            setTimeout(() => heart.classList.remove('animate-heart'), 800);
            
            if (!actionBtn.classList.contains('liked')) {
                actionBtn.classList.add('liked');
                heartIcon.innerHTML = '❤️';
            }
        }

        function toggleLike(btn) {
            const heartIcon = btn.querySelector('.heart-icon');
            if (btn.classList.contains('liked')) {
                btn.classList.remove('liked');
                heartIcon.innerHTML = '🤍';
            } else {
                btn.classList.add('liked');
                heartIcon.innerHTML = '❤️';
            }
        }

        function togglePlay(video) {
            video.paused ? video.play() : video.pause();
        }

        // Auto Play Logic
        const wrapper = document.querySelector('.reels-wrapper');
        wrapper.addEventListener('scroll', () => {
            const videos = document.querySelectorAll('video');
            videos.forEach(v => {
                const rect = v.getBoundingClientRect();
                if (rect.top >= -100 && rect.bottom <= window.innerHeight + 100) {
                    v.play();
                } else {
                    v.pause();
                }
            });
        });
    </script>
</body>
</html>
