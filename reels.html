<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Max Ful Reels</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
overflow:hidden;
color:white;
}

.reels-container{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
scrollbar-width:none;
}

.reels-container::-webkit-scrollbar{
display:none;
}

.reel{
height:100vh;
width:100%;
position:relative;
scroll-snap-align:start;
background:black;
}

video{
width:100%;
height:100%;
object-fit:cover;
background:black;
}

.overlay{
position:absolute;
bottom:90px;
left:15px;
z-index:5;
}

.username{
font-size:17px;
font-weight:bold;
margin-bottom:10px;
}

.caption{
font-size:14px;
opacity:.9;
max-width:80%;
line-height:1.4;
}

.actions{
position:absolute;
right:15px;
bottom:120px;
display:flex;
flex-direction:column;
gap:22px;
z-index:5;
align-items:center;
}

.action{
text-align:center;
font-size:28px;
cursor:pointer;
}

.action span{
display:block;
font-size:12px;
margin-top:5px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:60px;
background:#000;
border-top:1px solid #222;
display:flex;
justify-content:space-around;
align-items:center;
z-index:100;
}

.bottom-nav i{
font-size:24px;
color:white;
}

.like{
color:#ff0050 !important;
}

</style>
</head>

<body>

<div class="reels-container" id="reelsContainer"></div>

<div class="bottom-nav">
<i class="fas fa-house"></i>
<i class="fas fa-search"></i>
<i class="fas fa-plus-square"></i>
<i class="fas fa-clapperboard"></i>
<i class="fas fa-user"></i>
</div>

<script>

const reelsContainer = document.getElementById("reelsContainer");

const videos = [

"https://cdn.coverr.co/videos/coverr-man-riding-a-bike-1560081171596?download=1080p",
"https://cdn.coverr.co/videos/coverr-young-woman-using-smartphone-1573493641087?download=1080p",
"https://cdn.coverr.co/videos/coverr-working-on-laptop-5176?download=1080p",
"https://cdn.coverr.co/videos/coverr-girl-walking-in-city-1566977137798?download=1080p",
"https://cdn.coverr.co/videos/coverr-skateboarding-1566977271361?download=1080p",
"https://cdn.coverr.co/videos/coverr-coding-on-screen-1573493641087?download=1080p"

];

function createReel(videoUrl,index){

const reel = document.createElement("div");
reel.className = "reel";

reel.innerHTML = `

<video
src="${videoUrl}"
loop
playsinline
autoplay
muted
></video>

<div class="overlay">
<div class="username">@max_ful_${index}</div>
<div class="caption">
🔥 Unlimited Reels Mode Active 🚀
</div>
</div>

<div class="actions">

<div class="action like-btn">
<i class="far fa-heart"></i>
<span>${Math.floor(Math.random()*9000)}</span>
</div>

<div class="action">
<i class="far fa-comment"></i>
<span>${Math.floor(Math.random()*1000)}</span>
</div>

<div class="action">
<i class="fas fa-share"></i>
<span>Share</span>
</div>

</div>

`;

reelsContainer.appendChild(reel);

const likeBtn = reel.querySelector(".like-btn");

likeBtn.addEventListener("click",()=>{

const icon = likeBtn.querySelector("i");

icon.classList.toggle("far");
icon.classList.toggle("fas");
icon.classList.toggle("like");

});

}

function loadMoreReels(){

for(let i=0;i<videos.length;i++){

createReel(
videos[Math.floor(Math.random()*videos.length)],
document.querySelectorAll(".reel").length+1
);

}

observeVideos();

}

function observeVideos(){

const allVideos = document.querySelectorAll("video");

const observer = new IntersectionObserver((entries)=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.play();

}else{

entry.target.pause();

}

});

},{threshold:0.7});

allVideos.forEach(video=>observer.observe(video));

}

loadMoreReels();

reelsContainer.addEventListener("scroll",()=>{

const scrollTop = reelsContainer.scrollTop;
const scrollHeight = reelsContainer.scrollHeight;
const clientHeight = reelsContainer.clientHeight;

if(scrollTop + clientHeight >= scrollHeight - 500){

loadMoreReels();

}

});

</script>

</body>
</html>
