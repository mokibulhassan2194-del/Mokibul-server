<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful | Reels</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }

        /* स्क्रॉल कंटेनर - इसी से जादू होगा */
        .reels-wrapper {
            height: 100vh;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE */
        }
        .reels-wrapper::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .reel {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background: #000;
        }

        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* नीचे की काली पट्टी */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: #000; display: flex; justify-content: space-around;
            align-items: center; z-index: 2000; border-top: 1px solid #222;
        }
        .nav-item { color: white; text-decoration: none; font-size: 24px; }

        .details {
            position: absolute; left: 15px; bottom: 80px; color: white;
            z-index: 100; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<div class="reels-wrapper">
    <div class="reel">
        <video src="3021.mp4" loop autoplay muted playsinline></video>
        <div class="details">
            <b>@makibul_vlogs</b>
            <p>Bhai ab scroll karke dekh, pakka chalega! ✅</p>
        </div>
    </div>

    <div class="reel">
        <video src="3021.mp4" loop muted playsinline></video>
        <div class="details">
            <b>@makibul_vlogs</b>
            <p>Second Reel Test - Swipe Up! 🚀</p>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <a href="home.html" class="nav-item">🏠</a>
    <a href="search.html" class="nav-item">🔍</a>
    <a href="#" style="font-size:30px; color:gold;">+</a>
    <a href="reels.html" class="nav-item">🎬</a>
    <a href="profile.html" class="nav-item">👤</a>
</div>

<script>
    // सिंपल ऑटो-प्ले लॉजिक
    const wrapper = document.querySelector('.reels-wrapper');
    wrapper.addEventListener('scroll', () => {
        const vids = document.querySelectorAll('video');
        vids.forEach(v => {
            const rect = v.getBoundingClientRect();
            if (Math.abs(rect.top) < window.innerHeight / 2) {
                v.play().catch(() => {});
            } else {
                v.pause();
            }
        });
    });
</script>

</body>
</html>
