<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful | Reels</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        /* स्क्रॉलिंग के लिए सबसे ज़रूरी सेटिंग */
        .reels-wrapper {
            height: 100vh;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            display: block;
        }
        .reels-wrapper::-webkit-scrollbar { display: none; }

        .reel-video {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* काली पट्टी - एकदम नीचे और सिंपल */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: #000; /* ठोस काला रंग ताकि स्वाइप न फंसे */
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            border-top: 1px solid #222;
        }

        .nav-item { color: #fff; text-decoration: none; font-size: 24px; }

        /* साइड बटन्स */
        .side-actions {
            position: absolute; right: 10px; bottom: 100px;
            display: flex; flex-direction: column; gap: 20px; z-index: 20;
        }
        .icon-svg { width: 32px; height: 32px; fill: white; }

        /* डिटेल्स को थोड़ा और ऊपर किया */
        .reel-details {
            position: absolute; left: 15px; bottom: 85px; color: white; z-index: 10;
            pointer-events: none; /* उंगली इसके आर-पार जा सकेगी */
        }
    </style>
</head>
<body>

    <div class="reels-wrapper" id="reelsContainer">
        <div class="reel-video">
            <video src="3021.mp4" loop muted playsinline onclick="this.paused?this.play():this.pause()"></video>
            <div class="side-actions">
                <div class="action-btn">
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </div>
            </div>
            <div class="reel-details">
                <b>@makibul_vlogs</b>
                <p>Ab pakka scroll hoga bhai! Try kar 🔥</p>
            </div>
        </div>
        </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item">🏠</a>
        <a href="search.html" class="nav-item">🔍</a>
        <a href="#" style="font-size: 30px; color: #FFD700;">+</a>
        <a href="reels.html" class="nav-item">🎬</a>
        <a href="profile.html" class="nav-item">👤</a>
    </div>

    <script>
        const container = document.getElementById('reelsContainer');
        container.addEventListener('scroll', () => {
            const vids = document.querySelectorAll('video');
            vids.forEach(v => {
                const r = v.getBoundingClientRect();
                if (r.top >= -50 && r.bottom <= window.innerHeight + 50) v.play();
                else v.pause();
            });
        });
    </script>
</body>
</html>
