<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ful Reels | GitHub Edition</title>
    <style>
        :root {
            --bg-color: #000;
            --text-white: #fff;
            --accent-red: #ff3040;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-color); overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Full Screen Container */
        .reels-container {
            height: 100vh;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-container::-webkit-scrollbar { display: none; }

        /* Individual Reel Section */
        .reel {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Overlay Styling */
        .video-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 80px 20px 100px 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        .user-info b { font-size: 1.1rem; display: block; margin-bottom: 5px; }
        .user-info p { font-size: 0.9rem; margin: 0; opacity: 0.9; }

        /* Action Buttons (Right Side) */
        .side-bar {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 20;
        }

        .btn {
            background: none; border: none; color: white;
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.9); }
        .btn svg { width: 32px; height: 32px; fill: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .btn span { font-size: 12px; margin-top: 5px; font-weight: bold; }

        /* Double Tap Heart Effect */
        .heart-pop {
            position: absolute;
            color: var(--accent-red);
            font-size: 100px;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
        }

        @keyframes heartAnim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .animate-heart { animation: heartAnim 0.7s ease-out forwards; }
        .is-liked svg { fill: var(--accent-red) !important; }

        /* Glass Bottom Nav */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 65px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 0.5px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        .nav-link { font-size: 24px; text-decoration: none; color: white; opacity: 0.7; }
        .nav-link.active { opacity: 1; color: #fff; }
    </style>
</head>
<body>

<div class="reels-container" id="mainContainer">
    
    <section class="reel">
        <video src="3021.mp4" loop muted playsinline class="reel-video"></video>
        <div class="heart-pop">❤️</div>
        
        <div class="side-bar">
            <button class="btn like-btn" onclick="toggleLike(this)">
                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span>120k</span>
            </button>
            <button class="btn">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z"/></svg>
                <span>4,500</span>
            </button>
        </div>

        <div class="video-overlay">
            <div class="user-info">
                <b>@makibul_vlogs</b>
                <p>Makkhan ki tarah swipe ho raha hai! 🚀 #Viral #Code</p>
            </div>
        </div>
    </section>

    <section class="reel">
        <video src="3022.mp4" loop muted playsinline class="reel-video"></video>
        <div class="heart-pop">❤️</div>
        
        <div class="side-bar">
            <button class="btn like-btn" onclick="toggleLike(this)">
                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span>85k</span>
            </button>
        </div>

        <div class="video-overlay">
            <div class="user-info">
                <b>@makibul_vlogs</b>
                <p>Second video test for smooth scrolling! 🔥</p>
            </div>
        </div>
    </section>

</div>

<nav class="nav-bar">
    <a href="#" class="nav-link active">🏠</a>
    <a href="#" class="nav-link">🔍</a>
    <a href="#" style="font-size: 35px; color: #FFD700;">+</a>
    <a href="#" class="nav-link">🎬</a>
    <a href="#" class="nav-link">👤</a>
</nav>

<script>
    // 1. Play/Pause Logic on Click
    const videos = document.querySelectorAll('.reel-video');
    videos.forEach(v => {
        v.addEventListener('click', () => {
            if (v.paused) { v.play(); } 
            else { v.pause(); }
        });
    });

    // 2. Double Tap to Like
    const reels = document.querySelectorAll('.reel');
    reels.forEach(reel => {
        let lastTap = 0;
        reel.addEventListener('touchend', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                showHeart(reel);
            }
            lastTap = currentTime;
        });
    });

    function showHeart(reel) {
        const heart = reel.querySelector('.heart-pop');
        const likeBtn = reel.querySelector('.like-btn');
        heart.classList.add('animate-heart');
        likeBtn.classList.add('is-liked');
        setTimeout(() => heart.classList.remove('animate-heart'), 700);
    }

    function toggleLike(btn) {
        btn.classList.toggle('is-liked');
    }

    // 3. Autoplay when in view (Intersection Observer)
    const observerOptions = {
        threshold: 0.7 // Jab 70% video dikhega tabhi chalega
    };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const video = entry.target.querySelector('video');
            if (entry.isIntersecting) {
                video.play().catch(() => {
                    console.log("Autoplay blocked, needs user interaction");
                });
            } else {
                video.pause();
                video.currentTime = 0; // Reset video to start
            }
        });
    }, observerOptions);

    reels.forEach(reel => observer.observe(reel));

    // Prevent default pull-to-refresh on mobile
    document.addEventListener('touchmove', (e) => {
        if (e.scale !== 1) { e.preventDefault(); }
    }, { passive: false });
</script>

</body>
</html>
