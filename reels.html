<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful Reels</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin: 0; background: black; overflow: hidden; font-family: sans-serif; }
        .reels { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel { height: 100vh; position: relative; scroll-snap-align: start; background: black; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .info { position: absolute; bottom: 100px; left: 15px; color: white; z-index: 10; }
        .actions { position: absolute; right: 15px; bottom: 120px; color: white; z-index: 10; display: flex; flex-direction: column; gap: 20px; font-size: 28px; }
        .actions span { font-size: 12px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="reels" id="reels"></div>

    <script>
        const reelBox = document.getElementById("reels");
        const videoList = [
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4",
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4",
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4"
        ];

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target;
                if (entry.isIntersecting) { video.play(); } 
                else { video.pause(); }
            });
        }, { threshold: 0.6 });

        function addReel() {
            const randomVideo = videoList[Math.floor(Math.random() * videoList.length)];
            const reel = document.createElement("div");
            reel.className = "reel";
            reel.innerHTML = `
                <video src="${randomVideo}" muted loop playsinline></video>
                <div class="info"><h3>@max_ful_48</h3><p>🔥 Unlimited Reels Mode 🚀</p></div>
                <div class="actions">
                    <div onclick="like(this)"><i class="far fa-heart"></i><span>5429</span></div>
                    <div><i class="far fa-comment"></i><span>982</span></div>
                    <div><i class="fas fa-share"></i><span>Share</span></div>
                </div>
            `;
            reelBox.appendChild(reel);
            observer.observe(reel.querySelector("video"));
        }

        for(let i=0; i<5; i++) { addReel(); }

        reelBox.addEventListener("scroll", () => {
            if (reelBox.scrollTop + reelBox.clientHeight >= reelBox.scrollHeight - 500) {
                for(let i=0; i<3; i++) { addReel(); }
            }
        });

        function like(el) {
            const icon = el.querySelector("i");
            icon.classList.toggle("far");
            icon.classList.toggle("fas");
            icon.style.color = icon.classList.contains("fas") ? "red" : "white";
        }
    </script>
</body>
</html>
