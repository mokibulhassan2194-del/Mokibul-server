<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Max Ful Reels</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
}

.reels{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.reel{
height:100vh;
position:relative;
scroll-snap-align:start;
background:black;
}

video{
width:100%;
height:100%;
object-fit:cover;
background:black;
}

.info{
position:absolute;
bottom:100px;
left:15px;
color:white;
z-index:10;
}

.actions{
position:absolute;
right:15px;
bottom:120px;
color:white;
z-index:10;
display:flex;
flex-direction:column;
gap:20px;
font-size:28px;
text-align:center;
}

.actions span{
font-size:12px;
display:block;
margin-top:5px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
height:60px;
background:black;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #222;
z-index:100;
}

.bottom i{
color:white;
font-size:24px;
}

</style>
</head>

<body>

<div class="reels" id="reels"></div>

<div class="bottom">
<i class="fas fa-house"></i>
<i class="fas fa-search"></i>
<i class="fas fa-plus-square"></i>
<i class="fas fa-clapperboard"></i>
<i class="fas fa-user"></i>
</div>

<script>

const reelBox = document.getElementById("reels");

const videoList = [

"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",

"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4",

"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4",

"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4"

];

function addReel(){

const randomVideo =
videoList[Math.floor(Math.random()*videoList.length)];

const reel = document.createElement("div");

reel.className = "reel";

reel.innerHTML = `

<video
src="${randomVideo}"
muted
autoplay
loop
playsinline
webkit-playsinline
></video>

<div class="info">
<h3>@max_ful_48</h3>
<p>🔥 Unlimited Reels Mode 🚀</p>
</div>

<div class="actions">

<div onclick="like(this)">
<i class="far fa-heart"></i>
<span>5429</span>
</div>

<div>
<i class="far fa-comment"></i>
<span>982</span>
</div>

<div>
<i class="fas fa-share"></i>
<span>Share</span>
</div>

</div>

`;

reelBox.appendChild(reel);

}

function like(el){

const icon = el.querySelector("i");

if(icon.classList.contains("far")){

icon.classList.remove("far");
icon.classList.add("fas");
icon.style.color = "red";

}else{

icon.classList.remove("fas");
icon.classList.add("far");
icon.style.color = "white";

}

}

for(let i=0;i<5;i++){
addReel();
}

reelBox.addEventListener("scroll",()=>{

if(
reelBox.scrollTop + reelBox.clientHeight >=
reelBox.scrollHeight - 300
){

for(let i=0;i<3;i++){
addReel();
}

}

});

const observer = new IntersectionObserver((entries)=>{

entries.forEach(entry=>{

const video = entry.target;

if(entry.isIntersecting){

video.play();

}else{

video.pause();

}

});

},{threshold:0.6});

setInterval(()=>{

document.querySelectorAll("video").forEach(video=>{

observer.observe(video);

});

},1000);

</script>

</body>
</html>
