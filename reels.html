<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Max Ful | Reels Pro Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        html, body { 
            background-color: #000; color: #fff; margin: 0; padding: 0; 
            width: 100%; height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* स्वाइप (Swipe) के लिए 100vh जरूरी है */
        .reels-container {
            height: 100vh; 
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }
        
        .reel-video {
            height: 100vh; 
            width: 100%; 
            position: relative;
            scroll-snap-align: start; 
            background: #000;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        /* साइड बटन्स - इसे काफी ऊँचा (130px) कर दिया है जैसा आपने फोटो में माँगा */
        .reel-actions {
            position: absolute; right: 15px;
            bottom: 130px; 
            display: flex; flex-direction: column; gap: 24px; align-items: center;
            z-index: 10;
        }
        .action-item { text-align: center; font-size: 28px; cursor: pointer; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); }
        .action-item span { display: block; font-size: 12px; margin-top: 5px; font-weight: 500; }

        /* रोटेटिंग म्यूजिक डिस्क */
        .music-disc {
            width: 35px; height: 35px; border-radius: 50%;
            border: 2px solid #fff; animation: rotate 4s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* यूजर जानकारी और कैप्शन - इसे भी काफी ऊँचा सेट किया */
        .reel-info { 
            position: absolute; left: 15px; 
            bottom: 130px; 
            max-width: 75%; z-index: 10; 
        }
        .user-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .user-meta img { width: 38px; height: 38px; border-radius: 50%; border: 1px solid #fff; }
        .user-name { font-weight: bold; font-size: 15px; }
        .follow-btn { border: 1.5px solid #fff; padding: 4px 14px; border-radius: 8px; font-size: 13px; font-weight: bold; }

        .caption { font-size: 14px; line-height: 1.5; text-shadow: 1px 1px 4px rgba(0,0,0,1); }

        /* बॉटम नेविगेशन */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 60px; 
            background: rgba(0,0,0,0.9); border-top: 0.5px solid #262626; 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; 
        }
        .nav-item { color: #fff; font-size: 24px; text-decoration: none; opacity: 0.6; }
        .nav-item.active { opacity: 1; }
    </style>
</head>
<body>

    <div class="reels-container">
        <div class="reel-video">
            <video src="reel1.mp4" loop playsinline autoplay muted></video>
            <div class="reel-actions">
                <div class="action-item" onclick="toggleLike(this)"><i class="far fa-heart"></i><span>2.1k</span></div>
                <div class="action-item"><i class="far fa-comment"></i><span>120</span></div>
                <div class="action-item"><i class="far fa-paper-plane"></i><span>Share</span></div>
                <img src="https://picsum.photos/60/60" class="music-disc">
            </div>
            <div class="reel-info">
                <div class="user-meta">
                    <img src="https://picsum.photos/100/100">
                    <span class="user-name">@makibul_vlogs</span>
                    <div class="follow-btn" onclick="toggleFollow(this)">Follow</div>
                </div>
                <div class="caption">Success is a journey! 🚀🔥</div>
            </div>
        </div>
        
        <div class="reel-video">
            <video src="reel2.mp4" loop playsinline></video>
            <div class="reel-actions">
                <div class="action-item" onclick="toggleLike(this)"><i class="far fa-heart"></i><span>5k</span></div>
                <div class="action-item"><i class="far fa-comment"></i><span>200</span></div>
                <div class="action-item"><i class="far fa-paper-plane"></i><span>Share</span></div>
                <img src="https://picsum.photos/61/61" class="music-disc">
            </div>
            <div class="reel-info">
                <div class="user-meta">
                    <img src="https://picsum.photos/101/101">
                    <span class="user-name">@android_dev</span>
                    <div class="follow-btn" onclick="toggleFollow(this)">Follow</div>
                </div>
                <div class="caption">Swipe setup is now perfect! ✅</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fas fa-house"></i></a> 
        <a href="search.html" class="nav-item"><i class="fas fa-magnifying-glass"></i></a> 
        <a href="upload.html" class="nav-item" style="color: #FFD700; font-size: 28px;"><i class="far fa-square-plus"></i></a> 
        <a href="reels.html" class="nav-item active"><i class="fas fa-clapperboard"></i></a> 
        <a href="profile.html" class="nav-item"><i class="fas fa-circle-user"></i></a> 
    </div>

    <script>
        function toggleLike(element) {
            const heart = element.querySelector('i');
            heart.classList.toggle('fas');
            heart.classList.toggle('far');
            heart.style.color = heart.classList.contains('fas') ? "#ff0050" : "#fff";
        }

        function toggleFollow(btn) {
            btn.innerText = (btn.innerText === "Follow") ? "Following" : "Follow";
            btn.style.opacity = (btn.innerText === "Following") ? "0.6" : "1";
        }

        const videos = document.querySelectorAll('video');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.play();
                } else {
                    entry.target.pause();
                }
            });
        }, { threshold: 0.6 });
        videos.forEach(video => observer.observe(video));
    </script>
</body>
</html>
