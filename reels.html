<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Max Ful | Reels Share</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        html, body { 
            background-color: #000; color: #fff; margin: 0; padding: 0; 
            width: 100%; height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .reels-container {
            height: 100vh; 
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        
        .reel-video {
            height: 100vh; 
            width: 100%; 
            position: relative;
            scroll-snap-align: start; 
            background: #000;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Actions and Info */
        .reel-actions {
            position: absolute; right: 15px; bottom: 130px; 
            display: flex; flex-direction: column; gap: 24px; align-items: center; z-index: 10;
        }
        .action-item { text-align: center; font-size: 28px; cursor: pointer; }
        .action-item span { display: block; font-size: 12px; margin-top: 5px; }

        /* --- Instagram Style Share Menu --- */
        .share-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 2000;
        }

        .share-menu {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: #262626; border-radius: 15px 15px 0 0;
            padding: 15px 0 0; transition: bottom 0.3s ease; 
            z-index: 2001; max-height: 80vh;
        }

        .share-menu.active { bottom: 0; }

        .share-handle { width: 40px; height: 4px; background: #444; border-radius: 2px; margin: 0 auto 15px; }

        .search-container { padding: 0 15px 15px; }
        .search-box { 
            width: 100%; padding: 12px; border-radius: 10px; border: none; 
            background: #363636; color: #fff; font-size: 14px; box-sizing: border-box;
        }

        /* Users Horizontal List */
        .user-list { 
            display: flex; overflow-x: auto; padding: 10px 15px 20px; gap: 15px; 
            scrollbar-width: none; border-bottom: 0.5px solid #363636;
        }
        .user-list::-webkit-scrollbar { display: none; }
        
        .user-item { text-align: center; min-width: 75px; cursor: pointer; }
        .user-item img { 
            width: 60px; height: 60px; border-radius: 50%; 
            object-fit: cover; margin-bottom: 6px; border: 1px solid #444;
        }
        .user-item span { font-size: 12px; color: #fff; display: block; overflow: hidden; text-overflow: ellipsis; }

        /* Social Share Icons */
        .share-options { 
            display: flex; padding: 20px 15px; gap: 25px; overflow-x: auto;
            scrollbar-width: none;
        }
        .share-options::-webkit-scrollbar { display: none; }

        .share-option { text-align: center; min-width: 60px; cursor: pointer; }
        .share-option i { 
            width: 50px; height: 50px; background: #333; border-radius: 50%; 
            line-height: 50px; font-size: 22px; margin-bottom: 8px; 
        }
        .share-option span { font-size: 11px; color: #ccc; }

        .close-share { 
            text-align: center; padding: 18px; color: #ff3b3b; 
            font-weight: bold; cursor: pointer; border-top: 0.5px solid #363636; 
        }

        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 60px; 
            background: #000; display: flex; justify-content: space-around; align-items: center; z-index: 1000; 
        }
    </style>
</head>
<body>

    <div class="reels-container">
        <div class="reel-video">
            <video src="reel1.mp4" loop playsinline autoplay muted></video>
            <div class="reel-actions">
                <div class="action-item"><i class="far fa-heart"></i><span>2.1k</span></div>
                <div class="action-item" onclick="openShare()"><i class="fa-solid fa-paper-plane" style="transform: rotate(-15deg);"></i><span>Share</span></div>
            </div>
        </div>
    </div>

    <div class="share-overlay" id="overlay" onclick="closeShare()"></div>
    <div class="share-menu" id="shareMenu">
        <div class="share-handle"></div>
        
        <div class="search-container">
            <input type="text" class="search-box" placeholder="Search">
        </div>
        
        <div class="user-list">
            <div class="user-item" onclick="sendToUser('Mokibul')">
                <img src="https://i.pravatar.cc/150?u=1"><span>Mokibul</span>
            </div>
            <div class="user-item" onclick="sendToUser('Rahul')">
                <img src="https://i.pravatar.cc/150?u=2"><span>Rahul</span>
            </div>
            <div class="user-item" onclick="sendToUser('Sagar')">
                <img src="https://i.pravatar.cc/150?u=3"><span>Sagar</span>
            </div>
            <div class="user-item" onclick="sendToUser('Arjun')">
                <img src="https://i.pravatar.cc/150?u=4"><span>Arjun</span>
            </div>
            <div class="user-item" onclick="sendToUser('Amit')">
                <img src="https://i.pravatar.cc/150?u=5"><span>Amit</span>
            </div>
            <div class="user-item" onclick="sendToUser('Sneha')">
                <img src="https://i.pravatar.cc/150?u=6"><span>Sneha</span>
            </div>
        </div>

        <div class="share-options">
            <div class="share-option" onclick="shareTo('whatsapp')">
                <i class="fab fa-whatsapp" style="color:#25D366;"></i><br><span>WhatsApp</span>
            </div>
            <div class="share-option" onclick="shareTo('instagram')">
                <i class="fab fa-instagram" style="background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i><br><span>Stories</span>
            </div>
            <div class="share-option" onclick="shareTo('copy')">
                <i class="fas fa-link"></i><br><span>Copy Link</span>
            </div>
            <div class="share-option" onclick="shareTo('system')">
                <i class="fas fa-share-nodes"></i><br><span>More</span>
            </div>
        </div>

        <div class="close-share" onclick="closeShare()">Cancel</div>
    </div>

    <script>
        function openShare() {
            document.getElementById('overlay').style.display = 'block';
            setTimeout(() => { document.getElementById('shareMenu').classList.add('active'); }, 10);
        }

        function closeShare() {
            document.getElementById('shareMenu').classList.remove('active');
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 300);
        }

        function sendToUser(name) {
            alert("Reel shared with " + name + "!");
            closeShare();
        }

        function shareTo(platform) {
            if(platform === 'copy') {
                alert("Link Copied!");
            } else {
                alert("Opening " + platform + "...");
            }
            closeShare();
        }
    </script>
</body>
</html>
