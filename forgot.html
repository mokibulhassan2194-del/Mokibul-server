<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Reset Password</title>
    <style>
        body {
            background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .container {
            width: 85%; max-width: 400px; text-align: center; background: #111;
            padding: 30px; border-radius: 20px; border: 1px solid #333;
        }
        .logo-text { font-size: 30px; font-weight: 800; color: #FFD700; margin-bottom: 10px; }
        h2 { font-size: 20px; margin-bottom: 10px; color: #fff; }
        p { color: #aaa; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        
        input {
            width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px;
            border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box;
            text-align: center; font-size: 16px; outline: none;
        }
        input:focus { border-color: #FFD700; }

        .btn {
            width: 100%; padding: 15px; background: #FFD700; color: #000;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px;
        }

        /* Error message styling - Bina alert ke message dikhane ke liye */
        .error-msg { color: #ff4d4d; font-size: 12px; margin-bottom: 10px; display: none; }

        .otp-section { display: none; margin-top: 10px; }
        .back-to-login { display: block; margin-top: 25px; color: #FFD700; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-text">Max Ful</div>
    <h2 id="title">Forgot Password?</h2>
    <p id="instruction">Enter your email or phone to receive a 4-digit OTP.</p>

    <div id="step1">
        <div id="error1" class="error-msg">Please enter detail first!</div>
        <input type="text" id="userInput" placeholder="Email or Phone Number">
        <button class="btn" onclick="showOTP()">Send OTP</button>
    </div>

    <div id="step2" class="otp-section">
        <div id="error2" class="error-msg">Please enter a valid 4-digit OTP</div>
        <input type="number" id="otpValue" placeholder="Enter 4-digit OTP">
        <button class="btn" id="verifyBtn" onclick="verifyAndRedirect()">Verify OTP</button>
    </div>

    <a href="index.html" class="back-to-login">Back to Login</a>
</div>

<script>
    function showOTP() {
        var input = document.getElementById('userInput').value;
        var err1 = document.getElementById('error1');
        
        if(input.trim() == "") {
            err1.style.display = "block"; // Alert ki jagah text dikhayega
        } else {
            err1.style.display = "none";
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            document.getElementById('title').innerText = "Verify OTP";
            document.getElementById('instruction').innerHTML = "We sent an OTP to <br><b>" + input + "</b>";
        }
    }

    function verifyAndRedirect() {
        var otp = document.getElementById('otpValue').value;
        var err2 = document.getElementById('error2');
        
        if(otp.length < 4) {
            err2.style.display = "block"; // Alert ki jagah text dikhayega
        } else {
            err2.style.display = "none";
            document.getElementById('verifyBtn').innerText = "Verifying...";
            
            // Bina alert ke direct redirect
            setTimeout(function(){
                window.location.href = "home.html"; 
            }, 500);
        }
    }
</script>

</body>
</html>
