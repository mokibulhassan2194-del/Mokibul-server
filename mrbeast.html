<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MrBeast Fan Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
        
        /* Header Section */
        .header { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 15px; border-bottom: 0.1px solid #262626; 
            position: sticky; top: 0; background: #000; z-index: 100; 
        }
        .header-left { display: flex; align-items: center; gap: 25px; }
        .back-btn { font-size: 20px; color: #fff; text-decoration: none; }
        .username { font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 5px; }
        .header-icons { display: flex; gap: 20px; font-size: 20px; }

        /* Profile Info Section */
        .profile-container { padding: 15px; }
        .profile-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        
        .profile-pic-container { position: relative; }
        .profile-pic { 
            width: 80px; height: 80px; border-radius: 50%; 
            border: 2px solid #262626; padding: 3px; object-fit: cover;
        }

        .stats { display: flex; gap: 25px; text-align: center; flex: 1; justify-content: center; }
        .stat-item b { display: block; font-size: 17px; }
        .stat-item span { font-size: 13px; color: #a8a8a8; }

        /* Bio Section */
        .bio { padding: 0 5px; margin-bottom: 20px; }
        .full-name { font-weight: 600; font-size: 14px; display: block; margin-bottom: 2px; }
        .bio-text { font-size: 14px; line-height: 1.4; white-space: pre-wrap; }

        /* Follow Button Style */
        .follow-btn { 
            width: 100%; padding: 8px; border-radius: 8px; 
            font-weight: 600; font-size: 14px; cursor: pointer; border: none;
            transition: 0.2s; background: #FFD700; color: #000; 
        }
        /* Following होने पर रंग बदलेगा */
        .following-active { background: #363636 !important; color: #fff !important; }

        /* Tabs Section */
        .tabs { display: flex; border-top: 0.1px solid #262626; margin-top: 20px; }
        .tab { flex: 1; text-align: center; padding: 12px; font-size: 20px; color: #a8a8a8; cursor: pointer; }
        .tab.active { color: #fff; border-bottom: 2px solid #fff; }

        /* Posts Grid */
        .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; position: relative; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .grid-item i { position: absolute; top: 8px; right: 8px; font-size: 12px; color: #fff; }

        /* Bottom Nav */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 55px; 
            background: #000; border-top: 0.1px solid #262626; 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; 
        }
        .nav-item { color: #fff; font-size: 24px; text-decoration: none; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <a href="search.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <span class="username">mr_beast_fan <i class="fas fa-certificate" style="color: #0095f6; font-size: 12px;"></i></span>
        </div>
        <div class="header-icons">
            <i class="far fa-bell"></i>
            <i class="fas fa-ellipsis-vertical"></i>
        </div>
    </div>

    <div class="profile-container">
        <div class="profile-top">
            <div class="profile-pic-container">
                <img src="https://picsum.photos/200/200?random=50" class="profile-pic">
            </div>
            <div class="stats">
                <div class="stat-item"><b>120</b><span>Posts</span></div>
                <div class="stat-item"><b>200k</b><span>Followers</span></div>
                <div class="stat-item"><b>10</b><span>Following</span></div>
            </div>
        </div>

        <div class="bio">
            <span class="full-name">Mr Beast Fan Page</span>
            <div class="bio-text">Helping people and making fun content! 🌟
Official Fan Club of MrBeast.
📍 USA / Worldwide</div>
        </div>

        <button id="followBtn" class="follow-btn" onclick="toggleFollow()">Follow</button>
    </div>

    <div class="tabs">
        <div class="tab active"><i class="fas fa-table-cells"></i></div>
        <div class="tab"><i class="fas fa-clapperboard"></i></div> 
        <div class="tab"><i class="far fa-id-badge"></i></div>
    </div>

    <div class="posts-grid">
        <div class="grid-item">
            <img src="https://picsum.photos/300/300?random=21">
            <i class="fas fa-play"></i>
        </div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=22"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=23"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=24"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=25"></div>
        <div class="grid-item">
            <img src="https://picsum.photos/300/300?random=26">
            <i class="fas fa-play"></i>
        </div>
    </div>

    <script>
        function toggleFollow() {
            const btn = document.getElementById('followBtn');
            if (btn.innerText === "Follow") {
                btn.innerText = "Following";
                btn.classList.add('following-active');
            } else {
                btn.innerText = "Follow";
                btn.classList.remove('following-active');
            }
        }
    </script>

</body>
</html>
