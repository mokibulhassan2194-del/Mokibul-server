<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* ऊपर की पट्टी */
        .header { padding: 15px; border-bottom: 0.1px solid #262626; display: flex; align-items: center; gap: 20px; }
        .header a { color: #fff; text-decoration: none; font-size: 20px; }

        /* कमेंट्स दिखाने की जगह */
        #comment-list { flex: 1; overflow-y: auto; padding: 15px; }
        .comment { margin-bottom: 15px; font-size: 14px; display: flex; gap: 10px; }
        .user { font-weight: bold; color: #FFD700; }

        /* टाइप करने की जगह */
        .input-box { border-top: 0.1px solid #262626; padding: 10px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; background: #121212; border: 1px solid #363636; border-radius: 20px; padding: 8px 15px; color: #fff; outline: none; }
        button { background: none; border: none; color: #0095f6; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html"><i class="fas fa-arrow-left"></i></a>
        <span style="font-weight: bold;">Comments</span>
    </div>

    <div id="comment-list">
        <div class="comment"><span class="user">Admin:</span> Swagat hai! Comment kijiye.</div>
    </div>

    <div class="input-box">
        <input type="text" id="cInput" placeholder="Add a comment...">
        <button onclick="addC()">Post</button>
    </div>

    <script>
        function addC() {
            let box = document.getElementById('cInput');
            let list = document.getElementById('comment-list');
            if(box.value.trim() !== "") {
                list.innerHTML += `<div class="comment"><span class="user">You:</span> ${box.value}</div>`;
                box.value = "";
                list.scrollTop = list.scrollHeight;
            }
        }
    </script>
</body>
</html>
