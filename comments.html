<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        
        /* Header */
        .comment-header {
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 0.1px solid #262626;
            position: sticky;
            top: 0;
            background: #000;
        }
        .comment-header i { font-size: 20px; margin-right: 20px; cursor: pointer; }

        /* Comments List */
        .comments-list { padding: 15px; padding-bottom: 80px; }
        .comment-item { display: flex; gap: 12px; margin-bottom: 20px; }
        .user-pic { width: 35px; height: 35px; border-radius: 50%; }
        .comment-content { font-size: 14px; }
        .user-name { font-weight: bold; margin-right: 5px; }

        /* Input Area */
        .comment-input-area {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            padding: 10px;
            display: flex;
            align-items: center;
            border-top: 0.1px solid #262626;
            box-sizing: border-box;
        }
        .comment-input-area input {
            background: #121212;
            border: 0.1px solid #363636;
            color: #fff;
            padding: 10px 15px;
            border-radius: 20px;
            flex-grow: 1;
            outline: none;
        }
        .post-btn {
            color: #0095f6;
            font-weight: bold;
            margin-left: 15px;
            cursor: pointer;
            background: none;
            border: none;
        }
    </style>
</head>
<body>

    <div class="comment-header">
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <span style="font-weight: bold;">Comments</span>
    </div>

    <div class="comments-list" id="comments-container">
        <!-- यहाँ कमेंट्स लोड होंगे -->
        <div class="comment-item">
            <img src="https://picsum.photos/id/10/50/50" class="user-pic">
            <div class="comment-content">
                <span class="user-name">rahul_vlogs</span> बहुत ही बढ़िया फोटो है भाई! 🔥
            </div>
        </div>
    </div>

    <div class="comment-input-area">
        <img src="https://picsum.photos/id/64/50/50" class="user-pic" style="margin-right: 10px;">
        <input type="text" id="comment-text" placeholder="Add a comment...">
        <button class="post-btn" onclick="addComment()">Post</button>
    </div>

    <script>
        // यहाँ आप अपना Firebase लॉजिक जोड़ सकते हैं 
        // ताकि हर पोस्ट के हिसाब से कमेंट्स लोड और सेव हों।
        function addComment() {
            const input = document.getElementById('comment-text');
            const container = document.getElementById('comments-container');

            if(input.value.trim() !== "") {
                const newComment = `
                    <div class="comment-item">
                        <img src="https://picsum.photos/id/64/50/50" class="user-pic">
                        <div class="comment-content">
                            <span class="user-name">You</span> ${input.value}
                        </div>
                    </div>
                `;
                container.innerHTML += newComment;
                input.value = "";
                window.scrollTo(0, document.body.scrollHeight);
            }
        }
    </script>
</body>
</html>
