<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comments</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* Header */
        .header { padding: 15px; border-bottom: 0.1px solid #262626; display: flex; align-items: center; gap: 20px; position: sticky; top: 0; background: #000; z-index: 100; }
        .header a { color: #fff; text-decoration: none; font-size: 22px; }
        .header b { font-size: 18px; }

        /* Comment List */
        #list { padding: 15px; }
        .c-item { display: flex; gap: 12px; margin-bottom: 18px; }
        .img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .c-body { font-size: 14px; }
        .name { font-weight: bold; margin-right: 5px; }

        /* Bottom Input Bar - Fix for Post button */
        .input-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #000; 
            border-top: 0.1px solid #262626; 
            padding: 8px 12px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            z-index: 1000;
            box-sizing: border-box; /* ये बटन को बाहर जाने से रोकेगा */
        }
        
        .input-wrapper {
            flex: 1; /* ये इनपुट को बाकी बची जगह में फैला देगा */
            display: flex;
            align-items: center;
        }

        input { 
            width: 100%; 
            background: #000; 
            border: 1px solid #363636; 
            border-radius: 20px; 
            padding: 10px 15px; 
            color: #fff; 
            outline: none; 
            font-size: 16px; 
        }
        
        #postBtn { 
            color: #0095f6; 
            font-weight: bold; 
            background: none; 
            border: none; 
            font-size: 15px; 
            cursor: pointer;
            padding: 5px;
            flex-shrink: 0; /* ये बटन को दबने या बाहर भागने से रोकेगा */
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html"><i class="fas fa-arrow-left"></i></a>
        <b>Comments</b>
    </div>

    <div id="list">
        <!-- डमी कमेंट -->
        <div class="c-item">
            <img src="https://picsum.photos/id/64/50/50" class="img">
            <div class="c-body">
                <span class="name">max_ful_dev</span>
                <span>Bhai ab styling ekdam kadak hai! 🔥</span>
            </div>
        </div>
    </div>

    <div class="input-bar">
        <img src="https://picsum.photos/id/64/50/50" class="img" style="width: 30px; height: 30px;">
        <div class="input-wrapper">
            <input type="text" id="inp" placeholder="Add a comment...">
        </div>
        <button id="postBtn" onclick="send()">Post</button>
    </div>

    <script>
        function send() {
            let i = document.getElementById('inp');
            let l = document.getElementById('list');
            if(i.value.trim()){
                l.innerHTML += `
                    <div class="c-item">
                        <img src="https://picsum.photos/id/64/50/50" class="img">
                        <div class="c-body">
                            <span class="name">You</span>
                            <span>${i.value}</span>
                        </div>
                    </div>`;
                i.value = "";
                window.scrollTo(0, document.body.scrollHeight);
            }
        }
    </script>
</body>
</html>
