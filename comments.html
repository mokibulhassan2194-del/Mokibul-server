<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comments</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* इंस्टाग्राम स्टाइल हेडर */
        .header { padding: 12px 16px; border-bottom: 0.1px solid #262626; display: flex; align-items: center; background: #000; position: sticky; top: 0; z-index: 10; }
        .header a { color: #fff; text-decoration: none; font-size: 22px; margin-right: 25px; }
        .header span { font-weight: 700; font-size: 18px; }

        /* कमेंट सेक्शन */
        #comment-list { flex: 1; overflow-y: auto; padding: 16px; }
        .comment-item { display: flex; gap: 12px; margin-bottom: 18px; align-items: flex-start; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #333; object-fit: cover; }
        .comment-text { font-size: 14px; line-height: 1.4; }
        .user-name { font-weight: 700; margin-right: 6px; font-size: 14px; }
        .time { color: #a8a8a8; font-size: 12px; margin-top: 4px; display: block; }

        /* नीचे का इनपुट एरिया (Instagram जैसा) */
        .input-container { border-top: 0.1px solid #262626; padding: 10px 16px; display: flex; align-items: center; gap: 12px; background: #000; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .my-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .input-wrapper { flex: 1; position: relative; display: flex; align-items: center; }
        
        /* font-size 16px रखने से ऑटो-ज़ूम बंद हो जाता है */
        input { width: 100%; background: #000; border: 1px solid #363636; border-radius: 20px; padding: 10px 15px; color: #fff; outline: none; font-size: 16px; }
        
        button { background: none; border: none; color: #0095f6; font-weight: 700; cursor: pointer; font-size: 14px; padding: 5px; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html"><i class="fas fa-arrow-left"></i></a>
        <span>Comments</span>
    </div>

    <div id="comment-list">
        <!-- डमी कमेंट इंस्टाग्राम स्टाइल में -->
        <div class="comment-item">
            <img src="https://picsum.photos/id/64/100/100" class="user-avatar">
            <div class="comment-text">
                <span class="user-name">max_ful_dev</span>
                <span>Bhai ab styling ekdam kadak hai! 🔥</span>
                <span class="time">2m</span>
            </div>
        </div>
    </div>

    <div class="input-container">
        <img src="https://picsum.photos/id/64/100/100" class="my-avatar">
        <div class="input-wrapper">
            <input type="text" id="cInput" placeholder="Add a comment..." oninput="checkInput()">
        </div>
        <button id="postBtn" onclick="addC()" disabled>Post</button>
    </div>

    <script>
        const input = document.getElementById('cInput');
        const btn = document.getElementById('postBtn');
        const list = document.getElementById('comment-list');

        function checkInput() {
            btn.disabled = input.value.trim() === "";
        }

        function addC() {
            if(input.value.trim() !== "") {
                const html = `
                    <div class="comment-item">
                        <img src="https://picsum.photos/id/64/100/100" class="user-avatar">
                        <div class="comment-text">
                            <span class="user-name">You</span>
                            <span>${input.value}</span>
                            <span class="time">now</span>
                        </div>
                    </div>`;
                list.innerHTML += html;
                input.value = "";
                btn.disabled = true;
                list.scrollTop = list.scrollHeight;
            }
        }
    </script>
</body>
</html>
