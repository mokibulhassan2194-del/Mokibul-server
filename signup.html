<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ful | Login</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 85%; text-align: center; max-width: 350px; }
        
        /* LOGO FIX: Max  ful style */
        .logo { 
            font-size: 42px; 
            font-weight: 900; 
            color: #FFD700; 
            margin-bottom: 5px; 
            letter-spacing: 1px;
            text-transform: none; /* Isse ALL CAPS nahi hoga */
        }
        
        p.tagline { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        
        input { 
            width: 100%; padding: 14px; margin: 8px 0; 
            background: #121212; border: 1px solid #333; 
            color: #fff; border-radius: 8px; box-sizing: border-box; 
            outline: none;
        }

        /* FORGOT PASSWORD FIX: Right side se thoda andar */
        .forgot-link {
            display: block;
            text-align: right;
            width: 100%;
            font-size: 12px;
            color: #FFD700;
            text-decoration: none;
            margin-bottom: 20px;
            padding-right: 5px;
        }

        .btn { 
            width: 100%; padding: 12px; background: #FFD700; 
            color: #000; border: none; font-weight: bold; 
            border-radius: 8px; margin-top: 5px; cursor: pointer; 
            text-decoration: none; display: inline-block;
            font-size: 16px;
        }

        .footer-text { margin-top: 30px; font-size: 14px; color: #eee; }
        .footer-text a { color: #FFD700; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">Max  ful</div>
        <p class="tagline">Sign up to see photos and videos.</p>
        
        <input type="text" placeholder="Phone number, username, or email">
        <input type="password" placeholder="Password">
        
        <a href="#" class="forgot-link">Forgot password?</a>
        
        <a href="home.html" class="btn">Log In</a>
        
        <div class="footer-text">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
    </div>
</body>
</html>
