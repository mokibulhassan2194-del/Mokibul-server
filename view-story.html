
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Viewer</title>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        /* Progress Bar */
        .progress-container { position: absolute; top: 10px; width: 95%; left: 2.5%; display: flex; gap: 5px; z-index: 10; }
        .bar { height: 2px; background: rgba(255,255,255,0.3); flex-grow: 1; border-radius: 2px; overflow: hidden; }
        .fill { height: 100%; background: #fff; width: 0%; animation: slide 5s linear forwards; }

        @keyframes slide { from { width: 0%; } to { width: 100%; } }

        /* Story Content */
        .story-img { width: 100%; height: 100vh; object-fit: cover; }
        
        .close-btn { position: absolute; top: 25px; right: 20px; color: #fff; font-size: 30px; z-index: 10; cursor: pointer; text-decoration: none; }
        
        .user-info { position: absolute; top: 25px; left: 15px; display: flex; align-items: center; gap: 10px; z-index: 10; }
        .user-info img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #fff; }
    </style>
</head>
<body>

    <div class="progress-container">
        <div class="bar"><div class="fill"></div></div>
    </div>

    <a href="home.html" class="close-btn">&times;</a>

    <div class="user-info">
        <img src="profile-placeholder.jpg" alt="">
        <span>Your Story</span>
    </div>

    <img src="https://via.placeholder.com/800x1600" class="story-img" alt="Story">

    <script>
        // 5 second baad apne aap home page par bhej dega
        setTimeout(() => {
            window.location.href = 'home.html';
        }, 5000);
    </script>

</body>
</html>
